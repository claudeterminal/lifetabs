<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Taskit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sf-display: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --sf-text: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --sf-mono: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --accent: #e0b079;        /* warm gold — the single accent */
    --accent-soft: rgba(224,176,121,0.14);
    --accent-line: rgba(224,176,121,0.30);
    --green: #7ba98a;
    --green-light: #9ccab0;
    --coral: #e0967f;         /* the single "now / alert" warm tone */
    --bg-1: #1b202d;
    --bg-0: #0c0f17;
    --fg: #ece8dd;
    --fg-soft: rgba(236,232,221,0.55);
    --fg-faint: rgba(236,232,221,0.32);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg-0); }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #1b202d 0%, #0c0f17 100%);
    color: var(--fg);
    font-family: var(--sf-text);
    padding: 6px 16px 32px;
    display: flex; flex-direction: column; align-items: center;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  .sf-display { font-family: var(--sf-display); }
  .sf-mono { font-family: var(--sf-mono); }

  @keyframes pulse-ring { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
  .ring-active { animation: pulse-ring 2s ease-in-out infinite; }

  .header { text-align: center; margin-bottom: 4px; }
  .header-title {
    font-family: var(--sf-mono); font-size: 10.5px;
    letter-spacing: 0.3em; opacity: 0.5; margin-bottom: 4px;
  }
  .header-count {
    font-family: var(--sf-mono); font-size: 11.5px; opacity: 0.6;
  }

  .circle-wrap { position: relative; width: 216px; height: 216px; margin-bottom: 2px; }
  .circle-wrap svg.ring { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .circle-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 0 14px; text-align: center;
  }
  .center-task-name {
    font-size: 17.5px; font-weight: 700; line-height: 1.2;
    margin-bottom: 4px; letter-spacing: -0.02em;
  }
  .center-task-name.group { font-size: 15.5px; }
  .center-emoji {
    font-size: 26.5px; line-height: 1; margin-bottom: 5px;
    font-family: "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
  }
  .center-sub-emoji {
    font-size: 11.5px; line-height: 1; margin-right: -2px;
    font-family: "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
  }
  .center-location {
    display: inline-block;
    font-family: var(--sf-display); font-size: 11.5px;
    color: var(--accent);
    background: rgba(212, 165, 116, 0.12);
    border: 1px solid rgba(212, 165, 116, 0.35);
    padding: 2px 10px; border-radius: 999px;
    margin-top: 4px; margin-bottom: 6px;
    letter-spacing: 0.01em;
    font-weight: 600;
  }
  .center-badges .center-location { margin-top: 0; margin-bottom: 0; }
  .center-sub-list { margin: 2px 0 6px; max-width: 220px; }
  .center-sub {
    font-size: 11.5px; color: rgba(232,228,216,0.7); margin: 2px 0;
    letter-spacing: -0.005em; display: flex; align-items: center;
    gap: 6px; justify-content: center; cursor: pointer;
  }
  .center-sub.done {
    opacity: 0.5;
  }
  .center-time {
    font-family: var(--sf-display); font-size: 26.5px; font-weight: 400;
    letter-spacing: 0.01em; opacity: 0.85; margin-top: 4px;
    font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1;
  }
  .center-time.warn { color: var(--accent); }
  .center-time.overtime { color: var(--coral); }
  .center-time.small { font-size: 20.5px; }

  .controls {
    display: flex; gap: 8px; margin-bottom: 10px;
    flex-wrap: wrap; justify-content: center; align-items: center;
  }

  /* Volume control — speaker icon + live slider */
  .volume-control {
    display: inline-flex; align-items: center;
    gap: 10px; padding: 8px 14px 8px 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(232,228,216,0.15);
    border-radius: 999px;
    height: 44px;
    transition: all 0.2s ease;
  }
  .volume-fixed {
    position: fixed; bottom: 16px; right: 16px; z-index: 100;
    background: rgba(16, 20, 30, 0.94);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 4px 18px rgba(0,0,0,0.4);
  }
  .volume-control:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(232,228,216,0.25);
  }
  /* Compact volume control sitting inline at the end of the tabs row */
  .tabs .volume-control { height: 30px; padding: 3px 10px 3px 5px; gap: 6px; }
  .tabs .volume-slider { width: 84px; }
  .tabs .volume-pct { font-size: 11.5px; }
  /* Volume sits in a centered row directly under the table of contents */
  .volume-row {
    display: flex; justify-content: flex-end;
    width: 100%; margin: 0 auto 14px;
  }
  .volume-row .volume-control { height: 40px; padding: 6px 14px 6px 8px; }
  /* Pinned to top right of the viewport */
  .volume-control-top {
    position: fixed;
    top: 16px; right: 16px;
    z-index: 100;
    height: 40px;
    padding: 6px 12px 6px 6px;
    background: rgba(26, 31, 46, 0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  @media (max-width: 460px) {
    .volume-control-top {
      top: 10px; right: 10px;
      padding: 4px 10px 4px 4px;
      height: 36px;
    }
    .volume-control-top .volume-slider { width: 80px; }
    .volume-control-top .volume-pct { display: none; }
  }

  /* ---- Tabs (table of contents across the very top) ---- */
  .tabs {
    position: sticky; top: 0; z-index: 50;
    display: flex; gap: 4px; flex-wrap: wrap;
    width: 100%; max-width: 1100px;
    margin: 0 auto 14px; padding: 8px 0;
    border-bottom: 1px solid rgba(232,228,216,0.12);
    justify-content: center;
    background: rgba(16, 20, 30, 0.94);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .tab {
    background: transparent; border: 1px solid transparent;
    color: rgba(232,228,216,0.55);
    font-family: var(--sf-display); font-size: 13.5px; font-weight: 600;
    letter-spacing: -0.01em; padding: 7px 13px; border-radius: 999px;
    cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
  }
  .tab:hover { color: var(--fg); background: rgba(255,255,255,0.05); }
  .tab.active {
    color: #0a0d14; background: var(--accent); border-color: var(--accent);
  }
  .tab-sep { align-self: center; color: rgba(236,232,221,0.5); font-size: 16.5px; font-weight: 300; user-select: none; pointer-events: none; margin: 0 1px; }
  /* Desktop: keep every tab on a single line */
  @media (min-width: 721px) {
    .tabs { flex-wrap: nowrap; max-width: 100%; gap: 1px; overflow: hidden; }
    .tab { font-size: 10px; padding: 5px 6px; }
    .tabs .tab-sep { display: none; }
  }
  .btn-export { opacity: 0.4; font-weight: 400; background: transparent; border-color: transparent; }
  .btn-export:hover { opacity: 0.85; background: rgba(255,255,255,0.05); border-color: transparent; }
  .house-search-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 14px 0 8px; }
  .house-btn {
    display: inline-flex; align-items: center; text-decoration: none;
    background: var(--accent-soft); border: 1px solid var(--accent-line);
    color: var(--accent); font-family: var(--sf-display); font-size: 13.5px; font-weight: 600;
    padding: 8px 16px; border-radius: 999px; transition: all 0.15s ease;
  }
  .house-btn:hover { background: rgba(224,176,121,0.24); border-color: var(--accent); transform: translateY(-1px); }
  .house-hint { text-align: center; font-size: 12.5px; color: var(--fg-soft); margin: 4px 0 14px; line-height: 1.4; }
  .house-group-label { text-align: center; font-size: 11.5px; font-weight: 700; letter-spacing: 0.1em; color: var(--accent); margin: 16px 0 2px; }

  /* Placeholder panel for the not-yet-built tabs */
  .tab-panel { width: 100%; max-width: 640px; margin: 24px auto 0; }
  .tab-panel.goals-panel { max-width: 96vw; margin-top: 6px; }
  .goals-title { font-size: 15px !important; margin-bottom: 6px !important; }
  .goals-panel .goal-bars { margin: 4px 0 10px; column-gap: 28px; }
  .goals-panel .lg-row { margin-bottom: 9px; }
  .goals-panel .lg-row-head { margin-bottom: 1px; gap: 6px; }
  .goals-panel .lg-label { font-size: 12px; }
  .goals-panel .lg-pct { font-size: 11px; }
  .goals-panel .lg-emoji { font-size: 12px; }
  .goals-panel .lg-bar { height: 10px; }
  .goals-panel .lg-chaingroup { margin-bottom: 5px; }
  .tab-panel-title {
    font-family: var(--sf-display); font-size: 26.5px; font-weight: 700;
    letter-spacing: -0.02em; margin-bottom: 6px; text-align: center;
  }
  .tab-panel-sub {
    font-family: var(--sf-mono); font-size: 11.5px; letter-spacing: 0.15em;
    text-transform: uppercase; color: rgba(232,228,216,0.4);
    text-align: center; margin-bottom: 18px;
  }
  .tab-notes {
    width: 100%; min-height: 320px; resize: vertical;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(232,228,216,0.15); border-radius: 14px;
    color: var(--fg); font-family: var(--sf-display); font-size: 15.5px;
    line-height: 1.6; padding: 16px; outline: none;
  }
  .tab-notes:focus { border-color: rgba(212,165,116,0.5); background: rgba(255,255,255,0.06); }
  .dat-creds { width:100%; max-width:560px; margin:0 auto 14px; }
  .dat-row { display:grid; grid-template-columns:1.2fr 1.2fr 1fr; gap:8px; padding:8px 10px; align-items:center; border-bottom:1px solid rgba(255,255,255,0.08); font-size:14px; }
  .dat-row.dat-head { color:#8a93a3; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; }
  .dat-site { font-weight:600; }
  .dat-user { color:#cfd6e0; }
  .dat-pw { color:#6b7280; letter-spacing:2px; }
  .dat-seen-head { max-width:560px; margin:18px auto 6px; font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:#8a93a3; }
  .dat-pattern { max-width:560px; margin:16px auto 4px; padding:10px 12px; background:rgba(224,53,107,0.08); border:1px solid rgba(224,53,107,0.3); border-radius:10px; font-size:13px; line-height:1.5; color:#e8c2cf; }
  .dat-insights { max-width:560px; margin:8px auto 4px; padding:12px 14px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); border-radius:10px; font-size:13px; line-height:1.55; color:#cfd6e0; }
  .dat-insights-h { font-weight:800; color:#ef5a72; margin-bottom:6px; }
  .dat-insights ul { margin:0; padding-left:18px; }
  .dat-insights li { margin:3px 0; }
  .dat-insights-key { margin-top:8px; padding-top:8px; border-top:1px solid rgba(255,255,255,0.08); color:#e8e8e8; }
  .dat-seen { list-style:none; padding:0; margin:0 auto 14px; max-width:560px; }
  .dat-person { display:flex; gap:10px; padding:8px 10px; border-bottom:1px solid rgba(255,255,255,0.08); font-size:14px; }
  .dat-init { font-weight:700; min-width:46px; color:#cfd6e0; }
  .dat-why { color:#aeb6c2; }

  /* ---- Expenses: fixed | variable columns ---- */
  .expense-cols { display: flex; gap: 10px; margin-top: 10px; align-items: stretch; }
  .expense-col { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; }
  .expense-col-head {
    font-family: var(--sf-display); font-size: 12.5px; font-weight: 800; letter-spacing: 0.16em;
    padding: 6px 8px; border-radius: 8px 8px 0 0; text-align: center;
  }
  .expense-col-head.fixed { color: #9fb8e0; background: rgba(120,158,220,0.14); border: 1px solid rgba(120,158,220,0.4); border-bottom: none; }
  .expense-col-head.variable { color: #a8d4b3; background: rgba(130,190,150,0.14); border: 1px solid rgba(130,190,150,0.4); border-bottom: none; }
  .expense-area {
    flex: 1; width: 100%; box-sizing: border-box;
    min-height: 60px; height: auto; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(232,228,216,0.16); border-radius: 0 0 8px 8px;
    color: var(--fg); font-family: var(--sf-display); font-size: 13.5px;
    line-height: 1.6; padding: 10px 11px; white-space: pre-wrap; word-break: break-word;
  }
  .expense-empty { color: rgba(232,228,216,0.3); font-style: italic; }

  /* ---- Embedded Meal timer (isolated iframe) ---- */
  .meal-timer-panel { padding: 0; max-width: 1000px; width: 100%; }
  .meal-timer-frame {
    width: 100%; height: calc(100dvh - var(--tabs-h, 60px) - 24px);
    min-height: 540px; border: none; border-radius: 12px;
    background: #FBF1DD; display: block;
  }
  .supp-today { background: rgba(95,208,127,0.10); border: 1px solid rgba(54,184,95,0.35); border-radius: 12px; padding: 11px 15px; margin: 4px 0 12px; }
  .supp-today-head { font-size: 13px; font-weight: 800; letter-spacing: 0.02em; color: #2f9d57; margin-bottom: 7px; }
  .supp-today-list { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: 6px 9px; }
  .supp-today-list li { font-size: 13.5px; color: var(--fg); background: rgba(255,255,255,0.04); border: 1px solid rgba(232,228,216,0.12); border-radius: 999px; padding: 3px 11px; }
  .supp-today-list li.supp-empty { background: none; border: none; color: var(--fg-faint); font-style: italic; }
  .expense-area:focus { border-color: var(--accent); }
  .expense-area::placeholder { color: rgba(232,228,216,0.28); white-space: normal; }
  @media (max-width: 640px) {
    .expense-cols { flex-direction: column; }
    .expense-area { min-height: 90px; }
  }

  /* ---- Meals-i-want grid ---- */
  .meal-grid-wrap { width: 100%; overflow-x: auto; margin-top: 10px; -webkit-overflow-scrolling: touch; }
  .meal-grid { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 560px; }
  .meal-grid th, .meal-grid td { border: 1px solid rgba(232,228,216,0.12); }
  .meal-grid thead th {
    position: sticky; top: 0; z-index: 2;
    background: rgba(28,33,46,0.96); -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    font-family: var(--sf-display); font-size: 12.5px; font-weight: 700; letter-spacing: 0.02em;
    color: var(--accent); padding: 8px 6px; text-align: center; white-space: nowrap;
  }
  .meal-grid .meal-corner { background: rgba(28,33,46,0.96); z-index: 3; left: 0; position: sticky; }
  .meal-grid .meal-day {
    position: sticky; left: 0; z-index: 1;
    background: rgba(28,33,46,0.96);
    font-family: var(--sf-display); font-size: 12.5px; font-weight: 700;
    color: var(--fg); padding: 6px 8px; text-align: left; white-space: nowrap;
  }
  .meal-grid .meal-cell { padding: 0; vertical-align: top; }
  .meal-input {
    width: 100%; min-width: 96px; box-sizing: border-box; resize: vertical;
    background: transparent; border: none; color: var(--fg);
    font-family: var(--sf-text, inherit); font-size: 13.5px; line-height: 1.3;
    padding: 7px 8px; min-height: 44px; outline: none;
  }
  .meal-input::placeholder { color: rgba(232,228,216,0.25); }
  .meal-input:focus { background: rgba(212,165,116,0.10); }
  .meal-grid tbody tr:nth-child(even) td { background: rgba(255,255,255,0.015); }
  .instacart-link {
    display: inline-flex; align-items: center; gap: 8px;
    margin-bottom: 12px; padding: 9px 16px;
    background: rgba(67,179,80,0.14); border: 1px solid rgba(67,179,80,0.45);
    border-radius: 999px; color: #7ed98b; font-weight: 600; font-size: 14.5px;
    text-decoration: none; transition: all 0.2s ease;
  }
  .instacart-link:hover { background: rgba(67,179,80,0.22); border-color: rgba(67,179,80,0.7); }

  /* Life goals — area + measurable goal input */
  .goal-list { display: flex; flex-direction: column; gap: 4px; }
  .goal-row {
    display: flex; align-items: stretch; gap: 6px;
    padding: 4px 6px; border-radius: 8px;
    background: rgba(255,255,255,0.025); border: 1px solid rgba(232,228,216,0.09);
  }
  .goal-area {
    flex-shrink: 0; width: 84px; font-weight: 700; font-size: 10.5px;
    color: var(--accent);
    text-align: left; background: transparent; border: none; cursor: pointer;
    padding: 3px 4px; border-radius: 5px; line-height: 1.2;
    font-family: var(--sf-display); transition: background 0.15s ease;
  }
  .goal-area:hover { background: rgba(212,165,116,0.14); text-decoration: underline; }
  .goal-input, .goal-outcome {
    flex: 1; min-width: 0; box-sizing: border-box; resize: vertical;
    color: var(--fg); font-family: var(--sf-text, inherit);
    font-size: 11px; line-height: 1.3; padding: 4px 6px; outline: none;
    border-radius: 6px; min-height: 52px;
  }
  .goal-input {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(232,228,216,0.16);
  }
  .goal-input:focus { border-color: var(--accent); background: rgba(212,165,116,0.06); }
  .goal-input::placeholder { color: rgba(232,228,216,0.28); }
  .goal-outcome {
    background: rgba(120,200,150,0.04); border: 1px solid rgba(120,200,150,0.28);
  }
  .goal-outcome:focus { border-color: #82c896; background: rgba(120,200,150,0.08); }
  .goal-outcome::placeholder { color: rgba(130,200,150,0.4); }
  @media (max-width: 640px) {
    .goal-row { flex-wrap: wrap; }
    .goal-area { width: 100%; }
    .goal-input, .goal-outcome { flex: 1 1 45%; }
  }

  /* Not alone card */
  .notalone-card {
    background: rgba(212,165,116,0.08); border: 1px solid rgba(212,165,116,0.3);
    border-radius: 14px; padding: 18px; margin-bottom: 16px; text-align: center;
  }
  .notalone-goal { font-size: 16.5px; line-height: 1.5; margin-bottom: 14px; }
  .notalone-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .notalone-hint {
    margin-top: 12px; font-size: 12.5px; color: rgba(232,228,216,0.45);
  }
  /* Reminder popup */
  .reminder-modal {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
  }
  .reminder-box {
    max-width: 420px; width: calc(100% - 40px);
    background: #1c2130; border: 1px solid rgba(212,165,116,0.45);
    border-radius: 18px; padding: 26px; text-align: center;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .reminder-box .r-emoji { font-size: 34.5px; }
  .reminder-box .r-msg { font-size: 17.5px; line-height: 1.5; margin: 12px 0 20px; }
  .reminder-box .btn { margin: 0 auto; }

  /* ---- Hour divider line with the time on the left ---- */
  .hour-line {
    display: flex; align-items: center; gap: 12px;
    margin: 10px 0 3px; padding: 0 2px;
  }
  .hour-line:first-of-type { margin-top: 2px; }
  .hour-label {
    font-family: var(--sf-display); font-size: 12.5px; font-weight: 600;
    letter-spacing: 0.08em; color: var(--accent); text-transform: uppercase;
    flex-shrink: 0; min-width: 54px;
  }
  .hour-rule { flex: 1; height: 1px; background: var(--accent-line); }
  /* NOW marker — single warm coral line, soft flashing badge, current time */
  .now-line {
    display: flex; align-items: center; gap: 12px;
    margin: 6px 0 8px; padding: 0 2px;
  }
  .now-rule { flex: 1; height: 2px; background: var(--coral); border-radius: 2px; box-shadow: 0 0 10px rgba(224,150,127,0.5); }
  .now-badge {
    flex-shrink: 0; background: var(--coral); color: #2a1a14;
    font-family: var(--sf-display); font-weight: 800; font-size: 17.5px;
    letter-spacing: 0.12em; padding: 4px 14px; border-radius: 999px;
    animation: now-flash 1.4s ease-in-out infinite; text-transform: uppercase;
  }
  .now-time {
    flex-shrink: 0; font-family: var(--sf-display); font-weight: 700;
    font-size: 24.5px; color: var(--coral); letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }
  @keyframes now-flash { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
  /* Hard-coded water reminder at the top of each hour */
  .hour-water {
    display: flex; align-items: center; gap: 8px;
    margin: 0 0 6px 4px; padding: 6px 12px;
    background: var(--accent-soft);

  /* ---- Per-task duration bubble (far right of each row) ---- */

  .fin-input { background: rgba(255,255,255,0.04); border: 1px solid var(--accent-line); border-radius: 10px; color: var(--fg); padding: 9px 12px; font-size: 1.05rem; font-family: inherit; width: 170px; text-align: right; }

  /* Inventory list switcher (small icons + bottom line) */

  /* Total owned counter (top-right) */

  .ms-section, .supp-section { background: rgba(255,255,255,0.03); border: 1px solid var(--accent-line); border-radius: 14px; padding: 14px 16px; margin: 0 0 20px; }

  .inv-quote { font-style: italic; color: var(--fg-soft); font-size: 13px; line-height: 1.55; border-left: 3px solid var(--accent-line); padding: 4px 0 4px 13px; margin: 0 0 16px; }
  .inv-bag-photo { height: 118px; width: auto; max-width: 48%; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.45)); }
  .task-bag-photo { display: flex; justify-content: center; margin: 18px 0 6px; }
  .task-bag-photo .inv-bag-photo { max-width: 70%; }

  /* Paramedic / hospital go-bag checklist */
  .pb-section {
    background: rgba(224,150,127,0.08); border: 1px solid rgba(224,150,127,0.35);
    border-radius: 14px; padding: 14px 16px; margin: 4px 0 20px;
  }
  .pb-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .pb-title { font-family: var(--sf-display); font-weight: 900; font-size: 17.5px; color: var(--fg); letter-spacing: -0.01em; }
  .pb-status { font-size: 10.5px; font-weight: 800; letter-spacing: 0.08em; padding: 3px 9px; border-radius: 999px; }
  .pb-status.ready { background: var(--green); color: #0c1a12; }

  .pb-fn { font-size: 12.5px; color: var(--fg-soft); margin-top: 3px; }
  .pb-loc { font-size: 12.5px; font-weight: 700; color: var(--accent); margin: 6px 0 10px; }
  .pb-list { display: flex; flex-direction: column; gap: 0; }
  .pb-item { display: flex; align-items: center; gap: 7px; padding: 1px 2px; border-bottom: 1px solid rgba(232,228,216,0.05); }
  .pb-box {
    flex: 0 0 auto; width: 17px; height: 17px; border-radius: 5px; cursor: pointer;

  .pb-text { flex: 1 1 auto; min-width: 0; font-size: 13.5px; line-height: 1.25; color: var(--fg); }

  .pb-del { flex: 0 0 auto; background: none; border: none; color: var(--fg-faint); cursor: pointer; font-size: 11.5px; padding: 1px 3px; }

  .gr-deal { order: -1; flex: 0 0 100%; display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding: 5px 9px; background: rgba(45,90,160,0.12); border: 1px solid rgba(45,90,160,0.32); border-radius: 8px; font-size: 11px; font-weight: 700; color: #2d5aa0; }
  .gr-deal-logo { width: 28px; height: 28px; object-fit: contain; border-radius: 50%; background: #fff; flex: 0 0 auto; }
  .gr-itemimg { flex: 0 0 auto; width: 48px; height: 40px; object-fit: contain; border-radius: 6px; background: #fff; margin-left: 6px; }
  .pb-empty { color: var(--fg-soft); font-size: 13.5px; padding: 8px 2px; }
  .pb-add { display: flex; gap: 6px; margin-top: 10px; }
  .pb-input { flex: 1 1 auto; min-width: 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(232,228,216,0.16); border-radius: 8px; color: var(--fg); font-family: var(--sf-text); font-size: 14.5px; padding: 8px 10px; }
  .pb-input:focus { outline: none; border-color: var(--coral); }
  .pb-add-btn { flex: 0 0 auto; background: var(--coral); color: #2a1410; border: none; border-radius: 8px; font-weight: 800; font-size: 13.5px; padding: 8px 16px; cursor: pointer; }
  .pb-add-btn:hover { filter: brightness(1.08); }
  .pb-warn { font-size: 11.5px; color: var(--coral); margin-top: 10px; }

  /* DKNY fanny pack section (navy themed, mirrors the paramedic bag) */
  .fanny-section {
    background: rgba(90,120,180,0.08); border: 1px solid rgba(120,150,210,0.35);
    border-radius: 14px; padding: 14px 16px; margin: 0 0 20px;
  }
  .fanny-photo { display: flex; justify-content: center; margin: 0 0 8px; }
  .fanny-photo .inv-bag-photo { height: 120px; max-width: 80%; }

  /* Furniture acquisition list */
  .furn-section {
    background: rgba(123,169,138,0.08); border: 1px solid rgba(123,169,138,0.35);
    border-radius: 14px; padding: 14px 16px; margin: 0 0 20px;
  }
  .furn-section .pb-title { display: inline-flex; align-items: center; gap: 7px; }
  .furn-section .pb-title svg { vertical-align: middle; }
  .furn-total { font-family: var(--sf-display); font-weight: 800; font-size: 12.5px; color: var(--accent); font-variant-numeric: tabular-nums; }
  .furn-sub { font-family: var(--sf-display); font-weight: 800; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--green-light); margin: 12px 0 4px; }
  .inv-avatar-row { display: flex; align-items: flex-end; gap: 10px; margin: 4px 0 14px; }
  .inv-avatar { flex: 0 0 auto; animation: sorty-bob 3s ease-in-out infinite; }
  @keyframes sorty-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  .inv-bubble {
    position: relative; background: var(--bg-1); border: 1px solid var(--accent-line);
    border-radius: 14px; padding: 10px 14px; font-size: 13.5px; color: var(--fg); line-height: 1.4;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3); flex: 1 1 auto;
  }
  .inv-bubble:before {
    content: ''; position: absolute; left: -7px; bottom: 16px; width: 0; height: 0;
    border: 7px solid transparent; border-right-color: var(--accent-line);
  }
  .inv-progress {
    position: relative; height: 18px; background: rgba(255,255,255,0.06); border-radius: 999px;
    overflow: hidden; margin-bottom: 14px; border: 1px solid rgba(232,228,216,0.1);
  }
  .inv-progress-bar { height: 100%; background: linear-gradient(90deg, #7ba98a, #9ccab0); transition: width 0.4s ease; }
  .inv-progress-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10.5px; font-weight: 700; color: var(--fg); letter-spacing: 0.04em; }
  .inv-add { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .inv-input { flex: 1 1 160px; min-width: 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(232,228,216,0.16); border-radius: 8px; color: var(--fg); font-family: var(--sf-text); font-size: 14.5px; padding: 8px 10px; }
  .inv-cat-input { flex: 0 1 120px; min-width: 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(232,228,216,0.16); border-radius: 8px; color: var(--fg); font-size: 13.5px; padding: 8px 10px; }
  .inv-input:focus, .inv-cat-input:focus { outline: none; border-color: var(--accent); }
  .inv-add-btn { flex: 0 0 auto; background: var(--accent); color: #2a1d08; border: none; border-radius: 8px; font-weight: 800; font-size: 13.5px; padding: 8px 16px; cursor: pointer; }
  .inv-add-btn:hover { filter: brightness(1.08); }
  .inv-group { margin-bottom: 14px; }
  .inv-cat-head { font-family: var(--sf-display); font-weight: 800; font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--accent); border-bottom: 1px solid var(--accent-line); padding-bottom: 4px; margin-bottom: 6px; }
  .inv-cat-count { color: var(--fg-faint); font-weight: 600; }
  .inv-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 4px; border-bottom: 1px solid rgba(232,228,216,0.06); }
  .inv-item.inv-sorted { opacity: 0.72; }
  .inv-name { font-size: 14.5px; color: var(--fg); flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .inv-name.inv-strike { text-decoration: line-through; color: var(--fg-faint); }
  .inv-chips { display: flex; gap: 4px; flex: 0 0 auto; align-items: center; }
  .inv-chip { background: rgba(255,255,255,0.05); border: 1px solid rgba(232,228,216,0.16); color: var(--fg-soft); border-radius: 999px; font-size: 10.5px; font-weight: 700; padding: 3px 8px; cursor: pointer; transition: all 0.12s ease; }
  .inv-chip:hover { border-color: rgba(232,228,216,0.4); }
  .inv-chip.on.keep { background: var(--green); border-color: var(--green); color: #0c1a12; }
  .inv-chip.on.donate { background: #7aa0d0; border-color: #7aa0d0; color: #0c1422; }
  .inv-chip.on.toss { background: var(--coral); border-color: var(--coral); color: #2a1410; }
  .inv-del { background: none; border: none; color: var(--fg-faint); cursor: pointer; font-size: 12.5px; padding: 2px 4px; }
  .inv-del:hover { color: var(--coral); }
  .inv-empty { color: var(--fg-soft); font-size: 13.5px; text-align: center; padding: 20px; }
  .hour-line.plan-head { margin-top: 18px; opacity: 0.85; }
  .hour-line.plan-head .hour-label {
    color: rgba(232,228,216,0.55); font-size: 10.5px; letter-spacing: 0.18em;
  }
  .dur-input {
    width: 56px;
    font-family: var(--sf-mono); font-size: 11.5px; font-weight: 600;
    color: var(--accent); text-align: center;
    background: rgba(212,165,116,0.12);
    border: 1px solid rgba(212,165,116,0.5);
    border-radius: 999px; padding: 3px 6px; outline: none;
  }
  .volume-icon-btn {
    background: transparent; border: none; color: var(--fg);
    width: 28px; height: 28px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; border-radius: 50%;
    transition: background 0.18s ease;
    flex-shrink: 0;
  }
  .volume-icon-btn:hover { background: rgba(255,255,255,0.1); }

  .mute-toggle-btn {
    flex-shrink: 0; white-space: nowrap; cursor: pointer;
    background: rgba(255,255,255,0.06); color: var(--fg);
    border: 1px solid rgba(232,228,216,0.22); border-radius: 8px;
    font-family: var(--sf-display); font-size: 11.5px; font-weight: 600; letter-spacing: -0.01em;
    padding: 4px 9px; transition: all 0.15s ease;

  .mute-toggle-btn.is-muted {
    background: rgba(224,150,127,0.18); border-color: rgba(224,150,127,0.5); color: var(--coral);
  }

  .volume-slider {
    -webkit-appearance: none; appearance: none;
    width: 110px; height: 4px;
    background: rgba(232,228,216,0.18);
    border-radius: 999px;

    margin: 0; padding: 0;
    background-image: linear-gradient(to right, var(--accent), var(--accent));
    background-repeat: no-repeat;

  /* Filled portion via gradient set in JS */

    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;

  .volume-slider::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent);
    cursor: pointer; border: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .volume-slider::-moz-range-thumb:hover { transform: scale(1.2); }

  .volume-pct {
    font-family: var(--sf-mono); font-size: 10.5px;
    color: rgba(232,228,216,0.55);
    min-width: 22px; text-align: right;
    letter-spacing: 0.05em;
  }

  .circle-row {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-bottom: 4px; width: 100%;

     circle and buttons stay on screen while the task list scrolls. */

    .time-sticky {
      position: sticky; top: var(--tabs-h, 0px); z-index: 30;
      background: rgba(13,17,25,0.96);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding-bottom: 10px; border-bottom: 1px solid rgba(232,228,216,0.08);
    }
  }
  .nav-arrow {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(232,228,216,0.12);
    color: rgba(232,228,216,0.7);
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.18s ease; flex-shrink: 0;

    border-color: rgba(212,165,116,0.5);

    opacity: 0.25; cursor: default; transform: none;
    background: rgba(255,255,255,0.04);
    border-color: rgba(232,228,216,0.12);
    color: rgba(232,228,216,0.7);
  }
  .nav-arrow[aria-disabled="true"]:hover {
    background: rgba(255,255,255,0.04);
    border-color: rgba(232,228,216,0.12);
    color: rgba(232,228,216,0.7);
    transform: none;
  }
  .kbd-hint {
    font-family: var(--sf-mono); font-size: 9.5px;
    letter-spacing: 0.2em; opacity: 0.4; margin-bottom: 14px;
    text-align: center;
  }
  .kbd {
    display: inline-block; padding: 1px 5px; border-radius: 3px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(232,228,216,0.15);
    margin: 0 2px; font-size: 9.5px;
  }
  .btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(232,228,216,0.15);
    color: var(--fg); padding: 12px 18px; border-radius: 999px; cursor: pointer;
    font-family: var(--sf-display); font-size: 14.5px; font-weight: 500;
    letter-spacing: -0.01em; transition: all 0.2s ease;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(232,228,216,0.3); }
  .btn-primary { background: var(--accent); color: var(--bg-1); border-color: var(--accent); }
  .btn-primary:hover { background: #e0b585; border-color: #e0b585; }
  .btn-done {
    background: rgba(107,155,122,0.15); border-color: rgba(107,155,122,0.5);
    color: var(--green-light); padding: 12px;
  }
  .btn-done:hover { background: rgba(107,155,122,0.25); border-color: var(--green-light); color: #a8d4b3; }
  .btn-icon { padding: 12px; }
  .btn-nav { font-size: 13.5px; padding: 11px 15px; color: rgba(232,228,216,0.8); }
  .btn-nav svg { stroke: currentColor; fill: none; stroke-width: 2.5; }
  .btn:disabled { opacity: 0.32; cursor: default; }
  .btn:disabled:hover { background: rgba(255,255,255,0.05); border-color: rgba(232,228,216,0.15); }

  /* ---- Action button grid (the screenshot's per-task actions) ---- */
  .actions-grid {
    width: 100%; max-width: 1000px;
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 14px;
  }
  .actions-row {
    display: flex; gap: 6px; flex-wrap: nowrap; justify-content: center;
  }
  /* All action buttons squished into a single row (scrolls if very narrow). */
  .actions-row.actions-3col {
    display: flex; flex-wrap: nowrap; justify-content: center; align-items: center;
    gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .actions-group { display: flex; gap: 4px; min-width: 0; flex-wrap: nowrap; }
  .actions-left { justify-content: flex-start; }
  .actions-center { justify-content: center; }
  .actions-right { justify-content: flex-end; }
  .abtn {
    flex: 0 0 auto;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(232,228,216,0.18);
    color: var(--fg);
    padding: 4px 9px; border-radius: 999px; cursor: pointer;
    font-family: var(--sf-display); font-size: 10.5px; font-weight: 600;
    letter-spacing: -0.01em; line-height: 1.1; transition: all 0.15s ease;
    display: inline-flex; align-items: center; justify-content: center; gap: 3px;
    white-space: nowrap;
  }
  .abtn:hover { background: rgba(255,255,255,0.1); border-color: rgba(232,228,216,0.35); transform: translateY(-1px); }
  .abtn:active { transform: translateY(0); }
  /* Did it — solid green, the primary affirmative */
  .abtn-did {
    background: var(--green); border-color: var(--green); color: var(--bg-0);
  }
  .abtn-did:hover { background: var(--green-light); border-color: var(--green-light); }
  /* Did + repeat / Did + delete — green outline */
  .abtn-did-ghost {
    background: rgba(123,169,138,0.12); border-color: rgba(123,169,138,0.5);
    color: var(--green-light);
  }
  .abtn-did-ghost:hover { background: rgba(123,169,138,0.22); border-color: var(--green-light); color: #bfe0cd; }
  /* Later today / Later tomorrow — amber */
  .abtn-later {
    background: rgba(212,165,116,0.12); border-color: rgba(212,165,116,0.45);
    color: var(--accent);
  }
  .abtn-later {
    background: var(--accent-soft); border-color: var(--accent-line);
    color: var(--accent);
  }
  .abtn-later:hover { background: rgba(224,176,121,0.22); border-color: var(--accent); color: #f0c896; }
  /* Skip today — neutral muted */
  .abtn-skip { color: rgba(236,232,221,0.85); }
  /* Delete forever / Failed — single warm coral */
  .abtn-danger, .abtn-fail {
    background: rgba(224,150,127,0.10); border-color: rgba(224,150,127,0.45);
    color: var(--coral);
  }
  .abtn-danger:hover, .abtn-fail:hover { background: rgba(224,150,127,0.2); border-color: var(--coral); color: #eeb1a0; }

  .list-section { width: 100%; max-width: 560px; margin: 0 auto; }
  .list-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; padding: 0 4px;
  }

  .code-tasks-note {
    text-align: center; font-family: var(--sf-display); font-weight: 600;
    font-size: 13.5px; color: rgba(232,228,216,0.4); letter-spacing: 0.02em;
    padding: 8px 0 10px; font-style: italic;
  }
  .quick-add-wrap {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 12px;
    border: 1.5px dashed rgba(212, 165, 116, 0.35);
    background: rgba(212, 165, 116, 0.04);
    margin-bottom: 8px;
    transition: all 0.2s ease;
  }
  .quick-add-wrap:focus-within {
    border-color: rgba(212, 165, 116, 0.7);
    background: rgba(212, 165, 116, 0.08);
    border-style: solid;
  }
  .quick-add-plus {
    color: rgba(212, 165, 116, 0.7);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .quick-add-input {
    flex: 1;
    background: transparent; border: none; outline: none;
    color: var(--fg);
    font-family: var(--sf-display); font-size: 15.5px;
    font-weight: 500; letter-spacing: -0.01em;
    padding: 2px 0;
  }
  .quick-add-input::placeholder {
    color: rgba(232,228,216,0.35); font-style: italic; font-weight: 400;
  }
  /* Location field on the far right of the quick-add row */
  .quick-add-location {
    flex-shrink: 0;
    width: 120px;
    background: rgba(212,165,116,0.08);
    border: 1px solid rgba(212,165,116,0.25);
    border-radius: 999px; outline: none;
    color: var(--accent);
    font-family: var(--sf-display); font-size: 12.5px;
    font-weight: 500; letter-spacing: -0.005em;
    padding: 4px 10px;
    transition: all 0.2s ease;
  }
  .quick-add-location:focus {
    border-color: rgba(212,165,116,0.6);
    background: rgba(212,165,116,0.14);
  }
  .quick-add-location::placeholder {
    color: rgba(212,165,116,0.45); font-style: italic; font-weight: 400;
  }
  @media (max-width: 460px) {
    .quick-add-location { width: 90px; }
  }

  /* Drag-and-drop — whole row is draggable, no handle */
  .task-item.dragging {
    opacity: 0.4; cursor: grabbing;
    transform: scale(0.98);
  }
  .task-item.drag-over-top {
    box-shadow: 0 -2px 0 var(--accent);
  }
  .task-item.drag-over-bottom {
    box-shadow: 0 2px 0 var(--accent);
  }

  /* Per-task play button — triangle, larger, rounded corners */
  .task-play-btn {
    background: transparent;
    border: none;
    color: var(--accent);
    width: 28px; height: 28px; border-radius: 8px;
    cursor: pointer; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    margin-top: 0;
    transition: all 0.18s ease;
    padding: 0;
  }
  .task-play-btn:hover {
    background: rgba(212, 165, 116, 0.15);
    color: var(--accent);
    transform: scale(1.12);
  }
  .task-play-btn.playing {
    background: rgba(212, 165, 116, 0.2);
    color: var(--accent);
    animation: pulse-ring 2s ease-in-out infinite;
  }
  .task-play-btn svg { display: block; }

  /* Default cursor on whole row: normal, so text can be selected & copied. */
  .task-item { cursor: default; }
  /* Drag handle — the only place that starts a reorder, so text stays selectable */
  .drag-handle {
    flex-shrink: 0; width: 16px; text-align: center;
    cursor: grab; color: rgba(232,228,216,0.32);
    font-size: 14.5px; line-height: 1; letter-spacing: -1px;
    user-select: none; -webkit-user-select: none;
    align-self: center;
  }
  .drag-handle:hover { color: rgba(232,228,216,0.7); }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle.empty { visibility: hidden; cursor: default; }
  /* All task text is freely selectable / copyable */
  .task-name-text, .location-inline, .dur-bubble, .hour-label,
  .sub-item-text, .center-task, .center-sub, .tab-panel, .task-tag {
    user-select: text; -webkit-user-select: text;
  }
  .task-item input,
  .task-item .check-circle,
  .task-item .location-inline,
  .task-item .location-add,
  .task-item .remove-btn,
  .task-item .task-name-text,
  .task-item .sub-item-text,
  .task-item .sub-add,
  .task-item .check-small,
  .task-item .task-play-btn,
  .task-item .task-tag {
    cursor: pointer;
  }
  .task-item input { cursor: text; }

  .list-label { font-family: var(--sf-mono); font-size: 10.5px; letter-spacing: 0.3em; opacity: 0.4; }
  .add-btn {
    background: transparent; border: 1px solid rgba(232,228,216,0.15);
    color: rgba(232,228,216,0.7); cursor: pointer; font-size: 10.5px;
    letter-spacing: 0.15em; padding: 5px 11px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 5px;
    transition: all 0.2s ease; font-family: var(--sf-mono);
  }
  .add-btn:hover { background: rgba(255,255,255,0.06); color: var(--fg); }

  .task-item {
    padding: 0 12px; border-radius: 7px; margin-bottom: 0;
    transition: background 0.4s ease, border-color 0.4s ease, opacity 0.4s ease;
    border: 1px solid transparent; position: relative;
  }
  .task-current { background: rgba(212,165,116,0.08); border-color: rgba(212,165,116,0.3); }
  .task-done { opacity: 0.55; }
  .task-pending { opacity: 0.9; }
  .task-pinned { cursor: default; }
  /* Pinned (clock-locked) tasks read in a faded, cooler tint so they're clearly
     the fixed anchors of each hour and not regular movable tasks. */
  .task-pinned .task-name-text { color: var(--fg-soft); }
  .task-pinned .dur-bubble { opacity: 0.7; }
  .pin-marker { font-size: 11.5px; opacity: 0.7; flex-shrink: 0; cursor: default; }

  .task-main-row { display: flex; align-items: center; gap: 8px; min-height: 22px; }
  .task-body { flex: 1; min-width: 0; }
  /* Name row: don't wrap — let text extend horizontally instead of stacking */
  .task-row { display: flex; align-items: baseline; gap: 6px; flex-wrap: nowrap; min-width: 0; }
  .task-name-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Right-side slot for tags + location — always stays right, never wraps below */
  .task-location-slot {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 5px;
    min-height: 17px;
    justify-content: flex-end;
    flex-wrap: wrap; max-width: 55%;
  }
  /* Tag pills inside the slot shouldn't have the left margin they use elsewhere */
  .task-location-slot .task-tag { margin-left: 0; }

  .check-circle {
    width: 17px; height: 17px; border-radius: 50%;
    border: 1.5px solid rgba(232,228,216,0.3); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s ease;
  }
  .check-circle:hover { border-color: rgba(232,228,216,0.6); transform: scale(1.1); }
  .check-circle.done { background: var(--green); border-color: var(--green); }
  .check-circle.done:hover {
    background: #d97a6c; border-color: #d97a6c;
    transform: scale(1.1);
  }
  .check-circle.current { border-color: var(--accent); background: rgba(212,165,116,0.15); }
  .check-circle[title]:hover::after { content: ""; }

  /* ---- Coin button (replaces the check circle) ---- */
  .coin-btn {
    position: relative; width: 21px; height: 21px; flex-shrink: 0;
    border-radius: 50%; cursor: pointer; padding: 0;
    border: 1.5px solid #b8860b;
    background: radial-gradient(circle at 35% 30%, #ffe89a 0%, #f4c544 42%, #d4a017 78%, #a9790f 100%);
    box-shadow: 0 1px 2px rgba(0,0,0,0.35), inset 0 1px 1px rgba(255,255,255,0.55);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s ease, filter 0.2s ease, opacity 0.2s ease;
  }
  .coin-btn .coin-glyph {
    font-family: var(--sf-display); font-weight: 900; font-size: 12.5px; line-height: 1;
    color: #9a6e08;
    text-shadow: 0 1px 0 rgba(255,240,190,0.7), 0 -1px 1px rgba(80,52,0,0.55);
  }
  .coin-btn:hover { transform: scale(1.18) rotate(-8deg); }
  .coin-btn:active { transform: scale(0.92); }
  /* Current task's coin looks identical to the rest — just a subtle warm halo. */
  .coin-btn.current { box-shadow: 0 0 6px 1px rgba(244,197,68,0.55), 0 1px 2px rgba(0,0,0,0.35), inset 0 1px 1px rgba(255,255,255,0.55); }
  .coin-btn.collected { filter: grayscale(0.7) brightness(0.8); opacity: 0.5; }
  .coin-btn.collected .coin-glyph { opacity: 0; }
  .coin-btn .coin-check {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #2c4a2e;
  }
  .coin-btn .coin-check svg { width: 12px; height: 12px; }

  /* A coin that flies up to the money counter when a task is collected */
  .fly-coin {
    position: fixed; z-index: 9000; font-size: 22.5px; line-height: 1; pointer-events: none;
    transform: translate(0,0) scale(1); opacity: 1;
    transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1), opacity 0.6s ease;
    will-change: transform, opacity;
  }

  /* Money-circle (Time tab): coins slipping away every second */
  .losing-coin {
    position: fixed; z-index: 35; line-height: 0; pointer-events: none;
    transition: transform 1.05s cubic-bezier(0.45,0.05,0.75,1), opacity 1.05s ease;
    will-change: transform, opacity; opacity: 0.95;
  }

  /* Circle of coins around the timer — coins drop as the time diminishes. */
  .coin-ring { position: absolute; top: 0; left: 0; width: 216px; height: 216px; pointer-events: none; }
  .ring-coin {
    position: absolute; transform: translate(-50%, -50%);
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--sf-display); font-weight: 900; font-size: 11.5px; color: #7a5300;
    background: radial-gradient(circle at 35% 30%, #ffe89a 0%, #f4c544 42%, #d4a017 78%, #a9790f 100%);
    border: 1.5px solid #b8860b;
    box-shadow: 0 1px 2px rgba(0,0,0,0.35), inset 0 1px 1px rgba(255,255,255,0.5);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .ring-coin.gone {
    background: none; border: 1.5px dashed rgba(244,197,68,0.22);
    color: transparent; box-shadow: none;
  }

  /* The shrinking dollar amount, printed on a US-style banknote. */
  .bill {
    position: relative; width: 174px; margin: 3px auto; border-radius: 6px; overflow: hidden;
    background:
      repeating-linear-gradient(0deg, rgba(40,90,60,0.06) 0 2px, transparent 2px 4px),
      repeating-linear-gradient(90deg, rgba(40,90,60,0.05) 0 3px, transparent 3px 6px),
      radial-gradient(ellipse at center, #e9f1e4 0%, #d4e4d1 68%, #c4dac3 100%);
    border: 1px solid #2f6f49;
    box-shadow: 0 3px 12px rgba(0,0,0,0.45);
    color: #2c5d3c; font-family: Georgia, "Times New Roman", serif;
  }
  .bill-edge {
    position: relative; margin: 3px; padding: 6px 7px 5px;
    border: 1.5px solid #3a7a52; border-radius: 4px;
    box-shadow: inset 0 0 0 1px rgba(58,122,82,0.35);
  }
  .bill-num { position: absolute; font-weight: 700; font-size: 9.5px; color: #2f6f49; }
  .bn-tl { top: 1px; left: 4px; } .bn-tr { top: 1px; right: 4px; }
  .bn-bl { bottom: 1px; left: 4px; } .bn-br { bottom: 1px; right: 4px; }
  .bill-bank { text-align: center; font-size: 6.5px; letter-spacing: 0.1em; text-transform: uppercase; color: #2f6f49; }
  .bill-nation { text-align: center; font-size: 7px; letter-spacing: 0.05em; text-transform: uppercase; color: #234e34; margin-top: 1px; font-weight: 700; }
  .bill-center { display: flex; align-items: center; justify-content: center; gap: 5px; margin: 2px 0 1px; }
  .bill-portrait {
    width: 26px; height: 31px; border-radius: 50% / 55%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 15.5px;
    background: radial-gradient(circle at 50% 38%, #f4f8f0, #cfe0cc);
    border: 1px solid #3a7a52; box-shadow: inset 0 0 4px rgba(47,111,73,0.4);
  }
  .bill-amount {
    font-family: var(--sf-display); font-weight: 900; font-size: 23.5px; line-height: 1;
    color: #1f4d33; letter-spacing: -0.02em; text-shadow: 0 1px 0 rgba(255,255,255,0.45);
    font-variant-numeric: tabular-nums;
  }
  .bill-seal { font-size: 13.5px; color: #2f6f49; opacity: 0.8; flex-shrink: 0; }
  .bill-tender { text-align: center; font-size: 6.5px; letter-spacing: 0.14em; text-transform: uppercase; color: #3a7a52; margin-top: 1px; }
  .bill.warn { border-color: #b89030; }
  .bill.warn .bill-amount { color: #8a6a1e; }
  .bill.lost {
    background: radial-gradient(ellipse at center, #f1ddd7 0%, #e3c3bc 100%); border-color: var(--coral);
  }
  .bill.lost .bill-edge { border-color: #c87c6e; }
  .bill.lost .bill-amount { color: #9c3a2c; }
  .bill.lost .bill-num, .bill.lost .bill-bank, .bill.lost .bill-nation, .bill.lost .bill-seal, .bill.lost .bill-tender { color: #9c4a3c; }

  /* Big current-time clock, fixed top-right (Time tab only) */
  /* Life Goals progress panel — top-left, larger fonts */
  .lifegoals-top {
    margin: 4px 0 18px; padding: 16px 18px 17px;
    width: 100%; max-width: 470px; box-sizing: border-box;
    background: linear-gradient(180deg, rgba(244,197,68,0.09), rgba(20,24,34,0));
    border: 1px solid rgba(232,228,216,0.16); border-radius: 18px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.18);
  }
  .lifegoals-top h2 {
    margin: 0 0 14px; font-family: var(--sf-display);
    font-size: 27px; line-height: 1.05; font-weight: 800;
    letter-spacing: -0.02em; color: var(--fg);
  }
  .lg-row { margin-bottom: 14px; }
  .lg-row:last-child { margin-bottom: 0; }
  .lg-row-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 6px; }
  .lg-label { font-size: 17px; font-weight: 700; color: var(--fg); letter-spacing: -0.01em; overflow-wrap: anywhere; min-width: 0; }
  .lg-check { color: #36b85f; font-weight: 900; }
  .lg-pct { font-size: 16px; font-weight: 800; color: #f4c544; font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .lg-pct.done { color: #5fd07f; }
  .lg-bar { position: relative; height: 16px; border-radius: 999px; background: rgba(232,228,216,0.12); overflow: hidden; }
  .lg-bar.lg-bar-grey { background: rgba(140,140,140,0.45); }
  .lg-barlabel { position: absolute; top: 50%; left: 8px; transform: translateY(-50%); font-size: 10px; font-weight: 800; color: #fff; letter-spacing: 0.02em; text-shadow: 0 1px 2px rgba(0,0,0,0.6); pointer-events: none; }
  .lg-gain { position: absolute; top: 0; bottom: 0; box-sizing: border-box; display: flex; align-items: center; justify-content: center; border-left: 1.5px dashed rgba(255,255,255,0.9); border-right: 1.5px dashed rgba(255,255,255,0.9); background: rgba(255,255,255,0.16); pointer-events: none; }
  .lg-gain span { font-size: 8px; font-weight: 800; color: #fff; letter-spacing: 0.02em; text-shadow: 0 1px 2px rgba(0,0,0,0.75); white-space: nowrap; }
  .goal-bars { margin: 8px 0 20px; max-width: 100%; column-count: 3; column-gap: 36px; }
  .goal-bars > * { break-inside: avoid; -webkit-column-break-inside: avoid; }
  .lg-row { break-inside: avoid; -webkit-column-break-inside: avoid; }
  @media (max-width: 980px) { .goal-bars { column-count: 2; } }
  @media (max-width: 640px) { .goal-bars { column-count: 1; } }
  .lg-emoji { display: inline-block; font-size: 16px; line-height: 1; }
  .lg-chaingroup { position: relative; margin: 0 0 14px; padding-left: 14px; }
  .lg-chaingroup::before {
    content: ''; position: absolute; left: 3px; top: 7px; bottom: 9px;
    width: 3px; border-radius: 3px;
    background: linear-gradient(180deg, #ff8ec2, #ff2e88);
  }
  .lg-chaingroup.teal::before {
    background: linear-gradient(180deg, #5fd0c0, #22a58f);
  }
  .lg-chaingroup.ai::before {
    background: linear-gradient(180deg, #9aa7c7, #5a6b8c);
  }
  /* Dating chain parked at the bottom + faded out as "not currently relevant" */
  .lg-chaingroup.faded { opacity: 0.12; filter: grayscale(1); margin-top: 22px; padding-top: 14px; border-top: 1px dashed rgba(232,228,216,0.18); }
  /* Don't double-fade green rows that already sit inside the faded dating chain */
  .lg-chaingroup.faded .lg-row.lg-faded { opacity: 1; filter: none; }
  .lg-chaingroup.faded::before { background: linear-gradient(180deg, #9a9a9a, #6a6a6a); }
  .lg-chaingroup .lg-row:last-child { margin-bottom: 0; }

<script>
'use strict';

const DEFAULT_DURATION = 5 * 60; // default seconds per task (non-cooking)
// The schedule's hour labels start at the CURRENT clock hour (floored). Tasks
// don't move — only the time shown shifts. e.g. at 11:31 the first line is 11 AM.
function dayStartMin() {
  return new Date().getHours() * 60;
}
// Duration of a given task in seconds (minutes field, default 5).
function taskDurationSec(task) {
  const m = task && Number(task.duration) > 0 ? Number(task.duration) : 5;
  return Math.round(m * 60);
}
// Duration in seconds for the CURRENT task (used to reset the countdown).
function curDurationSec() {
  const c = (typeof getCurrent === 'function') ? getCurrent() : null;
  return taskDurationSec(c && c.task);
}

// The escalating display name for water/burn tasks, based on the real CLOCK
// HOUR each task's hour-block lands on. Each "hour-start" task (urinate / water
// floss) begins a new clock hour: the first at the current hour, the next an
// hour later, and so on — so the circle, the list, and the spoken line all match.
function dynamicNameFor(task, idx) {
  if (!task || (!task.hydration && !task.burn)) return null;
  const startHour = Math.floor(dayStartMin() / 60);
  let blockHour = startHour;
  let seenHourStart = false;
  for (let i = 0; i < state.tasks.length; i++) {
    if (state.completedIds && state.completedIds.includes(state.ids[i])) continue; // done tasks sit at the bottom, out of the flow
    const t = state.tasks[i];
    const hourStart = isPinned(t) && !t.hydration && !t.burn;
    if (hourStart) { if (seenHourStart) blockHour++; seenHourStart = true; }
    if (i === idx) break;
  }
  if (task.hydration) return `water ${125 * Math.max(1, blockHour - 7)} ml`;

// ---- App State ----
// Persisted to localStorage so your edits, checks, ordering, and additions
// survive page reloads AND any future updates to the app code.
//
// ⚠️ DO NOT CHANGE THIS KEY STRING. Changing it makes the app look for data
// under a new name, find nothing, and reload the default list — which wipes
// the user's tasks/order/edits. The key is permanent. When new fields are
// added later, migrate them inside loadPersistedState() (non-destructively)
// instead of bumping the key.
const STORAGE_KEY = 'tunetask-state-v2';
// Bump this ONLY when republishing the baked-in canonical task list (DEFAULT_TASKS).
// On load, if the saved state was seeded under an older version, the task list is
// refreshed to the new canonical list ONCE (other prefs are kept). Normal feature
// updates that don't change the task list must NOT bump this — that's what keeps
// the user's own edits/order intact between releases.
const SEED_VERSION = 9;
// Older keys this app has used. If the main key is empty (e.g. first load
// after an update that previously bumped the version), we adopt data from the
// newest available legacy key so nothing is lost — then re-save under STORAGE_KEY.
const LEGACY_KEYS = ['tunetask-state-v1', 'packing-assistant-state-v1'];

// Make sure every task has all the fields the current UI expects, WITHOUT
// discarding anything the user has. Safe to run on data from any past version.
function normalizeTasks(parsed) {
  if (!parsed || !Array.isArray(parsed.tasks)) return parsed;
  parsed.tasks = parsed.tasks.map(t => {
    const task = Object.assign({}, t);
    if (task.type === undefined) task.type = 'item';
    if (task.emoji === undefined) task.emoji = '';
    if (task.name === undefined) task.name = '';
    if (task.location === undefined) task.location = '';
    if (!(Number(task.duration) > 0)) task.duration = 5;
    if (task.time === undefined) {
      // Very old data stored the time inside `location`. If location looks like
      // a clock value and there's no separate time yet, move it over.
      if (/^\s*\d{1,2}:\d{2}\s*(am|pm)?\s*$/i.test(task.location || '')) {
        task.time = task.location.trim();
        task.location = '';
      } else {
        task.time = '';
      }
    }
    return task;
  });
  return parsed;
}

function loadPersistedState() {
  try {
    let raw = localStorage.getItem(STORAGE_KEY);
    // If nothing under the current key, adopt the newest legacy data we can find
    // so a user's existing tasks/order are never lost across an update.
    if (!raw) {
      for (const k of LEGACY_KEYS) {
        const legacy = localStorage.getItem(k);
        if (legacy) { raw = legacy; break; }
      }
    }
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    // Sanity check: must have tasks array & ids array of matching length
    if (!parsed || !Array.isArray(parsed.tasks) || !Array.isArray(parsed.ids)) return null;
    if (parsed.tasks.length !== parsed.ids.length) return null;

    // Migration: flatten any old group-type tasks into individual items
    // with a #tag matching the original group name. Preserves the user's
    // sub-item edits, emojis, and completion state.
    const hasGroups = parsed.tasks.some(t => t.type === 'group');
    if (hasGroups) {
      const newTasks = [];
      const newIds = [];
      let nextId = parsed.nextId || 0;
      parsed.tasks.forEach((task, i) => {
        const groupId = parsed.ids[i];
        if (task.type === 'group') {
          // Make a hashtag from the group name (e.g. "Fanny pack" → "#fannypack")
          const tag = '#' + (task.name || 'group').toLowerCase().replace(/[^a-z0-9_-]/g, '');
          (task.items || []).forEach(item => {
            const baseName = (item.name || '').trim();
            // Don't duplicate the tag if it's somehow already present
            const finalName = baseName.includes(tag) ? baseName : `${baseName} ${tag}`.trim();
            newTasks.push({
              type: 'item',
              emoji: item.emoji !== undefined ? item.emoji : '',
              name: finalName,
              location: task.location || '',
            });
            // Preserve sub-item completion: use a fresh id, mark complete if it was done
            const newId = nextId++;
            newIds.push(newId);
            if (item.done) {
              parsed.completedIds = parsed.completedIds || [];
              parsed.completedIds.push(newId);
            }
          });
          // The group's own completedId is no longer meaningful — drop it
          if (parsed.completedIds) {
            parsed.completedIds = parsed.completedIds.filter(x => x !== groupId);
          }
        } else {
          newTasks.push(task);
          newIds.push(groupId);
        }
      });
      parsed.tasks = newTasks;
      parsed.ids = newIds;
      parsed.nextId = nextId;
    }

    // Ensure every task has the fields the current UI needs (time/location/etc.)
    // without discarding any user data. Lets us add features without resets.
    normalizeTasks(parsed);

    return parsed;
  } catch (e) {
    /* load error ignored */
    return null;
  }
}

function buildDefaultState() {
  // Tasks: strip any inline `done` flag into completedIds
  const completedIds = [];
  const tasks = DEFAULT_TASKS.map((t, i) => {
    if (t.done) completedIds.push(i);
    const { done, ...rest } = t;
    const built = { type: 'item', emoji: rest.emoji || '', name: rest.name || '', location: rest.location || '', time: rest.time || '', duration: Number(rest.duration) > 0 ? Number(rest.duration) : 5 };
    if (rest.pinned) built.pinned = true;
    if (rest.hydration) built.hydration = true;
    if (rest.burn) built.burn = true;
    return built;
  });

  // Unfurnished: accept either plain strings or { name, done } objects
  const unfurnished = [];
  const unfurnishedDone = [];
  DEFAULT_UNFURNISHED.forEach((u, i) => {
    if (typeof u === 'string') {
      unfurnished.push(u);
    } else if (u && typeof u === 'object') {
      unfurnished.push(u.name || '');
      if (u.done) unfurnishedDone.push(i);
    }
  });

  return {
    tasks,
    ids: tasks.map((_, i) => i),
    nextId: tasks.length,
    completedIds,
    seedVersion: SEED_VERSION,
    tabNotes: {
      events: "🎂 June 14 — Mom's birthday 🎉",

// "Merchant — $12.34  (note)" becomes "$12.34 — Merchant  (note)". Lines that
// already start with the amount, headers, and blank lines are left untouched.
{
  const flipLine = (line) => {
    const m = line.match(/^([^$\n]+?)\s+—\s+(\$[\d,]+(?:\.\d+)?)(.*)$/);
    return m ? `${m[2]} — ${m[1].trim()}${m[3]}` : line;
  };
  const flip = (txt) => (txt || '').split('\n').map(flipLine).join('\n');

// ---- Undo history ----
const UNDO_LIMIT = 50;
const undoStack = [];

// Snapshot the state fields that should be undoable. Excludes timer/play state.
function snapshotState() {
  return JSON.stringify({
    tasks: state.tasks,
    ids: state.ids,
    completedIds: state.completedIds,
    suitcaseRows: state.suitcaseRows,
    unfurnished: state.unfurnished,
    unfurnishedDone: state.unfurnishedDone,
    manualIdx: state.manualIdx,
    nextId: state.nextId,
  });
}

function pushUndo() {
  const snap = snapshotState();
  // Don't push duplicates back-to-back
  if (undoStack.length > 0 && undoStack[undoStack.length - 1] === snap) return;
  undoStack.push(snap);
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
}

function undo() {
  if (undoStack.length === 0) return;
  const snap = undoStack.pop();
  const parsed = JSON.parse(snap);
  state.tasks = parsed.tasks;
  state.ids = parsed.ids;
  state.completedIds = parsed.completedIds;
  state.suitcaseRows = parsed.suitcaseRows;
  if (parsed.unfurnished) state.unfurnished = parsed.unfurnished;
  if (parsed.unfurnishedDone) state.unfurnishedDone = parsed.unfurnishedDone;
  state.manualIdx = parsed.manualIdx;
  state.nextId = parsed.nextId;
  // Clear any in-progress edits since indices may have shifted
  state.editingNameIdx = null;
  state.editingLocationIdx = null;
  state.editingTimeIdx = null;
  state.editingSub = { taskIdx: null, subIdx: null };
  state.editingSuitcaseRow = null;
  state.editingUnfurnished = null;
  render();
}

// ---- Derived ----
function getOrder() {
  const active = [], done = [];
  state.ids.forEach((id, idx) => {
    if (state.completedIds.includes(id)) done.push({ id, idx });
    else active.push({ id, idx });
  });
  return { active, done };
}

function getCurrent() {
  // If user manually navigated AND that task is still uncompleted, use it.
  // If the manually-selected task got checked off, fall through to the next
  // uncompleted task so the voice doesn't keep reading a done item.
  if (state.manualIdx !== null && state.manualIdx >= 0 && state.manualIdx < state.tasks.length) {
    const id = state.ids[state.manualIdx];
    if (!state.completedIds.includes(id)) {
      return { id, idx: state.manualIdx, task: state.tasks[state.manualIdx] };
    }
    // The manually-chosen task is done now — clear the manual override
    state.manualIdx = null;
  }
  // First active (uncompleted) task
  const { active } = getOrder();
  if (!active.length) return null;
  const entry = active[0];
  return { id: entry.id, idx: entry.idx, task: state.tasks[entry.idx] };
}

function goToPrevTask() {
  const cur = getCurrent();
  if (!cur) return;
  // Find the previous unchecked task in array order (skip done ones)
  let target = -1;
  for (let i = cur.idx - 1; i >= 0; i--) {
    if (!state.completedIds.includes(state.ids[i])) {
      target = i;
      break;
    }
  }
  // Fall back to immediate previous even if done, rather than going nowhere
  if (target === -1 && cur.idx > 0) target = cur.idx - 1;
  if (target === -1) return;
  state.manualIdx = target;
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  checkSpeakOnTaskChange();
  render();
}

function goToNextTask() {
  const cur = getCurrent();
  if (!cur) return;
  pushUndo();

  // Pinned (#set / urinate / water / burn) tasks are stuck to the clock and
  // never move. Skipping past one just advances the marker, leaving it in place.
  if (isPinned(cur.task)) {
    advanceCurrentPointer(cur.idx);
    state.timeLeft = curDurationSec();
    lastReminderTime = curDurationSec();
    checkSpeakOnTaskChange();
    render();
    return;
  }

  // Find the boundary between active and crossed-off tasks. We want to move
  // the current task to just AFTER the last active task (i.e. the position
  // right before the first crossed-off task), so it lands at the bottom of
  // the active list but stays above anything checked-off.
  const curId = cur.id;
  const curIdx = cur.idx;

  // Remove current task from its current position
  const [movedTask] = state.tasks.splice(curIdx, 1);
  const [movedId] = state.ids.splice(curIdx, 1);

  // Find where to re-insert: just after the last non-completed task remaining.
  // Walk from the end of the array backward until we find an active task,
  // then insert right after it.
  let insertAt = state.tasks.length; // default: at the very end
  for (let i = state.tasks.length - 1; i >= 0; i--) {
    const id = state.ids[i];
    if (!state.completedIds.includes(id)) {
      insertAt = i + 1; // insert right after this active task
      break;
    }
    // If we never find an active task (everything else is done), we want
    // the skipped task to go BEFORE the crossed-off pile.
    if (i === 0) insertAt = 0;
  }

  state.tasks.splice(insertAt, 0, movedTask);
  state.ids.splice(insertAt, 0, movedId);

  // Clear manual navigation so we resume picking the first active task
  state.manualIdx = null;
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  checkSpeakOnTaskChange();
  render();
}

// "Later today" — shift the current task ~1 hour later (down past ~60 min of
// upcoming tasks). Pinned tasks (urinate/water/burn) never move, so if the
// current task is pinned we just advance instead.
function handleLaterByHour() {
  const cur = getCurrent();
  if (!cur) return;
  if (isPinned(cur.task)) { goToNextTask(); return; }
  pushUndo();
  const curIdx = cur.idx;
  const [movedTask] = state.tasks.splice(curIdx, 1);
  const [movedId] = state.ids.splice(curIdx, 1);
  let acc = 0, insertAt = state.tasks.length;
  for (let i = curIdx; i < state.tasks.length; i++) {
    if (state.completedIds.includes(state.ids[i])) continue;
    acc += (Number(state.tasks[i].duration) > 0 ? Number(state.tasks[i].duration) : 5);
    if (acc >= 60) { insertAt = i + 1; break; }
  }
  state.tasks.splice(insertAt, 0, movedTask);
  state.ids.splice(insertAt, 0, movedId);
  state.manualIdx = null;
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  checkSpeakOnTaskChange();
  render();
}

function buildSpeechIntro(task) {
  if (!task) return '';
  const idx = state.tasks.indexOf(task);
  const name = stripTagsFromName((idx >= 0 ? dynamicNameFor(task, idx) : null) || task.name);
  const loc = (task.location || '').trim();
  const locSuffix = loc ? ` Located at ${loc}.` : '';
  if (task.type === 'group' && task.items && task.items.length) {
    const items = task.items.map(it => stripTagsFromName(it.name)).join(', ');
    return `${name}. ${items}.${locSuffix}`;
  }
  return `${name || ''}${locSuffix}`;
}

// A gold coin slips away from the bill and falls to the ground — a steady drip
// while the clock runs, to drive home "I'm losing money every second."
function dropLosingCoin() {
  if (state.activeTab !== 'time') return;
  const anchor = document.querySelector('.circle-wrap') || document.querySelector('.bill');
  if (!anchor || !anchor.getBoundingClientRect) return;
  const r = anchor.getBoundingClientRect();
  if (!r.width) return;
  const coin = document.createElement('div');
  coin.className = 'losing-coin';
  coin.innerHTML = `<svg width="22" height="22" viewBox="0 0 22 22" aria-hidden="true"><circle cx="11" cy="11" r="9" fill="none" stroke="#f4c544" stroke-width="2"/><text x="11" y="15" text-anchor="middle" font-size="11" font-weight="900" fill="#f4c544" font-family="sans-serif">$</text></svg>`;
  const startX = r.left + r.width / 2 + (Math.random() * 90 - 45);
  const startY = r.top + r.height * 0.78;
  coin.style.left = startX + 'px';
  coin.style.top = startY + 'px';
  document.body.appendChild(coin);
  const driftX = Math.random() * 60 - 30;
  const fall = 120 + Math.random() * 80;
  requestAnimationFrame(() => {
    coin.style.transform = `translate(${driftX}px, ${fall}px) rotate(${Math.random() * 200 - 100}deg)`;
    coin.style.opacity = '0';
  });
  setTimeout(() => coin.remove(), 1100);
}
