// ---- Water ladder scheduler ------------------------------------------------
// 16 escalating water tasks. Every new day they reset to the top, each due at
// the top of a successive hour (step k due at hour startHour + k). If an hour
// passes without the step being done, a duplicate is pushed to the bottom of
// the active list (once per clock hour, capped) so it keeps nagging until done.
const WATER_LABELS = [
  '💧 Water 125 mL', '💧 Water 250 mL', '💧 Water 375 mL', '💧 Water 500 mL',
  '💧 Water 625 mL', '💧 Water 750 mL', '💧 Water 875 mL', '💧 Water 1000 mL',
  '💧 Water 1125 mL', '💧 Water 1250 mL', '💧 Water 1375 mL', '💧 Water 1500 mL',
  '💧 Water 1625 mL', '💧 Water 1750 mL', '💧 Water 1875 mL', '💧 Water 2000 mL (2 L)'
];
const WATER_MAX_DUP = 8; // hard cap on nag-duplicates per step (no runaway lists)

// Step 0 (125 mL) is due at 8 AM; each later step is due one hour later
// (2000 mL lands at 11 PM). Fixed clock anchor — not tied to when the app loads.
const WATER_START_HOUR = 8;
function waterStartHour() { return WATER_START_HOUR; }

function runWaterSchedule() {
  if (!Array.isArray(state.tasks)) return false;
  state.water = state.water || { day: null, hourDone: null };
  const now = new Date();
  const today = now.toDateString();
  const completed = new Set(state.completedIds || []);
  let changed = false;

  const newId = () => { if (typeof state.nextId !== 'number') state.nextId = state.ids.length; return state.nextId++; };
  const origIndexOf = (k) => state.tasks.findIndex(t => t && t.waterLadder && t.waterStep === k);

  function dropAllLadder() {
    const kt = [], ki = [];
    for (let i = 0; i < state.tasks.length; i++) {
      const t = state.tasks[i];
      if (t && (t.waterLadder || t.waterDup)) {
        const rid = state.ids[i];
        state.completedIds = (state.completedIds || []).filter(x => x !== rid);
        completed.delete(rid);
      } else { kt.push(t); ki.push(state.ids[i]); }
    }
    state.tasks = kt; state.ids = ki;
  }

  // 1) Daily reset (also first run): wipe ladder + dups, lay down fresh 16 at top.
  if (state.water.day !== today) {
    dropAllLadder();
    for (let k = WATER_LABELS.length - 1; k >= 0; k--) {
      const id = newId();
      state.tasks.unshift({ type: 'item', emoji: '', name: WATER_LABELS[k], location: '', duration: 5, waterLadder: true, waterStep: k, time: (k === 0 ? '8:05 AM' : '') });
      state.ids.unshift(id);
    }
    state.water.day = today;
    state.water.hourDone = null;
    changed = true;
  }

  // 2) Satisfaction: if a step's original OR any of its dups is checked, mark the
  //    original done and clear that step's leftover dups.
  for (let k = 0; k < WATER_LABELS.length; k++) {
    const oi = origIndexOf(k);
    const origDone = oi >= 0 && completed.has(state.ids[oi]);
    let dupDone = false;
    for (let i = 0; i < state.tasks.length; i++) {
      const t = state.tasks[i];
      if (t && t.waterDup && t.waterStep === k && completed.has(state.ids[i])) { dupDone = true; break; }
    }
    if (origDone || dupDone) {
      if (oi >= 0 && !completed.has(state.ids[oi])) { state.completedIds.push(state.ids[oi]); completed.add(state.ids[oi]); changed = true; }
      const kt = [], ki = [];
      for (let i = 0; i < state.tasks.length; i++) {
        const t = state.tasks[i];
        if (t && t.waterDup && t.waterStep === k && !completed.has(state.ids[i])) { changed = true; }
        else { kt.push(t); ki.push(state.ids[i]); }
      }
      state.tasks = kt; state.ids = ki;
    }
  }

  // 3) Duplicate-on-miss — once per clock hour. For each overdue, undone step,
  //    push a duplicate to the bottom of the active list (capped per step).
  const curHour = now.getHours();
  const startH = waterStartHour();
  if (state.water.hourDone !== curHour) {
    for (let k = 0; k < WATER_LABELS.length; k++) {
      const dueHour = startH + k;
      if (curHour <= dueHour) continue;               // not missed yet
      const oi = origIndexOf(k);
      if (oi >= 0 && completed.has(state.ids[oi])) continue; // already done
      let dupCount = 0;
      for (let i = 0; i < state.tasks.length; i++) {
        const t = state.tasks[i];
        if (t && t.waterDup && t.waterStep === k) dupCount++;
      }
      if (dupCount >= WATER_MAX_DUP) continue;
      // insert just before the first completed task → sits at bottom of active list
      let insertAt = state.tasks.length;
      for (let i = 0; i < state.tasks.length; i++) { if (completed.has(state.ids[i])) { insertAt = i; break; } }
      const id = newId();
      state.tasks.splice(insertAt, 0, { type: 'item', emoji: '', name: WATER_LABELS[k], location: '', duration: 5, waterDup: true, waterStep: k });
      state.ids.splice(insertAt, 0, id);
      changed = true;
    }
    state.water.hourDone = curHour;
  }

  // Make sure the 125 mL step always carries its 8:05 AM set time.
  const _s0 = state.tasks.find(t => t && t.waterLadder && t.waterStep === 0);
  if (_s0 && !_s0.time) { _s0.time = '8:05 AM'; changed = true; }

  if (changed && typeof savePersistedState === 'function') savePersistedState();
  return changed;
}

function enableAlerts() {
  try {
    if (typeof Notification === 'undefined') {
      alert('This browser does not support pop-up notifications.');
      return;
    }
    if (Notification.permission === 'granted') { fireHourlyNotifs(); setupHourlyNotifs(); render(); return; }
    Notification.requestPermission().then((p) => { if (p === 'granted') { fireHourlyNotifs(); setupHourlyNotifs(); } render(); });
  } catch (e) { render(); }
}

const HOUR_MS = 60 * 60 * 1000;
function checkReminders() {
  if (reminderShowing) return; // don't stack popups
  const now = new Date();
  // Action-item reminders (Mom's birthday, HeyGen email) no longer pop up —
  // they now live at the top of the home page. Set true to re-enable popups.
  const SHOW_ACTION_ITEM_POPUPS = false;
  // 1) Mom's birthday — once per session on June 14, 2026
  if (SHOW_ACTION_ITEM_POPUPS && now.getFullYear() === 2026 && now.getMonth() === 5 && now.getDate() === 14 && !momBdayShownSession) {
    if (showReminder('🎂', "Today is <b>Mom's birthday</b> (June 14)! 🎉 Give her a call.", "Today is your mom's birthday, June fourteenth. Give her a call.")) {
      momBdayShownSession = true;
    }
    return;
  }
  // 2) HeyGen affiliate email follow-up — Monday, June 1, 2026 at 12 PM and 6 PM.
  if (SHOW_ACTION_ITEM_POPUPS && now.getFullYear() === 2026 && now.getMonth() === 5 && now.getDate() === 1) {
    const h = now.getHours();
    if (h >= 12 && h < 18 && !heygenNoonShown) {
      if (showReminder('📧', "It's <b>noon Monday</b> — check your email for a reply on the <b>HeyGen affiliate link</b>.", "It's noon Monday. Check your email for a reply on the HeyGen affiliate link.")) {
        heygenNoonShown = true;
      }
      return;
    }
    if (h >= 18 && !heygenEveShown) {
      if (showReminder('📧', "It's <b>6 PM Monday</b> — check your email again for a reply on the <b>HeyGen affiliate link</b>.", "It's six PM Monday. Check your email again for a reply on the HeyGen affiliate link.")) {
        heygenEveShown = true;
      }
      return;
    }
  }
  // 3) Paramedic Bag — nag every 4 hours if it isn't fully packed.
  const pb = state.paramedicBag || [];
  if (pb.length) {
    const unpacked = pb.filter(i => !i.done).length;
    const FOUR_H = 4 * 60 * 60 * 1000;
    if (unpacked > 0 && Date.now() - (state.pbLastAlert || 0) >= FOUR_H) {
      const n = unpacked;
      if (showReminder('🚑', `Your <b>Paramedic Bag</b> isn't fully packed — ${n} item${n > 1 ? 's' : ''} still missing. Get it ready by the door.`, `Your paramedic bag is not fully packed. ${n} item${n > 1 ? 's' : ''} still missing. Get it ready by the door.`)) {
        state.pbLastAlert = Date.now();
        savePersistedState();
      }
      return;
    }
  }
}
// Check every minute while the page is open; first check a few seconds after load.
setInterval(checkReminders, 60 * 1000);
setTimeout(checkReminders, 6000);
// Keep the water ladder honest while the page stays open (daily reset rolls over
// at midnight; missed steps duplicate each new hour). Re-render only if it changed.
setInterval(() => { if (runWaterSchedule()) render(); }, 60 * 1000);
// Keep the big top-right clock ticking; show it on the Time tab only.
function tickTopClock() {
  const el = document.getElementById('top-clock');
  if (!el) return;
  el.textContent = nowCurrentTimeStr();
  el.style.display = (state.activeTab === 'time') ? 'block' : 'none';
}
setInterval(tickTopClock, 10 * 1000);

// Build / reset / catch-up the water ladder before the first paint.
runWaterSchedule();
// Start the countdown at the first task's own duration.
state.timeLeft = curDurationSec();
// initial render
render();
// Persist immediately under the current key. This "claims" any data that was
// adopted from a legacy key or normalized on load, so it survives future updates.
savePersistedState();

// ---- Big current-time clock, top-right (Time tab) ---------------------------
(function mountTopClock() {
  if (document.getElementById('top-clock')) return;
  const tc = document.createElement('div');
  tc.id = 'top-clock';
  tc.title = 'Current time';
  document.body.appendChild(tc);
  tickTopClock();
})();

// ---- Top-right running money total -----------------------------------------
(function mountMoneyCounter() {
  if (document.getElementById('money-counter')) return;
  const mc = document.createElement('div');
  mc.id = 'money-counter';
  mc.title = 'Money earned — one coin per task you collect';
  mc.innerHTML = `<span class="mc-coin">🪙</span><span id="money-amt">$0.00</span>`;
  document.body.appendChild(mc);
  updateMoneyUI(false);
})();

// ---- Auto-start on every visit (a Pause button is available) ----------------
(function autoStart() {
  const cur = getCurrent();
  if (!cur) return; // nothing to run (all done) — leave it
  state.hasStarted = true;
  state.isRunning = true;
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  startTimer();
  render();
  window.__loadTime = Date.now();
  // Try to speak the first task right away (works on desktop).
  try { if (!state.muted) { lastSpokenId = cur.id; speak(buildSpeechIntro(cur.task)); } } catch (e) {}
})();
// Browsers block audio until the first interaction. On the first tap/key, unlock
// speech and read the current task so the voice reliably kicks in on mobile too.
let __audioUnlocked = false;
function __unlockAudio() {
  if (__audioUnlocked) return;
  __audioUnlocked = true;
  try { if (window.speechSynthesis) window.speechSynthesis.resume(); } catch (e) {}
  // Read the current task on the first interaction so the voice reliably starts
  // (browsers block speech until a user gesture, especially on mobile).
  const cur = getCurrent();
  if (cur && state.isRunning && !state.muted) {
    lastReminderTime = state.timeLeft;
    speak(buildSpeechIntro(cur.task));
  }
}
['pointerdown', 'touchstart', 'keydown', 'click'].forEach(ev =>
  document.addEventListener(ev, __unlockAudio, { once: true }));

// ---- Hourly Mac pop-up notifications (mom birthday gift + paramedic bag) ----
// Fires native desktop notifications at the top of every hour, as long as the
// page is open and notification permission has been granted. These float above
// everything via the OS (macOS Notification Center).
const HOURLY_NOTIFS = [
  { title: '🎁 Mom birthday gift', body: 'Hourly reminder' },
  { title: '🚑 Paramedic bag', body: 'Hourly reminder' },
  { title: '🔑 Find keys', body: 'Hourly reminder' },
];
function fireHourlyNotifs() {
  try {
    if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    HOURLY_NOTIFS.forEach((n, i) => {
      // Stagger slightly so both banners appear instead of one replacing the other.
      setTimeout(() => {
        try { new Notification(n.title, { body: n.body, tag: 'tt-hourly-' + i, renotify: true }); } catch (e) {}
      }, i * 1200);
    });
  } catch (e) {}
}
let __hourlyNotifTimer = null;
function setupHourlyNotifs() {
  if (__hourlyNotifTimer) return; // already scheduled this session
  const now = new Date();
  const msToTop = (60 - now.getMinutes()) * 60000 - now.getSeconds() * 1000 - now.getMilliseconds();
  // First fire at the next top-of-hour, then every hour after.
  __hourlyNotifTimer = setTimeout(() => {
    fireHourlyNotifs();
    setInterval(fireHourlyNotifs, 60 * 60 * 1000);
  }, msToTop);
}
setupHourlyNotifs();

</script>
