<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TuneTask</title>
<style>
  :root {
    --sf-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    --sf-mono: ui-monospace, "SF Mono", Menlo, Monaco, "JetBrains Mono", monospace;
    --accent: #d4a574;
    --green: #6b9b7a;
    --green-light: #8ec19c;
    --bg-1: #1a1f2e;
    --bg-0: #0a0d14;
    --fg: #e8e4d8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg-0); }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #1a1f2e 0%, #0a0d14 100%);
    color: var(--fg);
    font-family: var(--sf-display);
    padding: 6px 16px 32px;
    display: flex; flex-direction: column; align-items: center;
    -webkit-font-smoothing: antialiased;
  }
  .sf-display { font-family: var(--sf-display); }
  .sf-mono { font-family: var(--sf-mono); }

  @keyframes pulse-ring { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
  .ring-active { animation: pulse-ring 2s ease-in-out infinite; }

  .header { text-align: center; margin-bottom: 4px; }
  .header-title {
    font-family: var(--sf-mono); font-size: 10px;
    letter-spacing: 0.3em; opacity: 0.5; margin-bottom: 4px;
  }
  .header-count {
    font-family: var(--sf-mono); font-size: 11px; opacity: 0.6;
  }

  .circle-wrap { position: relative; width: 300px; height: 300px; margin-bottom: 10px; }
  .circle-wrap svg.ring { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .circle-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 0 30px; text-align: center;
  }
  .center-task-name {
    font-size: 22px; font-weight: 700; line-height: 1.2;
    margin-bottom: 4px; letter-spacing: -0.02em;
  }
  .center-task-name.group { font-size: 19px; }
  .center-emoji {
    font-size: 32px; line-height: 1; margin-bottom: 6px;
    font-family: "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
  }
  .center-sub-emoji {
    font-size: 11px; line-height: 1; margin-right: -2px;
    font-family: "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
  }
  .center-location {
    display: inline-block;
    font-family: var(--sf-display); font-size: 11px;
    color: var(--accent);
    background: rgba(212, 165, 116, 0.12);
    border: 1px solid rgba(212, 165, 116, 0.35);
    padding: 2px 10px; border-radius: 999px;
    margin-top: 4px; margin-bottom: 6px;
    letter-spacing: 0.01em;
    font-weight: 600;
  }
  .center-badges .center-location { margin-top: 0; margin-bottom: 0; }
  .center-sub-list { margin: 2px 0 6px; max-width: 220px; }
  .center-sub {
    font-size: 11px; color: rgba(232,228,216,0.7); margin: 2px 0;
    letter-spacing: -0.005em; display: flex; align-items: center;
    gap: 6px; justify-content: center; cursor: pointer;
  }
  .center-sub.done {
    opacity: 0.5;
  }
  .center-time {
    font-family: var(--sf-mono); font-size: 34px; font-weight: 300;
    letter-spacing: 0.02em; opacity: 0.85; margin-top: 4px;
  }
  .center-time.warn { color: var(--accent); }
  .center-time.small { font-size: 26px; }

  .controls {
    display: flex; gap: 8px; margin-bottom: 10px;
    flex-wrap: wrap; justify-content: center; align-items: center;
  }

  /* Volume control — speaker icon + live slider */
  .volume-control {
    display: inline-flex; align-items: center;
    gap: 10px; padding: 8px 14px 8px 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(232,228,216,0.15);
    border-radius: 999px;
    height: 44px;
    transition: all 0.2s ease;
  }
  .volume-control:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(232,228,216,0.25);
  }
  /* Volume sits in a centered row directly under the table of contents */
  .volume-row {
    display: flex; justify-content: flex-end;
    width: 100%; margin: 0 auto 14px;
  }
  .volume-row .volume-control { height: 40px; padding: 6px 14px 6px 8px; }
  /* Pinned to top right of the viewport */
  .volume-control-top {
    position: fixed;
    top: 16px; right: 16px;
    z-index: 100;
    height: 40px;
    padding: 6px 12px 6px 6px;
    background: rgba(26, 31, 46, 0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  @media (max-width: 460px) {
    .volume-control-top {
      top: 10px; right: 10px;
      padding: 4px 10px 4px 4px;
      height: 36px;
    }
    .volume-control-top .volume-slider { width: 80px; }
    .volume-control-top .volume-pct { display: none; }
  }

  /* ---- Tabs (table of contents across the very top) ---- */
  .tabs {
    position: sticky; top: 0; z-index: 50;
    display: flex; gap: 4px; flex-wrap: wrap;
    width: 100%; max-width: 1100px;
    margin: 0 auto 14px; padding: 8px 0;
    border-bottom: 1px solid rgba(232,228,216,0.12);
    justify-content: center;
    background: rgba(16, 20, 30, 0.94);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .tab {
    background: transparent; border: 1px solid transparent;
    color: rgba(232,228,216,0.55);
    font-family: var(--sf-display); font-size: 13px; font-weight: 600;
    letter-spacing: -0.01em; padding: 7px 13px; border-radius: 999px;
    cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
  }
  .tab:hover { color: var(--fg); background: rgba(255,255,255,0.05); }
  .tab.active {
    color: #0a0d14; background: var(--accent); border-color: var(--accent);
  }

  /* Placeholder panel for the not-yet-built tabs */
  .tab-panel { width: 100%; max-width: 640px; margin: 24px auto 0; }
  .tab-panel-title {
    font-family: var(--sf-display); font-size: 26px; font-weight: 700;
    letter-spacing: -0.02em; margin-bottom: 6px; text-align: center;
  }
  .tab-panel-sub {
    font-family: var(--sf-mono); font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; color: rgba(232,228,216,0.4);
    text-align: center; margin-bottom: 18px;
  }
  .tab-notes {
    width: 100%; min-height: 320px; resize: vertical;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(232,228,216,0.15); border-radius: 14px;
    color: var(--fg); font-family: var(--sf-display); font-size: 15px;
    line-height: 1.6; padding: 16px; outline: none;
  }
  .tab-notes:focus { border-color: rgba(212,165,116,0.5); background: rgba(255,255,255,0.06); }
  .instacart-link {
    display: inline-flex; align-items: center; gap: 8px;
    margin-bottom: 12px; padding: 9px 16px;
    background: rgba(67,179,80,0.14); border: 1px solid rgba(67,179,80,0.45);
    border-radius: 999px; color: #7ed98b; font-weight: 600; font-size: 14px;
    text-decoration: none; transition: all 0.2s ease;
  }
  .instacart-link:hover { background: rgba(67,179,80,0.22); border-color: rgba(67,179,80,0.7); }

  /* Life goals — area + measurable goal input */
  .goal-list { display: flex; flex-direction: column; gap: 8px; }
  .goal-row {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(232,228,216,0.10);
  }
  .goal-area {
    flex-shrink: 0; width: 120px; font-weight: 600; font-size: 14px;
    color: var(--accent);
  }
  .goal-input {
    flex: 1; min-width: 0; background: transparent; border: none;
    border-bottom: 1px solid rgba(232,228,216,0.18);
    color: var(--fg); font-family: var(--sf-display); font-size: 15px;
    padding: 4px 2px; outline: none;
  }
  .goal-input:focus { border-bottom-color: var(--accent); }
  .goal-input::placeholder { color: rgba(232,228,216,0.3); }

  /* Not alone card */
  .notalone-card {
    background: rgba(212,165,116,0.08); border: 1px solid rgba(212,165,116,0.3);
    border-radius: 14px; padding: 18px; margin-bottom: 16px; text-align: center;
  }
  .notalone-goal { font-size: 16px; line-height: 1.5; margin-bottom: 14px; }
  .notalone-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .notalone-hint {
    margin-top: 12px; font-size: 12px; color: rgba(232,228,216,0.45);
  }
  /* Reminder popup */
  .reminder-modal {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
  }
  .reminder-box {
    max-width: 420px; width: calc(100% - 40px);
    background: #1c2130; border: 1px solid rgba(212,165,116,0.45);
    border-radius: 18px; padding: 26px; text-align: center;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .reminder-box .r-emoji { font-size: 34px; }
  .reminder-box .r-msg { font-size: 17px; line-height: 1.5; margin: 12px 0 20px; }
  .reminder-box .btn { margin: 0 auto; }

  /* ---- Hour divider line with the time on the left ---- */
  .hour-line {
    display: flex; align-items: center; gap: 12px;
    margin: 10px 0 3px; padding: 0 2px;
  }
  .hour-line:first-of-type { margin-top: 2px; }
  .hour-label {
    font-family: var(--sf-mono); font-size: 13px; font-weight: 600;
    letter-spacing: 0.04em; color: var(--accent);
    flex-shrink: 0; min-width: 54px;
  }
  .hour-rule { flex: 1; height: 1px; background: rgba(212,165,116,0.28); }
  /* Hard-coded water reminder at the top of each hour */
  .hour-water {
    display: flex; align-items: center; gap: 8px;
    margin: 0 0 6px 4px; padding: 6px 12px;
    background: rgba(126,170,210,0.10);
    border: 1px solid rgba(126,170,210,0.3);
    border-radius: 10px;
    font-family: var(--sf-display); font-size: 13px; font-weight: 600;
    color: #9cc4e0; width: fit-content;
  }

  /* ---- Per-task duration bubble (far right of each row) ---- */
  .dur-bubble {
    flex-shrink: 0;
    font-family: var(--sf-mono); font-size: 11px; font-weight: 600;
    color: var(--accent);
    background: rgba(212,165,116,0.12);
    border: 1px solid rgba(212,165,116,0.35);
    border-radius: 999px; padding: 3px 9px; cursor: pointer;
    white-space: nowrap; transition: background 0.15s ease;
  }
  .dur-bubble:hover { background: rgba(212,165,116,0.22); }
  .dur-input {
    width: 56px;
    font-family: var(--sf-mono); font-size: 11px; font-weight: 600;
    color: var(--accent); text-align: center;
    background: rgba(212,165,116,0.12);
    border: 1px solid rgba(212,165,116,0.5);
    border-radius: 999px; padding: 3px 6px; outline: none;
  }
  .volume-icon-btn {
    background: transparent; border: none; color: var(--fg);
    width: 28px; height: 28px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; border-radius: 50%;
    transition: background 0.18s ease;
    flex-shrink: 0;
  }
  .volume-icon-btn:hover { background: rgba(255,255,255,0.1); }

  .volume-slider {
    -webkit-appearance: none; appearance: none;
    width: 110px; height: 4px;
    background: rgba(232,228,216,0.18);
    border-radius: 999px;
    outline: none; cursor: pointer;
    margin: 0; padding: 0;
    background-image: linear-gradient(to right, var(--accent), var(--accent));
    background-repeat: no-repeat;
  }
  /* Filled portion via gradient set in JS */
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent);
    cursor: pointer; border: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    transition: transform 0.15s ease;
  }
  .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
  .volume-slider::-webkit-slider-thumb:active { transform: scale(1.15); }
  .volume-slider::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent);
    cursor: pointer; border: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .volume-slider::-moz-range-thumb:hover { transform: scale(1.2); }

  .volume-pct {
    font-family: var(--sf-mono); font-size: 10px;
    color: rgba(232,228,216,0.55);
    min-width: 22px; text-align: right;
    letter-spacing: 0.05em;
  }

  .circle-row {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-bottom: 4px;
  }
  .nav-arrow {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(232,228,216,0.12);
    color: rgba(232,228,216,0.7);
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.18s ease; flex-shrink: 0;
  }
  .nav-arrow:hover {
    background: rgba(212,165,116,0.15);
    border-color: rgba(212,165,116,0.5);
    color: var(--accent);
    transform: scale(1.06);
  }
  .nav-arrow[aria-disabled="true"] {
    opacity: 0.25; cursor: default; transform: none;
    background: rgba(255,255,255,0.04);
    border-color: rgba(232,228,216,0.12);
    color: rgba(232,228,216,0.7);
  }
  .nav-arrow[aria-disabled="true"]:hover {
    background: rgba(255,255,255,0.04);
    border-color: rgba(232,228,216,0.12);
    color: rgba(232,228,216,0.7);
    transform: none;
  }
  .kbd-hint {
    font-family: var(--sf-mono); font-size: 9px;
    letter-spacing: 0.2em; opacity: 0.4; margin-bottom: 14px;
    text-align: center;
  }
  .kbd {
    display: inline-block; padding: 1px 5px; border-radius: 3px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(232,228,216,0.15);
    margin: 0 2px; font-size: 9px;
  }
  .btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(232,228,216,0.15);
    color: var(--fg); padding: 12px 18px; border-radius: 999px; cursor: pointer;
    font-family: var(--sf-display); font-size: 14px; font-weight: 500;
    letter-spacing: -0.01em; transition: all 0.2s ease;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(232,228,216,0.3); }
  .btn-primary { background: var(--accent); color: var(--bg-1); border-color: var(--accent); }
  .btn-primary:hover { background: #e0b585; border-color: #e0b585; }
  .btn-done {
    background: rgba(107,155,122,0.15); border-color: rgba(107,155,122,0.5);
    color: var(--green-light); padding: 12px;
  }
  .btn-done:hover { background: rgba(107,155,122,0.25); border-color: var(--green-light); color: #a8d4b3; }
  .btn-icon { padding: 12px; }
  .btn-nav { font-size: 13px; padding: 11px 15px; color: rgba(232,228,216,0.8); }
  .btn-nav svg { stroke: currentColor; fill: none; stroke-width: 2.5; }
  .btn:disabled { opacity: 0.32; cursor: default; }
  .btn:disabled:hover { background: rgba(255,255,255,0.05); border-color: rgba(232,228,216,0.15); }

  /* ---- Action button grid (the screenshot's per-task actions) ---- */
  .actions-grid {
    width: 100%; max-width: 1000px;
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 14px;
  }
  .actions-row {
    display: flex; gap: 6px; flex-wrap: nowrap; justify-content: center;
  }
  .abtn {
    flex: 1 1 0; min-width: 0;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(232,228,216,0.18);
    color: var(--fg);
    padding: 5px 10px; border-radius: 8px; cursor: pointer;
    font-family: var(--sf-display); font-size: 13px; font-weight: 600;
    letter-spacing: -0.01em; line-height: 1.15; transition: all 0.15s ease;
    display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    white-space: nowrap;
  }
  .abtn:hover { background: rgba(255,255,255,0.1); border-color: rgba(232,228,216,0.35); transform: translateY(-1px); }
  .abtn:active { transform: translateY(0); }
  /* Did it — solid green, the primary affirmative */
  .abtn-did {
    background: var(--green); border-color: var(--green); color: #0a0d14;
  }
  .abtn-did:hover { background: var(--green-light); border-color: var(--green-light); }
  /* Did + repeat / Did + delete — green outline */
  .abtn-did-ghost {
    background: rgba(107,155,122,0.12); border-color: rgba(107,155,122,0.5);
    color: var(--green-light);
  }
  .abtn-did-ghost:hover { background: rgba(107,155,122,0.22); border-color: var(--green-light); color: #a8d4b3; }
  /* Later today / Later tomorrow — amber */
  .abtn-later {
    background: rgba(212,165,116,0.12); border-color: rgba(212,165,116,0.45);
    color: var(--accent);
  }
  .abtn-later:hover { background: rgba(212,165,116,0.22); border-color: var(--accent); color: #e6c193; }
  /* Skip today — neutral muted */
  .abtn-skip { color: rgba(232,228,216,0.85); }
  /* Delete forever / Failed — red danger */
  .abtn-danger, .abtn-fail {
    background: rgba(200,90,80,0.1); border-color: rgba(200,90,80,0.45);
    color: #d98c84;
  }
  .abtn-danger:hover, .abtn-fail:hover { background: rgba(200,90,80,0.2); border-color: #d98c84; color: #e8a59e; }

  .list-section { width: 100%; max-width: 560px; }
  .list-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; padding: 0 4px;
  }

  .quick-add-wrap {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 12px;
    border: 1.5px dashed rgba(212, 165, 116, 0.35);
    background: rgba(212, 165, 116, 0.04);
    margin-bottom: 8px;
    transition: all 0.2s ease;
  }
  .quick-add-wrap:focus-within {
    border-color: rgba(212, 165, 116, 0.7);
    background: rgba(212, 165, 116, 0.08);
    border-style: solid;
  }
  .quick-add-plus {
    color: rgba(212, 165, 116, 0.7);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .quick-add-input {
    flex: 1;
    background: transparent; border: none; outline: none;
    color: var(--fg);
    font-family: var(--sf-display); font-size: 15px;
    font-weight: 500; letter-spacing: -0.01em;
    padding: 2px 0;
  }
  .quick-add-input::placeholder {
    color: rgba(232,228,216,0.35); font-style: italic; font-weight: 400;
  }
  /* Location field on the far right of the quick-add row */
  .quick-add-location {
    flex-shrink: 0;
    width: 120px;
    background: rgba(212,165,116,0.08);
    border: 1px solid rgba(212,165,116,0.25);
    border-radius: 999px; outline: none;
    color: var(--accent);
    font-family: var(--sf-display); font-size: 12px;
    font-weight: 500; letter-spacing: -0.005em;
    padding: 4px 10px;
    transition: all 0.2s ease;
  }
  .quick-add-location:focus {
    border-color: rgba(212,165,116,0.6);
    background: rgba(212,165,116,0.14);
  }
  .quick-add-location::placeholder {
    color: rgba(212,165,116,0.45); font-style: italic; font-weight: 400;
  }
  @media (max-width: 460px) {
    .quick-add-location { width: 90px; }
  }

  /* Drag-and-drop — whole row is draggable, no handle */
  .task-item.dragging {
    opacity: 0.4; cursor: grabbing;
    transform: scale(0.98);
  }
  .task-item.drag-over-top {
    box-shadow: 0 -2px 0 var(--accent);
  }
  .task-item.drag-over-bottom {
    box-shadow: 0 2px 0 var(--accent);
  }

  /* Per-task play button — triangle, larger, rounded corners */
  .task-play-btn {
    background: transparent;
    border: none;
    color: var(--accent);
    width: 28px; height: 28px; border-radius: 8px;
    cursor: pointer; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    margin-top: 0;
    transition: all 0.18s ease;
    padding: 0;
  }
  .task-play-btn:hover {
    background: rgba(212, 165, 116, 0.15);
    color: var(--accent);
    transform: scale(1.12);
  }
  .task-play-btn.playing {
    background: rgba(212, 165, 116, 0.2);
    color: var(--accent);
    animation: pulse-ring 2s ease-in-out infinite;
  }
  .task-play-btn svg { display: block; }

  /* Default cursor on whole row: normal, so text can be selected & copied. */
  .task-item { cursor: default; }
  /* Drag handle — the only place that starts a reorder, so text stays selectable */
  .drag-handle {
    flex-shrink: 0; width: 16px; text-align: center;
    cursor: grab; color: rgba(232,228,216,0.32);
    font-size: 14px; line-height: 1; letter-spacing: -1px;
    user-select: none; -webkit-user-select: none;
    align-self: center;
  }
  .drag-handle:hover { color: rgba(232,228,216,0.7); }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle.empty { visibility: hidden; cursor: default; }

// ---- App State ----
// Persisted to localStorage so your edits, checks, ordering, and additions
// survive page reloads AND any future updates to the app code.
//
// ⚠️ DO NOT CHANGE THIS KEY STRING. Changing it makes the app look for data
// under a new name, find nothing, and reload the default list — which wipes
// the user's tasks/order/edits. The key is permanent. When new fields are
// added later, migrate them inside loadPersistedState() (non-destructively)
// instead of bumping the key.
const STORAGE_KEY = 'tunetask-state-v2';
// Bump this ONLY when republishing the baked-in canonical task list (DEFAULT_TASKS).
// On load, if the saved state was seeded under an older version, the task list is
// refreshed to the new canonical list ONCE (other prefs are kept). Normal feature
// updates that don't change the task list must NOT bump this — that's what keeps
// the user's own edits/order intact between releases.
const SEED_VERSION = 8;
// Older keys this app has used. If the main key is empty (e.g. first load
// after an update that previously bumped the version), we adopt data from the
// newest available legacy key so nothing is lost — then re-save under STORAGE_KEY.
const LEGACY_KEYS = ['tunetask-state-v1', 'packing-assistant-state-v1'];

// Make sure every task has all the fields the current UI expects, WITHOUT
// discarding anything the user has. Safe to run on data from any past version.
function normalizeTasks(parsed) {
  if (!parsed || !Array.isArray(parsed.tasks)) return parsed;
  parsed.tasks = parsed.tasks.map(t => {
    const task = Object.assign({}, t);
    if (task.type === undefined) task.type = 'item';
    if (task.emoji === undefined) task.emoji = '';
    if (task.name === undefined) task.name = '';
    if (task.location === undefined) task.location = '';
    if (!(Number(task.duration) > 0)) task.duration = 5;
    if (task.time === undefined) {
      // Very old data stored the time inside `location`. If location looks like
      // a clock value and there's no separate time yet, move it over.
      if (/^\s*\d{1,2}:\d{2}\s*(am|pm)?\s*$/i.test(task.location || '')) {
        task.time = task.location.trim();
        task.location = '';
      } else {
        task.time = '';
      }
    }
    return task;
  });
  return parsed;
}

function loadPersistedState() {
  try {
    let raw = localStorage.getItem(STORAGE_KEY);
    // If nothing under the current key, adopt the newest legacy data we can find
    // so a user's existing tasks/order are never lost across an update.
    if (!raw) {
      for (const k of LEGACY_KEYS) {
        const legacy = localStorage.getItem(k);
        if (legacy) { raw = legacy; break; }
      }
    }
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    // Sanity check: must have tasks array & ids array of matching length
    if (!parsed || !Array.isArray(parsed.tasks) || !Array.isArray(parsed.ids)) return null;
    if (parsed.tasks.length !== parsed.ids.length) return null;

    // Migration: flatten any old group-type tasks into individual items
    // with a #tag matching the original group name. Preserves the user's
    // sub-item edits, emojis, and completion state.
    const hasGroups = parsed.tasks.some(t => t.type === 'group');
    if (hasGroups) {
      const newTasks = [];
      const newIds = [];
      let nextId = parsed.nextId || 0;
      parsed.tasks.forEach((task, i) => {
        const groupId = parsed.ids[i];
        if (task.type === 'group') {
          // Make a hashtag from the group name (e.g. "Fanny pack" → "#fannypack")
          const tag = '#' + (task.name || 'group').toLowerCase().replace(/[^a-z0-9_-]/g, '');
          (task.items || []).forEach(item => {
            const baseName = (item.name || '').trim();
            // Don't duplicate the tag if it's somehow already present
            const finalName = baseName.includes(tag) ? baseName : `${baseName} ${tag}`.trim();
            newTasks.push({
              type: 'item',
              emoji: item.emoji !== undefined ? item.emoji : '',
              name: finalName,
              location: task.location || '',
            });
            // Preserve sub-item completion: use a fresh id, mark complete if it was done
            const newId = nextId++;
            newIds.push(newId);
            if (item.done) {
              parsed.completedIds = parsed.completedIds || [];
              parsed.completedIds.push(newId);
            }
          });
          // The group's own completedId is no longer meaningful — drop it
          if (parsed.completedIds) {
            parsed.completedIds = parsed.completedIds.filter(x => x !== groupId);
          }
        } else {
          newTasks.push(task);
          newIds.push(groupId);
        }
      });
      parsed.tasks = newTasks;
      parsed.ids = newIds;
      parsed.nextId = nextId;
    }

    // Ensure every task has the fields the current UI needs (time/location/etc.)
    // without discarding any user data. Lets us add features without resets.
    normalizeTasks(parsed);

    return parsed;
  } catch (e) {
    console.warn('Failed to load saved state:', e);
    return null;
  }
}

// ---- Undo history ----
const UNDO_LIMIT = 50;
const undoStack = [];

// Snapshot the state fields that should be undoable. Excludes timer/play state.
function snapshotState() {
  return JSON.stringify({
    tasks: state.tasks,
    ids: state.ids,
    completedIds: state.completedIds,
    suitcaseRows: state.suitcaseRows,
    unfurnished: state.unfurnished,
    unfurnishedDone: state.unfurnishedDone,
    manualIdx: state.manualIdx,
    nextId: state.nextId,
  });
}

function pushUndo() {
  const snap = snapshotState();
  // Don't push duplicates back-to-back
  if (undoStack.length > 0 && undoStack[undoStack.length - 1] === snap) return;
  undoStack.push(snap);
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
}

function undo() {
  if (undoStack.length === 0) return;
  const snap = undoStack.pop();
  const parsed = JSON.parse(snap);
  state.tasks = parsed.tasks;
  state.ids = parsed.ids;
  state.completedIds = parsed.completedIds;
  state.suitcaseRows = parsed.suitcaseRows;
  if (parsed.unfurnished) state.unfurnished = parsed.unfurnished;
  if (parsed.unfurnishedDone) state.unfurnishedDone = parsed.unfurnishedDone;
  state.manualIdx = parsed.manualIdx;
  state.nextId = parsed.nextId;
  // Clear any in-progress edits since indices may have shifted
  state.editingNameIdx = null;
  state.editingLocationIdx = null;
  state.editingTimeIdx = null;
  state.editingSub = { taskIdx: null, subIdx: null };
  state.editingSuitcaseRow = null;
  state.editingUnfurnished = null;
  render();
}

// ---- Derived ----
function getOrder() {
  const active = [], done = [];
  state.ids.forEach((id, idx) => {
    if (state.completedIds.includes(id)) done.push({ id, idx });
    else active.push({ id, idx });
  });
  return { active, done };
}

function getCurrent() {
  // If user manually navigated AND that task is still uncompleted, use it.
  // If the manually-selected task got checked off, fall through to the next
  // uncompleted task so the voice doesn't keep reading a done item.
  if (state.manualIdx !== null && state.manualIdx >= 0 && state.manualIdx < state.tasks.length) {
    const id = state.ids[state.manualIdx];
    if (!state.completedIds.includes(id)) {
      return { id, idx: state.manualIdx, task: state.tasks[state.manualIdx] };
    }
    // The manually-chosen task is done now — clear the manual override
    state.manualIdx = null;
  }
  // First active (uncompleted) task
  const { active } = getOrder();
  if (!active.length) return null;
  const entry = active[0];
  return { id: entry.id, idx: entry.idx, task: state.tasks[entry.idx] };
}

function goToPrevTask() {
  const cur = getCurrent();
  if (!cur) return;
  // Find the previous unchecked task in array order (skip done ones)
  let target = -1;
  for (let i = cur.idx - 1; i >= 0; i--) {
    if (!state.completedIds.includes(state.ids[i])) {
      target = i;
      break;
    }
  }
  // Fall back to immediate previous even if done, rather than going nowhere
  if (target === -1 && cur.idx > 0) target = cur.idx - 1;
  if (target === -1) return;
  state.manualIdx = target;
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  checkSpeakOnTaskChange();
  render();
}

function goToNextTask() {
  const cur = getCurrent();
  if (!cur) return;
  pushUndo();

  // Find the boundary between active and crossed-off tasks. We want to move
  // the current task to just AFTER the last active task (i.e. the position
  // right before the first crossed-off task), so it lands at the bottom of
  // the active list but stays above anything checked-off.
  const curId = cur.id;
  const curIdx = cur.idx;

  // Remove current task from its current position
  const [movedTask] = state.tasks.splice(curIdx, 1);
  const [movedId] = state.ids.splice(curIdx, 1);

  // Find where to re-insert: just after the last non-completed task remaining.
  // Walk from the end of the array backward until we find an active task,
  // then insert right after it.
  let insertAt = state.tasks.length; // default: at the very end
  for (let i = state.tasks.length - 1; i >= 0; i--) {
    const id = state.ids[i];
    if (!state.completedIds.includes(id)) {
      insertAt = i + 1; // insert right after this active task
      break;
    }
    // If we never find an active task (everything else is done), we want
    // the skipped task to go BEFORE the crossed-off pile.
    if (i === 0) insertAt = 0;
  }

  state.tasks.splice(insertAt, 0, movedTask);
  state.ids.splice(insertAt, 0, movedId);

  // Clear manual navigation so we resume picking the first active task
  state.manualIdx = null;
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  checkSpeakOnTaskChange();
  render();
}

// ---- Cash register "ka-ching" sound (Web Audio, no external files) ----
// Layered: a bright metallic bell ding + a soft drawer-slide noise burst.
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { return null; }
  }
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playCashSound() {
  // Honor mute / volume settings so we don't surprise the user
  if (state.muted) return;
  const vol = (state.volume !== undefined ? state.volume : 1) * 0.45;
  if (vol <= 0) return;

  const ctx = getAudioCtx();
  if (!ctx) return;
  const now = ctx.currentTime;

  // ---- Bell "ding" — multiple harmonics for a metallic bell timbre ----
  const playBell = (start, freq, dur, amp) => {
    // Use sine + overtones to mimic a bell hammer hit
    const harmonics = [
      { mult: 1.0, gain: 1.0 },
      { mult: 2.76, gain: 0.5 },  // characteristic bell partial
      { mult: 5.4, gain: 0.25 },
      { mult: 8.2, gain: 0.12 },
    ];
    harmonics.forEach(h => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq * h.mult;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(vol * amp * h.gain, start + 0.002);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(start);
      osc.stop(start + dur + 0.02);
    });
  };

  // ---- Drawer-pop noise — short filtered noise burst for the "ka" part ----
  const playPop = (start, dur, amp, filterFreq) => {
    const bufSize = Math.floor(ctx.sampleRate * dur);
    const buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.3));
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = filterFreq;
    filter.Q.value = 1.5;
    const gain = ctx.createGain();
    gain.gain.value = vol * amp;
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    noise.start(start);
    noise.stop(start + dur);
  };

  // Sequence: "ka" (low drawer thud) → "CHING" (bright bell)
  playPop(now, 0.08, 0.4, 250);                    // low thud — drawer opening
  playPop(now + 0.03, 0.12, 0.25, 1800);           // crisp metallic shimmer
  playBell(now + 0.06, 1760, 0.9, 0.5);            // A6 bell — the "CHING"
  playBell(now + 0.07, 2349, 0.7, 0.3);            // D7 bell — overtone shimmer
}

function speak(text) {
  if (!('speechSynthesis' in window)) {
    console.warn('No speech synthesis available');
    return;
  }
  if (state.muted) return;
  if (state.volume <= 0) return;
  try {
    window.speechSynthesis.cancel();
    currentSpeechText = text;
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.95; u.pitch = 1.0; u.volume = state.volume;
    u.onend = () => { if (currentSpeechText === text) currentSpeechText = ''; };
    u.onerror = (ev) => { console.warn('Speech error:', ev); };
    window.speechSynthesis.speak(u);
  } catch (e) { console.error('Speech failed:', e); }
}

// ---- Actions ----
function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    if (!state.isRunning) return;
    state.timeLeft -= 1;
    if (state.timeLeft <= 0) {
      // auto advance — mark current done & move strictly downward
      const cur = getCurrent();
      if (cur && !state.completedIds.includes(cur.id)) {
        pushUndo();
        state.completedIds.push(cur.id);
        playCashSound();
      }
      advanceToNextInList();
      state.timeLeft = curDurationSec();
      lastReminderTime = curDurationSec();
      checkSpeakOnTaskChange();
    } else {
      const elapsed = curDurationSec() - state.timeLeft;
      // Fire a reminder every ~15 seconds. We track the elapsed-time of the last
      // reminder and fire whenever 15+ seconds have passed since then, instead of
      // requiring `elapsed % 15 === 0` exactly (which could be missed if the tab
      // was backgrounded for a moment).
      const lastReminderElapsed = curDurationSec() - lastReminderTime;
      if (state.isRunning && !state.muted && elapsed >= lastReminderElapsed + 15) {
        lastReminderTime = state.timeLeft;
        const cur = getCurrent();
        // Don't read out a task that's already crossed off
        if (cur && !state.completedIds.includes(cur.id)) {
          const m = Math.floor(state.timeLeft / 60), s = state.timeLeft % 60;
          let timeStr;
          if (m > 0 && s > 0) timeStr = `${m} minute${m !== 1 ? 's' : ''} and ${s} second${s !== 1 ? 's' : ''}`;
          else if (m > 0) timeStr = `${m} minute${m !== 1 ? 's' : ''}`;
          else timeStr = `${s} second${s !== 1 ? 's' : ''}`;
          let extra = '';
          if (cur.task.type === 'group') {
            const rem = (cur.task.items || []).filter(it => !it.done).map(it => stripTagsFromName(it.name));
            if (rem.length) extra = ` Still need: ${rem.join(', ')}.`;
          }
          const cleanName = stripTagsFromName(cur.task.name);
          speak(`${cleanName}. ${timeStr} left.${extra} ${makeMotivation(cleanName)}`);
        }
      }
    }
    render();
  }, 1000);
}

// Move strictly downward in the list to the next task (whether or not it's completed).
// If we're at the bottom, stop.
function advanceToNextInList() {
  const cur = getCurrent();
  if (!cur) return;
  const nextIdx = cur.idx + 1;
  if (nextIdx < state.tasks.length) {
    state.manualIdx = nextIdx;
  } else {
    // Reached the end — clear manual nav so getCurrent returns null (all done)
    // or first uncompleted if any still exist
    state.manualIdx = null;
    state.isRunning = false;
  }
}

function checkSpeakOnTaskChange() {
  const cur = getCurrent();
  if (!cur) { lastSpokenId = -1; return; }
  // Safety: if for any reason getCurrent returns a completed task, bail out.
  if (state.completedIds.includes(cur.id)) { lastSpokenId = cur.id; return; }
  if (state.muted || !state.hasStarted) { lastSpokenId = cur.id; return; }
  if (lastSpokenId === cur.id) return;
  lastSpokenId = cur.id;
  lastReminderTime = curDurationSec();
  speak(buildSpeechIntro(cur.task));
}

function handleStart() {
  const cur = getCurrent();
  if (!cur) return;
  if (!state.hasStarted) {
    state.hasStarted = true;
    lastSpokenId = cur.id;
    if (!state.muted) speak(buildSpeechIntro(cur.task));
  }
  state.isRunning = true;
  startTimer();
  render();
}

function handlePause() {
  state.isRunning = false;
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  render();
}

function handleMarkDone() {
  const cur = getCurrent();
  if (!cur) return;
  pushUndo();
  if (!state.completedIds.includes(cur.id)) {
    state.completedIds.push(cur.id);
    playCashSound();
  }
  // Move strictly downward (not to "first uncompleted")
  advanceToNextInList();
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  checkSpeakOnTaskChange();
  render();
}

// "Did + repeat": mark done AND re-queue a fresh copy at the bottom of the
// active list, so a recurring task comes back around.
function handleDidRepeat() {
  const cur = getCurrent();
  if (!cur) return;
  pushUndo();
  // Mark the current instance complete
  if (!state.completedIds.includes(cur.id)) {
    state.completedIds.push(cur.id);
    playCashSound();
  }
  // Create a fresh, un-done duplicate
  const copy = JSON.parse(JSON.stringify(cur.task));
  const newId = state.nextId++;
  // Insert right after the last active (un-done) task, before the done pile
  let insertAt = state.tasks.length;
  for (let i = state.tasks.length - 1; i >= 0; i--) {
    if (!state.completedIds.includes(state.ids[i])) { insertAt = i + 1; break; }
    if (i === 0) insertAt = 0;
  }
  state.tasks.splice(insertAt, 0, copy);
  state.ids.splice(insertAt, 0, newId);
  advanceToNextInList();
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  checkSpeakOnTaskChange();
  render();
}

// "Did + delete": count it done (chime) then remove it from the list entirely.
function handleDidDelete() {
  const cur = getCurrent();
  if (!cur) return;
  pushUndo();
  playCashSound();
  const idx = cur.idx;
  const removedId = state.ids[idx];
  state.tasks.splice(idx, 1);
  state.ids.splice(idx, 1);
  state.completedIds = state.completedIds.filter(x => x !== removedId);
  state.manualIdx = null;
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  checkSpeakOnTaskChange();
  render();
}

// "Later tomorrow": pull it off today's list (no credit) and stash it so it's
// out of the way for now. Tagged so you can see it was pushed to tomorrow.
function handleLaterTomorrow() {
  const cur = getCurrent();
  if (!cur) return;
  pushUndo();
  const idx = cur.idx;
  const [movedTask] = state.tasks.splice(idx, 1);
  const [movedId] = state.ids.splice(idx, 1);
  if (!/#tomorrow\b/.test(movedTask.name)) {
    movedTask.name = (movedTask.name + ' #tomorrow').trim();
  }
  // Park it at the very bottom (below everything, even done items)
  state.tasks.push(movedTask);
  state.ids.push(movedId);
  state.completedIds.push(movedId); // hidden from the active flow for today
  state.manualIdx = null;
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  checkSpeakOnTaskChange();
  render();
}

// "Skip today": move on without credit. Sends to the bottom of the active list.
function handleSkipToday() {
  // Same placement behaviour as Later today, but no completion credit.
  goToNextTask();
}

// "Delete forever": remove the task permanently (with a confirm).
function handleDeleteForever() {
  const cur = getCurrent();
  if (!cur) return;
  const label = stripTagsFromName(cur.task.name) || 'this task';
  if (!confirm(`Delete "${label}" forever? This removes it from the list.`)) return;
  pushUndo();
  const idx = cur.idx;
  const removedId = state.ids[idx];
  state.tasks.splice(idx, 1);
  state.ids.splice(idx, 1);
  state.completedIds = state.completedIds.filter(x => x !== removedId);
  state.manualIdx = null;
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  checkSpeakOnTaskChange();
  render();
}

// "Failed to do": acknowledge you didn't do it (no chime), tag it, move on.
function handleFailed() {
  const cur = getCurrent();
  if (!cur) return;
  pushUndo();
  const idx = cur.idx;
  const [movedTask] = state.tasks.splice(idx, 1);
  const [movedId] = state.ids.splice(idx, 1);
  if (!/#failed\b/.test(movedTask.name)) {
    movedTask.name = (movedTask.name + ' #failed').trim();
  }
  // Send to bottom of the active list so you can revisit it
  let insertAt = state.tasks.length;
  for (let i = state.tasks.length - 1; i >= 0; i--) {
    if (!state.completedIds.includes(state.ids[i])) { insertAt = i + 1; break; }
    if (i === 0) insertAt = 0;
  }
  state.tasks.splice(insertAt, 0, movedTask);
  state.ids.splice(insertAt, 0, movedId);
  state.manualIdx = null;
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  checkSpeakOnTaskChange();
  render();
}

function toggleTaskDone(id) {
  pushUndo();
  const cur = getCurrent();
  const wasCurrent = cur && cur.id === id;
  if (state.completedIds.includes(id)) {
    // Un-checking — no sound
    state.completedIds = state.completedIds.filter(x => x !== id);
  } else {
    // Checking off — coin chime
    state.completedIds.push(id);
    playCashSound();
  }
  if (wasCurrent) {
    state.timeLeft = curDurationSec();
    lastReminderTime = curDurationSec();
    checkSpeakOnTaskChange();
  }
  render();
}

function handleReset() {
  pushUndo();
  state.isRunning = false;
  state.completedIds = [];
  state.timeLeft = curDurationSec();
  state.hasStarted = false;
  state.manualIdx = null;
  state.tasks.forEach(t => {
    if (t.type === 'group') t.items.forEach(it => it.done = false);
  });
  lastSpokenId = -1;
  lastReminderTime = curDurationSec();
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  render();
}

function handleRepeat() {
  const cur = getCurrent();
  if (cur && !state.muted) speak(buildSpeechIntro(cur.task));
}

// Uncheck every task & sub-item & unfurnished item, but DON'T touch the timer,
// playing state, or current position (unlike "Start over"/reset).
function uncheckAll() {
  pushUndo();
  state.completedIds = [];
  state.tasks.forEach(t => {
    if (t.type === 'group' && t.items) t.items.forEach(it => it.done = false);
  });
  state.unfurnishedDone = [];
  render();
}

// Export current tasks as a ready-to-paste DEFAULT_TASKS array + unfurnished list.
// This lets the user bake their live edits into a publishable HTML file.
function exportTasks() {
  // Build a complete, human-readable dump of EVERY task (checked or not),
  // plus the unfurnished list. We include the completed flag inline so nothing
  // is lost, and also produce a ready-to-paste DEFAULT_TASKS array.
  const taskLines = state.tasks.map((t, i) => {
    const id = state.ids[i];
    const isDone = state.completedIds.includes(id);
    const emoji = (t.emoji || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    const name = (t.name || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    const loc = (t.location || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    const tm = (t.time || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    return `  { type: 'item', emoji: "${emoji}", name: "${name}", time: "${tm}", location: "${loc}", done: ${isDone} },`;
  }).join('\n');

  const ufLines = state.unfurnished.map((item, i) => {
    const isDone = state.unfurnishedDone.includes(i);
    const txt = (item || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    return `  { name: "${txt}", done: ${isDone} },`;
  }).join('\n');

  const snippet =
`const DEFAULT_TASKS = [
${taskLines}
];

const DEFAULT_UNFURNISHED = [
${ufLines}
];`;

  showExportPanel(snippet);
}

// Show the export text in an on-screen overlay with a big selectable textarea
// and a copy button — far more reliable than silent clipboard/download.
function showExportPanel(text) {
  // Remove any existing panel
  const existing = document.getElementById('export-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'export-overlay';
  overlay.style.cssText = `
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  `;

  const panel = document.createElement('div');
  panel.style.cssText = `
    background: #14182a; border: 1px solid rgba(212,165,116,0.4);
    border-radius: 16px; padding: 20px; max-width: 600px; width: 100%;
    max-height: 80vh; display: flex; flex-direction: column; gap: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  `;

  const taskCount = state.tasks.length;
  const ufCount = state.unfurnished.length;
  panel.innerHTML = `
    <div style="font-family: var(--sf-display); color: #e8e4d8; font-size: 16px; font-weight: 700;">
      Export your tasks
    </div>
    <div style="font-family: var(--sf-display); color: rgba(232,228,216,0.6); font-size: 13px; line-height: 1.4;">
      This includes ALL ${taskCount} task${taskCount !== 1 ? 's' : ''} (checked &amp; unchecked) and ${ufCount} unfurnished item${ufCount !== 1 ? 's' : ''}.
      Copy everything below and paste it to Claude to bake it into a publishable file.
    </div>
  `;

  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.readOnly = true;
  textarea.style.cssText = `
    width: 100%; flex: 1; min-height: 240px; resize: vertical;
    background: #0a0d14; color: #a8d4b3; border: 1px solid rgba(232,228,216,0.2);
    border-radius: 10px; padding: 12px; font-family: var(--sf-mono);
    font-size: 11px; line-height: 1.5; outline: none; box-sizing: border-box;
  `;
  panel.appendChild(textarea);

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display: flex; gap: 10px; justify-content: flex-end;';

  const copyBtn = document.createElement('button');
  copyBtn.textContent = 'Copy to clipboard';
  copyBtn.style.cssText = `
    background: var(--accent); color: #14182a; border: none;
    padding: 10px 18px; border-radius: 999px; cursor: pointer;
    font-family: var(--sf-display); font-weight: 600; font-size: 13px;
  `;
  copyBtn.onclick = () => {
    textarea.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch {}
    if (!ok) {
      try { navigator.clipboard.writeText(text); ok = true; } catch {}
    }
    copyBtn.textContent = ok ? '✓ Copied!' : 'Press ⌘C now';
    setTimeout(() => { copyBtn.textContent = 'Copy to clipboard'; }, 2000);
  };

  const closeBtn = document.createElement('button');
  closeBtn.textContent = 'Close';
  closeBtn.style.cssText = `
    background: transparent; color: rgba(232,228,216,0.7);
    border: 1px solid rgba(232,228,216,0.25);
    padding: 10px 18px; border-radius: 999px; cursor: pointer;
    font-family: var(--sf-display); font-weight: 600; font-size: 13px;
  `;
  closeBtn.onclick = () => overlay.remove();

  btnRow.appendChild(closeBtn);
  btnRow.appendChild(copyBtn);
  panel.appendChild(btnRow);
  overlay.appendChild(panel);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  document.body.appendChild(overlay);

  // Auto-select the text so the user can just hit Cmd/Ctrl+C
  setTimeout(() => { textarea.focus(); textarea.select(); }, 50);
}

// Import tasks from a pasted JSON / snippet (advanced). Accepts the same shape
// exportTasks produces, or a raw JSON state object.
function importTasks() {
  const txt = prompt('Paste exported task text here to load it:');
  if (!txt) return;
  try {
    // Try to extract DEFAULT_TASKS array via a loose eval in a sandbox-ish way
    const taskMatch = txt.match(/DEFAULT_TASKS\s*=\s*(\[[\s\S]*?\]);/);
    const ufMatch = txt.match(/DEFAULT_UNFURNISHED\s*=\s*(\[[\s\S]*?\]);/);
    if (taskMatch) {
      pushUndo();
      // eslint-disable-next-line no-eval
      const tasks = eval(taskMatch[1]);
      const completedIds = [];
      state.tasks = tasks.map((t, i) => {
        if (t.done) completedIds.push(i);
        return { type: 'item', emoji: t.emoji || '', name: t.name || '', location: t.location || '', time: t.time || '' };
      });
      state.ids = tasks.map((_, i) => i);
      state.nextId = tasks.length;
      state.completedIds = completedIds;
      state.manualIdx = null;
      if (ufMatch) {
        // eslint-disable-next-line no-eval
        const ufRaw = eval(ufMatch[1]);
        state.unfurnished = [];
        state.unfurnishedDone = [];
        ufRaw.forEach((u, i) => {
          if (typeof u === 'string') {
            state.unfurnished.push(u);
          } else if (u && typeof u === 'object') {
            state.unfurnished.push(u.name || '');
            if (u.done) state.unfurnishedDone.push(i);
          }
        });
      }
      render();
      alert('Tasks imported successfully.');
    } else {
      alert('Could not find a DEFAULT_TASKS array in the pasted text.');
    }
  } catch (e) {
    alert('Import failed: ' + e.message);
  }
}

function toggleMute() {
  state.muted = !state.muted;
  if (state.muted && 'speechSynthesis' in window) window.speechSynthesis.cancel();
  render();
}

function updateTaskName(idx, name) { state.tasks[idx].name = name; render(); }
function updateTaskLocation(idx, location) { state.tasks[idx].location = location; render(); }
function updateSubName(idx, j, name) { state.tasks[idx].items[j].name = name; render(); }

// Scan the main task list for any task tagged #unfurnished. Move each such task
// into the unfurnished checklist (stripping the #unfurnished tag from its text)
// and remove it from the main timed list.
function moveUnfurnishedTaggedToList() {
  let moved = false;
  for (let i = state.tasks.length - 1; i >= 0; i--) {
    const task = state.tasks[i];
    const tags = extractTags(task.name).map(t => t.toLowerCase());
    if (tags.includes('unfurnished')) {
      // Keep the emoji + name, drop only the #unfurnished tag (keep any other tags).
      const text = task.name.replace(/\s*#unfurnished\b/gi, '').trim();
      const emoji = task.emoji ? task.emoji + ' ' : '';
      const finalText = (emoji + text).trim();
      if (!moved) pushUndo();
      moved = true;
      state.unfurnished.push(finalText || '(untitled)');
      // Remove from main tasks
      const removedId = state.ids[i];
      state.tasks.splice(i, 1);
      state.ids.splice(i, 1);
      state.completedIds = state.completedIds.filter(x => x !== removedId);
      if (state.manualIdx !== null) {
        if (state.manualIdx === i) state.manualIdx = null;
        else if (state.manualIdx > i) state.manualIdx -= 1;
      }
    }
  }
  return moved;
}

function toggleSub(idx, j) {
  pushUndo();
  const task = state.tasks[idx];
  if (!task || task.type !== 'group') return;
  const wasChecked = task.items[j].done;
  task.items[j].done = !task.items[j].done;
  // Coin sound when checking off, no sound when un-checking
  if (!wasChecked) playCashSound();
  // If this is the current task and ALL sub-items are now done, auto-complete the group
  const cur = getCurrent();
  if (cur && cur.idx === idx && task.items.length > 0 && task.items.every(it => it.done)) {
    setTimeout(() => {
      if (!state.completedIds.includes(state.ids[idx])) {
        state.completedIds.push(state.ids[idx]);
        playCashSound(); // group completion gets its own cash sound too
        state.timeLeft = curDurationSec();
        lastReminderTime = curDurationSec();
        checkSpeakOnTaskChange();
        render();
      }
    }, 250);
  }
  render();
}

function addSubItem(idx) {
  const task = state.tasks[idx];
  if (!task || task.type !== 'group') return;
  pushUndo();
  task.items.push({ emoji: "", name: "", done: false });
  state.editingSub = { taskIdx: idx, subIdx: task.items.length - 1 };
  render();
}

function removeSubItem(idx, j) {
  pushUndo();
  state.tasks[idx].items.splice(j, 1);
  render();
}

function addTask() {
  pushUndo();
  const newId = state.nextId++;
  // Insert at top of list — no auto emoji, user can type one if they want
  state.tasks.unshift({ type: "item", emoji: "", name: "", location: "", time: "", duration: 5 });
  state.ids.unshift(newId);
  // Existing indices shift down by 1
  if (state.manualIdx !== null) state.manualIdx += 1;
  state.editingNameIdx = 0;
  render();
  // Scroll to top so the new task is visible
  setTimeout(() => {
    const el = document.querySelector(`.task-item[data-idx="0"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 0);
}

// Insert a fresh empty task directly BELOW the given index and start editing it.
// Used when pressing Enter while editing a task name (list-style "add next").
function addTaskAfter(idx) {
  // Release the field currently being edited first. Otherwise render()'s
  // "don't disrupt active typing" guard would skip drawing the new row.
  const activeEl = document.activeElement;
  if (activeEl && typeof activeEl.blur === 'function') activeEl.blur();
  pushUndo();
  const newId = state.nextId++;
  const insertAt = Math.min(idx + 1, state.tasks.length);
  state.tasks.splice(insertAt, 0, { type: "item", emoji: "", name: "", location: "", duration: 5 });
  state.ids.splice(insertAt, 0, newId);
  // Shift the "current task" pointer if it sat at or after the insert point
  if (state.manualIdx !== null && state.manualIdx >= insertAt) state.manualIdx += 1;
  state.editingNameIdx = insertAt;
  state.editingLocationIdx = null;
  state.editingTimeIdx = null;
  state.editingSub = { taskIdx: null, subIdx: null };
  render();
  setTimeout(() => {
    const el = document.querySelector(`.task-item[data-idx="${insertAt}"]`);
    if (el && el.scrollIntoView) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 0);
}

function quickAddTask(name, location) {
  const trimmed = (name || '').trim();
  if (!trimmed) return;
  const loc = (location || '').trim();
  pushUndo();
  // If the typed task is tagged #unfurnished, put it straight in the unfurnished list.
  if (extractTags(trimmed).map(t => t.toLowerCase()).includes('unfurnished')) {
    const text = trimmed.replace(/\s*#unfurnished\b/gi, '').trim();
    state.unfurnished.push(text || '(untitled)');
    render();
    setTimeout(() => {
      const qa = document.getElementById('quick-add');
      if (qa) qa.focus();
    }, 0);
    return;
  }
  const newId = state.nextId++;
  // If user typed a leading emoji, use it; otherwise leave it empty.
  const split = splitLeadingEmoji(trimmed);
  const emoji = split.emoji; // may be ''
  const taskName = split.emoji ? split.rest : trimmed;
  // Insert at top of list
  state.tasks.unshift({ type: "item", emoji, name: taskName, location: loc, time: "", duration: 5 });
  state.ids.unshift(newId);
  if (state.manualIdx !== null) state.manualIdx += 1;
  render();
  // Scroll to the new task and re-focus the quick-add input
  setTimeout(() => {
    const el = document.querySelector(`.task-item[data-idx="0"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const qa = document.getElementById('quick-add');
    if (qa) qa.focus();
  }, 0);
}

function reorderTask(fromIdx, toIdx) {
  if (fromIdx === toIdx) return;
  pushUndo();
  // Move task and id together
  const [movedTask] = state.tasks.splice(fromIdx, 1);
  const [movedId] = state.ids.splice(fromIdx, 1);
  // Adjust target index if moving downward
  const insertAt = fromIdx < toIdx ? toIdx - 1 : toIdx;
  state.tasks.splice(insertAt, 0, movedTask);
  state.ids.splice(insertAt, 0, movedId);
  // Clear any manual nav so getCurrent re-picks the first active task
  state.manualIdx = null;
  render();
}

// Play from any task — jump current to that task, un-complete it if needed,
// reset timer to fresh 5min, and start. Continues downward from there.
function playFromTask(idx) {
  if (idx < 0 || idx >= state.tasks.length) return;
  const id = state.ids[idx];
  // Un-complete if it was marked done
  if (state.completedIds.includes(id)) {
    pushUndo();
    state.completedIds = state.completedIds.filter(x => x !== id);
  }
  state.manualIdx = idx;
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  // Force re-speak even if same task id
  lastSpokenId = -1;
  state.hasStarted = true;
  state.isRunning = true;
  if (!state.muted) speak(buildSpeechIntro(state.tasks[idx]));
  lastSpokenId = id;
  startTimer();
  render();
}

function removeTask(idx) {
  pushUndo();
  const removedId = state.ids[idx];
  state.tasks.splice(idx, 1);
  state.ids.splice(idx, 1);
  state.completedIds = state.completedIds.filter(x => x !== removedId);
  render();
}

// ---- Suitcase row helpers ----
function addSuitcaseRow() {
  pushUndo();
  const n = state.suitcaseRows.length + 1;
  state.suitcaseRows.push({ name: `Row ${n}`, items: [] });
  state.editingSuitcaseRow = { rowIdx: state.suitcaseRows.length - 1, itemIdx: -1 };
  render();
}
function removeSuitcaseRow(ri) {
  pushUndo();
  state.suitcaseRows.splice(ri, 1);
  state.editingSuitcaseRow = null;
  render();
}
function addSuitcaseItem(ri) {
  pushUndo();
  state.suitcaseRows[ri].items.push("");
  state.editingSuitcaseRow = { rowIdx: ri, itemIdx: state.suitcaseRows[ri].items.length - 1 };
  render();
}
function removeSuitcaseItem(ri, ii) {
  pushUndo();
  state.suitcaseRows[ri].items.splice(ii, 1);
  state.editingSuitcaseRow = null;
  render();
}

// ---- Render helpers ----
function icon(id, size) {
  const sz = size || 16;
  return `<svg class="icon" style="width:${sz}px;height:${sz}px" aria-hidden="true"><use href="#i-${id}"/></svg>`;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

const FALLBACK_EMOJIS = ["📌", "✨", "📦", "🎯", "📋", "🏷️", "🔖", "💼", "🧩", "📎"];
let fallbackEmojiIdx = 0;

function pickEmoji(name) {
  const n = (name || '').trim();
  if (!n) return FALLBACK_EMOJIS[(fallbackEmojiIdx++) % FALLBACK_EMOJIS.length];
  for (const [pattern, emoji] of EMOJI_MAP) {
    if (pattern.test(n)) return emoji;
  }
  // Cycle through fallback emojis so new untyped tasks get variety
  return FALLBACK_EMOJIS[(fallbackEmojiIdx++) % FALLBACK_EMOJIS.length];
}

// Detect & split a leading emoji from the start of a string.
// Returns { emoji: '...', rest: '...' }. If no leading emoji, emoji is ''.
// Uses the Unicode "Extended_Pictographic" property which covers nearly all emoji,
// plus following modifiers/joiners and one trailing space.
function splitLeadingEmoji(s) {
  const str = String(s || '');
  if (!str) return { emoji: '', rest: '' };
  // Try to match a leading emoji sequence: one base + optional VS16/modifiers/ZWJ-joined parts.
  // We use a permissive regex that catches the common cases.
  const re = /^(\p{Extended_Pictographic}(?:\uFE0F|\u200D\p{Extended_Pictographic}|\p{Emoji_Modifier}|[\u{E0020}-\u{E007F}])*)\s?/u;
  const m = str.match(re);
  if (m) {
    return { emoji: m[1], rest: str.slice(m[0].length) };
  }
  return { emoji: '', rest: str };
}

// Combine emoji + name as a single editable string.
function joinEmojiName(emoji, name) {
  const e = (emoji || '').trim();
  const n = (name || '').trim();
  if (e && n) return `${e} ${n}`;
  return e || n || '';
}

// ---- Tag extraction (#sleep, #urgent, etc.) ----
// Tags are written in the task name as `#word`. We extract them for display
// as colored pills, but keep them in the name text so the user edits them
// naturally just by typing.
function extractTags(name) {
  const tags = [];
  const re = /#([\p{L}\p{N}_-]+)/gu;
  let m;
  while ((m = re.exec(name || '')) !== null) {
    tags.push(m[1]);
  }
  return tags;
}

// A task is "pinned" (does not move) if it carries the #set tag or pinned flag.
// Pinned tasks can't be dragged and stay in place even after being completed.
function isPinned(task) {
  if (!task) return false;
  if (task.pinned === true) return true;
  return extractTags(task.name).map(t => t.toLowerCase()).includes('set');
}

// Strip tags from name for the *displayed* text portion (so "Wash face #morning"
// shows the name without the inline #morning, and #morning shows as a pill).
function stripTagsFromName(name) {
  return (name || '').replace(/\s*#[\p{L}\p{N}_-]+/gu, '').trim();
}

// Hash-based color assignment so the same tag always gets the same color.
// Uses a curated palette that contrasts with the dark background.
const TAG_COLORS = [
  { bg: 'rgba(120, 158, 220, 0.18)', border: 'rgba(120, 158, 220, 0.5)', fg: '#9fb8e0' }, // blue
  { bg: 'rgba(180, 130, 200, 0.18)', border: 'rgba(180, 130, 200, 0.5)', fg: '#c9a0d8' }, // purple
  { bg: 'rgba(130, 190, 150, 0.18)', border: 'rgba(130, 190, 150, 0.5)', fg: '#a8d4b3' }, // green
  { bg: 'rgba(220, 160, 110, 0.18)', border: 'rgba(220, 160, 110, 0.5)', fg: '#e0b585' }, // orange
  { bg: 'rgba(220, 122, 108, 0.18)', border: 'rgba(220, 122, 108, 0.5)', fg: '#e8978a' }, // red
  { bg: 'rgba(140, 200, 200, 0.18)', border: 'rgba(140, 200, 200, 0.5)', fg: '#a4d8d8' }, // teal
  { bg: 'rgba(220, 200, 110, 0.18)', border: 'rgba(220, 200, 110, 0.5)', fg: '#dcc878' }, // yellow
  { bg: 'rgba(200, 145, 180, 0.18)', border: 'rgba(200, 145, 180, 0.5)', fg: '#d4a5c0' }, // pink
];
function tagColor(tag) {
  // Special-case the status tags used by the action buttons
  if (tag === 'failed') return { bg: 'rgba(200,90,80,0.15)', border: 'rgba(200,90,80,0.55)', fg: '#e8a59e' };
  if (tag === 'tomorrow') return { bg: 'rgba(212,165,116,0.15)', border: 'rgba(212,165,116,0.55)', fg: '#e6c193' };
  // Simple string hash → palette index
  let h = 0;
  for (let i = 0; i < tag.length; i++) {
    h = ((h << 5) - h) + tag.charCodeAt(i);
    h |= 0;
  }
  return TAG_COLORS[Math.abs(h) % TAG_COLORS.length];
}

function renderTagPills(tags, idx) {
  if (!tags || !tags.length) return '';
  const dataAttr = (idx !== undefined && idx !== null) ? ` data-action="start-edit-name" data-idx="${idx}"` : '';
  return tags.map(t => {
    const c = tagColor(t.toLowerCase());
    return `<span class="task-tag" style="background:${c.bg};border-color:${c.border};color:${c.fg}"${dataAttr} title="Edit task to change tag">#${escapeHtml(t)}</span>`;
  }).join('');
}

// Format a minute-of-day (e.g. 540) as a clock label like "9 AM" or "1:30 PM".
function hourLabelFromMin(min) {
  let h = Math.floor(min / 60) % 24;
  const m = min % 60;
  const ampm = h >= 12 ? 'PM' : 'AM';
  let h12 = h % 12; if (h12 === 0) h12 = 12;
  return m === 0 ? `${h12} ${ampm}` : `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
}

// The hour divider line (time on the left).
function hourBlockHtml(hourMin) {
  return `
    <div class="hour-line">
      <span class="hour-label">${hourLabelFromMin(hourMin)}</span>
      <span class="hour-rule"></span>
    </div>
  `;
}

function renderTaskRow(task, idx, isCurrent, isDone, overrideName) {
  const isEditingName = state.editingNameIdx === idx;
  const isEditingLoc = state.editingLocationIdx === idx;
  const isEditingTime = state.editingTimeIdx === idx;
  const isGroup = task.type === 'group';
  const pinned = isPinned(task);

  let html = `<div class="task-item ${isCurrent ? 'task-current' : isDone ? 'task-done' : 'task-pending'} ${pinned ? 'task-pinned' : ''}" data-idx="${idx}" ${pinned ? 'data-pinned="1"' : ''} draggable="false">`;
  html += `<div class="task-main-row">`;

  // Drag handle — the only spot that initiates a reorder (keeps text selectable).
  // Pinned (#set) tasks don't move, so their handle is an invisible spacer.
  html += pinned
    ? `<span class="drag-handle empty" aria-hidden="true">⠿</span>`
    : `<span class="drag-handle" title="Drag to reorder" aria-hidden="true">⠿</span>`;

  // Check circle
  html += `<div class="check-circle ${isDone ? 'done' : isCurrent ? 'current' : ''}" data-action="toggle-task" data-idx="${idx}" title="${isDone ? 'Click to uncheck' : 'Mark done'}">`;
  if (isDone) html += `<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="#1a1f2e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  html += `</div>`;

  // Play button — triangle, larger, rounded corners
  const isPlayingThis = isCurrent && state.isRunning;
  html += `<button class="task-play-btn ${isPlayingThis ? 'playing' : ''}" data-action="play-from" data-idx="${idx}" title="${isPlayingThis ? 'Currently playing' : 'Play from here'}">`;
  if (isPlayingThis) {
    html += `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>`;
  } else {
    // Rounded-corner triangle
    html += `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"><path d="M7 4.5 L19 12 L7 19.5 Z"/></svg>`;
  }
  html += `</button>`;

  html += `<div class="task-body">`;
  html += `<div class="task-row">`;

  // Task name + emoji rendered together as one editable unit.
  // Note: `task.emoji === ''` means user explicitly deleted the emoji — respect that.
  // Only fall back to auto-pick if `emoji` is undefined (never been set).
  const taskEmoji = task.emoji !== undefined ? task.emoji : '';
  if (isEditingName) {
    // Emoji is part of the input value so the user can edit/delete/replace it.
    // Tags (#word) stay in the editable text so the user can edit them naturally.
    const editValue = joinEmojiName(taskEmoji, task.name);
    html += `<input autofocus class="task-name-input ${isGroup ? 'group' : ''}" data-action="edit-name" data-idx="${idx}" value="${escapeHtml(editValue)}" />`;
  } else {
    const struck = isDone ? 'struck' : '';
    const empty = !task.name ? 'empty' : '';
    const visibleName = stripTagsFromName(overrideName || task.name);
    const nameDisplay = visibleName ? escapeHtml(visibleName) + (isGroup ? ':' : '') : (task.name ? '' : 'untitled');
    // Render emoji inline as part of the same clickable text element.
    // Skip the leading space if emoji is empty (user deleted it).
    const prefix = taskEmoji ? `${taskEmoji} ` : '';
    html += `<span class="task-name-text ${isGroup ? 'group' : ''} ${struck} ${empty}" data-action="start-edit-name" data-idx="${idx}" title="Click to edit">${prefix}${nameDisplay}</span>`;
  }

  html += `</div>`; // task-row
  html += `</div>`; // task-body

  // Right-side slot: tags + location, always pinned right, never wraps under the name.
  const tags = extractTags(task.name).filter(t => t.toLowerCase() !== 'set');
  html += `<div class="task-location-slot">`;
  // Pin marker for tasks that don't move (#set)
  if (pinned) {
    html += `<span class="pin-marker" title="Pinned (#set) — stays at the top of the hour">📌</span>`;
  }
  // Tag pills first (to the left of location, still on the right side of the row)
  if (!isEditingName && tags.length) {
    html += renderTagPills(tags, idx);
  }
  // Location
  if (isEditingLoc) {
    html += `<input autofocus class="location-input" data-action="edit-location" data-idx="${idx}" value="${escapeHtml(task.location || '')}" placeholder="location" />`;
  } else if (task.location) {
    html += `<span class="location-inline" data-action="toggle-location-edit" data-idx="${idx}" title="Click to edit location">📍 ${escapeHtml(task.location)}</span>`;
  } else if (!isEditingName) {
    html += `<span class="location-add" data-action="toggle-location-edit" data-idx="${idx}" title="Add location">+ location</span>`;
  }
  html += `</div>`; // task-location-slot

  // Duration bubble — far right, shows minutes per task (click to edit)
  const isEditingDur = state.editingDurationIdx === idx;
  const durMin = (task && Number(task.duration) > 0) ? Number(task.duration) : 5;
  if (isEditingDur) {
    html += `<input autofocus class="dur-input" type="number" min="1" max="180" step="1" data-action="edit-duration" data-idx="${idx}" value="${durMin}" />`;
  } else {
    html += `<span class="dur-bubble" data-action="toggle-duration-edit" data-idx="${idx}" title="Estimated minutes — click to edit">${durMin} min</span>`;
  }

  html += `<button class="remove-btn" data-action="remove-task" data-idx="${idx}" title="Remove task"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;

  html += `</div>`; // main-row

  if (isGroup) {
    html += `<div class="sub-items-wrap">`;
    task.items.forEach((sub, j) => {
      const isEditingThis = state.editingSub.taskIdx === idx && state.editingSub.subIdx === j;
      const subEmoji = sub.emoji !== undefined ? sub.emoji : '';
      html += `<div class="sub-row">`;
      html += `<div class="check-small ${sub.done ? 'done' : ''}" data-action="toggle-sub" data-idx="${idx}" data-sub="${j}" title="${sub.done ? 'Click to uncheck' : 'Mark done'}">`;
      if (sub.done) html += `<svg viewBox="0 0 24 24" width="9" height="9" fill="none" stroke="#0a0d14" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
      html += `</div>`;
      if (isEditingThis) {
        const editValue = joinEmojiName(subEmoji, sub.name);
        html += `<input autofocus class="sub-item-input" data-action="edit-sub" data-idx="${idx}" data-sub="${j}" value="${escapeHtml(editValue)}" />`;
      } else {
        const struck = sub.done ? 'struck' : '';
        const prefix = subEmoji ? `${subEmoji} ` : '';
        const subTags = extractTags(sub.name);
        const visibleSubName = stripTagsFromName(sub.name);
        const nameOrUntitled = visibleSubName
          ? escapeHtml(visibleSubName)
          : (sub.name ? '' : '<span style="opacity:0.4;font-style:italic">untitled</span>');
        html += `<span class="sub-item-text ${struck}" data-action="start-edit-sub" data-idx="${idx}" data-sub="${j}" title="Click to edit">${prefix}${nameOrUntitled}</span>`;
        // Tag pills next to sub-item name
        if (subTags.length) {
          html += subTags.map(t => {
            const c = tagColor(t.toLowerCase());
            return `<span class="task-tag" style="background:${c.bg};border-color:${c.border};color:${c.fg}" data-action="start-edit-sub" data-idx="${idx}" data-sub="${j}" title="Edit to change tag">#${escapeHtml(t)}</span>`;
          }).join('');
        }
      }
      html += `<button class="remove-btn" data-action="remove-sub" data-idx="${idx}" data-sub="${j}" title="Remove"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
      html += `</div>`;
    });
    html += `<button class="sub-add" data-action="add-sub" data-idx="${idx}"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> ADD ITEM</button>`;
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

// Second checklist — items needed if the place were unfurnished.
function renderUnfurnished() {
  let itemsHtml = '';
  state.unfurnished.forEach((item, i) => {
    const isEditing = state.editingUnfurnished === i;
    const isDone = state.unfurnishedDone.includes(i);
    itemsHtml += `<div class="uf-row ${isDone ? 'uf-done' : ''}">`;
    // Checkbox
    itemsHtml += `<div class="uf-check ${isDone ? 'done' : ''}" data-action="toggle-unfurnished" data-uf="${i}" title="${isDone ? 'Click to uncheck' : 'Mark done'}">`;
    if (isDone) itemsHtml += `<svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="#0a0d14" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    itemsHtml += `</div>`;
    // Name (editable)
    if (isEditing) {
      itemsHtml += `<input autofocus class="uf-input" data-action="edit-unfurnished" data-uf="${i}" value="${escapeHtml(item)}" placeholder="item" />`;
    } else {
      const display = item ? escapeHtml(item) : '<em style="opacity:0.4">untitled</em>';
      itemsHtml += `<span class="uf-name ${isDone ? 'struck' : ''}" data-action="start-edit-unfurnished" data-uf="${i}" title="Click to edit">${display}</span>`;
    }
    // Remove
    itemsHtml += `<button class="uf-remove" data-action="remove-unfurnished" data-uf="${i}" title="Remove">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>`;
    itemsHtml += `</div>`;
  });

  return `
    <div class="unfurnished-gap"></div>
    <div class="unfurnished-section">
      <div class="unfurnished-header">
        <div class="unfurnished-title">UNFURNISHED LIST</div>
        <button class="add-btn" data-action="add-unfurnished">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          ADD
        </button>
      </div>
      <div class="unfurnished-subtitle">Additional things I need if the place was unfurnished</div>
      <div class="quick-add-wrap">
        <div class="quick-add-plus">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <input type="text" class="quick-add-input" id="unfurnished-quick-add"
          placeholder="Type an item and press Enter…"

      </div>

  `;
}

function renderSuitcase() {

      state.editingSuitcaseRow.rowIdx === ri &&
      state.editingSuitcaseRow.itemIdx === -1;

    rowsHtml += `<div class="sc-row">`;

    // Row header
    rowsHtml += `<div class="sc-row-header">`;

      rowsHtml += `<input autofocus class="sc-row-name-input" data-action="edit-sc-row-name" data-row="${ri}" value="${escapeHtml(row.name)}" placeholder="row name" />`;
    } else {
      rowsHtml += `<span class="sc-row-name" data-action="start-edit-sc-row-name" data-row="${ri}" title="Click to edit row name">${escapeHtml(row.name) || 'untitled row'}</span>`;

      } else {
        rowsHtml += `<span class="sc-item" data-action="start-edit-sc-item" data-row="${ri}" data-item="${ii}" title="Click to edit">

            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </span>`;
