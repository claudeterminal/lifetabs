    </div>
    <div style="font-family: var(--sf-display); color: rgba(232,228,216,0.6); font-size: 13px; line-height: 1.4;">
      This includes ALL ${taskCount} task${taskCount !== 1 ? 's' : ''} (checked &amp; unchecked) and ${ufCount} unfurnished item${ufCount !== 1 ? 's' : ''}.
      Copy everything below and paste it to Claude to bake it into a publishable file.
    </div>
  `;

  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.readOnly = true;
  textarea.style.cssText = `
    width: 100%; flex: 1; min-height: 240px; resize: vertical;
    background: #0a0d14; color: #a8d4b3; border: 1px solid rgba(232,228,216,0.2);
    border-radius: 10px; padding: 12px; font-family: var(--sf-mono);
    font-size: 11px; line-height: 1.5; outline: none; box-sizing: border-box;
  `;
  panel.appendChild(textarea);

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display: flex; gap: 10px; justify-content: flex-end;';

  const copyBtn = document.createElement('button');
  copyBtn.textContent = 'Copy to clipboard';
  copyBtn.style.cssText = `
    background: var(--accent); color: #14182a; border: none;

  `;
  copyBtn.onclick = () => {

// Import tasks from a pasted JSON / snippet (advanced). Accepts the same shape
// exportTasks produces, or a raw JSON state object.
function importTasks() {
  const txt = prompt('Paste exported task text here to load it:');
  if (!txt) return;
  try {
    // Try to extract DEFAULT_TASKS array via a loose eval in a sandbox-ish way
    const taskMatch = txt.match(/DEFAULT_TASKS\s*=\s*(\[[\s\S]*?\]);/);
    const ufMatch = txt.match(/DEFAULT_UNFURNISHED\s*=\s*(\[[\s\S]*?\]);/);
    if (taskMatch) {
      pushUndo();
      // eslint-disable-next-line no-eval
      const tasks = eval(taskMatch[1]);
      const completedIds = [];
      state.tasks = tasks.map((t, i) => {
        if (t.done) completedIds.push(i);
        return { type: 'item', emoji: t.emoji || '', name: t.name || '', location: t.location || '', time: t.time || '' };
      });
      state.ids = tasks.map((_, i) => i);
      state.nextId = tasks.length;
      state.completedIds = completedIds;
      state.manualIdx = null;
      if (ufMatch) {
        // eslint-disable-next-line no-eval
        const ufRaw = eval(ufMatch[1]);
        state.unfurnished = [];
        state.unfurnishedDone = [];
        ufRaw.forEach((u, i) => {
          if (typeof u === 'string') {
            state.unfurnished.push(u);
          } else if (u && typeof u === 'object') {
            state.unfurnished.push(u.name || '');
            if (u.done) state.unfurnishedDone.push(i);
          }
        });
      }
      render();
      alert('Tasks imported successfully.');
    } else {
      alert('Could not find a DEFAULT_TASKS array in the pasted text.');
    }
  } catch (e) {
    alert('Import failed: ' + e.message);
  }
}

function toggleMute() {
  state.muted = !state.muted;
  if (state.muted && 'speechSynthesis' in window) window.speechSynthesis.cancel();
  render();
}

function updateTaskName(idx, name) { state.tasks[idx].name = name; render(); }
function updateTaskLocation(idx, location) { state.tasks[idx].location = location; render(); }
function updateSubName(idx, j, name) { state.tasks[idx].items[j].name = name; render(); }

// Scan the main task list for any task tagged #unfurnished. Move each such task
// into the unfurnished checklist (stripping the #unfurnished tag from its text)
// and remove it from the main timed list.
function moveUnfurnishedTaggedToList() {
  let moved = false;
  for (let i = state.tasks.length - 1; i >= 0; i--) {
    const task = state.tasks[i];
    const tags = extractTags(task.name).map(t => t.toLowerCase());
    if (tags.includes('unfurnished')) {
      // Keep the emoji + name, drop only the #unfurnished tag (keep any other tags).
      const text = task.name.replace(/\s*#unfurnished\b/gi, '').trim();
      const emoji = task.emoji ? task.emoji + ' ' : '';
      const finalText = (emoji + text).trim();
      if (!moved) pushUndo();
      moved = true;
      state.unfurnished.push(finalText || '(untitled)');
      // Remove from main tasks
      const removedId = state.ids[i];
      state.tasks.splice(i, 1);
      state.ids.splice(i, 1);
      state.completedIds = state.completedIds.filter(x => x !== removedId);
      if (state.manualIdx !== null) {
        if (state.manualIdx === i) state.manualIdx = null;
        else if (state.manualIdx > i) state.manualIdx -= 1;
      }
    }
  }
  return moved;
}

function toggleSub(idx, j) {
  pushUndo();
  const task = state.tasks[idx];
  if (!task || task.type !== 'group') return;
  const wasChecked = task.items[j].done;
  task.items[j].done = !task.items[j].done;
  // Coin sound when checking off, no sound when un-checking
  if (!wasChecked) playCashSound();
  // If this is the current task and ALL sub-items are now done, auto-complete the group
  const cur = getCurrent();
  if (cur && cur.idx === idx && task.items.length > 0 && task.items.every(it => it.done)) {
    setTimeout(() => {
      if (!state.completedIds.includes(state.ids[idx])) {
        state.completedIds.push(state.ids[idx]);
        awardMoney(1); // group completion drops a coin too
        state.timeLeft = curDurationSec();
        lastReminderTime = curDurationSec();
        checkSpeakOnTaskChange();
        render();
      }
    }, 250);
  }
  render();
}

function addSubItem(idx) {
  const task = state.tasks[idx];
  if (!task || task.type !== 'group') return;
  pushUndo();
  task.items.push({ emoji: "", name: "", done: false });
  state.editingSub = { taskIdx: idx, subIdx: task.items.length - 1 };
  render();
}

function removeSubItem(idx, j) {
  pushUndo();
  state.tasks[idx].items.splice(j, 1);
  render();
}

function addTask() {
  pushUndo();
  const newId = state.nextId++;
  // Insert at top of list — no auto emoji, user can type one if they want
  state.tasks.unshift({ type: "item", emoji: "", name: "", location: "", time: "", duration: 5 });
  state.ids.unshift(newId);
  // Existing indices shift down by 1
  if (state.manualIdx !== null) state.manualIdx += 1;
  state.editingNameIdx = 0;
  render();
  // Scroll to top so the new task is visible
  setTimeout(() => {
    const el = document.querySelector(`.task-item[data-idx="0"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 0);
}

// Insert a fresh empty task directly BELOW the given index and start editing it.
// Used when pressing Enter while editing a task name (list-style "add next").
function addTaskAfter(idx) {
  // Release the field currently being edited first. Otherwise render()'s
  // "don't disrupt active typing" guard would skip drawing the new row.
  const activeEl = document.activeElement;
  if (activeEl && typeof activeEl.blur === 'function') activeEl.blur();
  pushUndo();
  const newId = state.nextId++;
  const insertAt = Math.min(idx + 1, state.tasks.length);
  state.tasks.splice(insertAt, 0, { type: "item", emoji: "", name: "", location: "", duration: 5 });
  state.ids.splice(insertAt, 0, newId);
  // Shift the "current task" pointer if it sat at or after the insert point
  if (state.manualIdx !== null && state.manualIdx >= insertAt) state.manualIdx += 1;
  state.editingNameIdx = insertAt;
  state.editingLocationIdx = null;
  state.editingTimeIdx = null;
  state.editingSub = { taskIdx: null, subIdx: null };
  render();
  setTimeout(() => {
    const el = document.querySelector(`.task-item[data-idx="${insertAt}"]`);
    if (el && el.scrollIntoView) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 0);
}

function quickAddTask(name, location) {
  const trimmed = (name || '').trim();
  if (!trimmed) return;
  const loc = (location || '').trim();
  pushUndo();
  // If the typed task is tagged #unfurnished, put it straight in the unfurnished list.
  if (extractTags(trimmed).map(t => t.toLowerCase()).includes('unfurnished')) {
    const text = trimmed.replace(/\s*#unfurnished\b/gi, '').trim();
    state.unfurnished.push(text || '(untitled)');
    render();
    setTimeout(() => {
      const qa = document.getElementById('quick-add');
      if (qa) qa.focus();
    }, 0);
    return;
  }
  const newId = state.nextId++;
  // If user typed a leading emoji, use it; otherwise leave it empty.
  const split = splitLeadingEmoji(trimmed);
  const emoji = split.emoji; // may be ''
  const taskName = split.emoji ? split.rest : trimmed;
  // Insert at top of list
  state.tasks.unshift({ type: "item", emoji, name: taskName, location: loc, time: "", duration: 5 });
  state.ids.unshift(newId);
  if (state.manualIdx !== null) state.manualIdx += 1;
  render();
  // Scroll to the new task and re-focus the quick-add input
  setTimeout(() => {
    const el = document.querySelector(`.task-item[data-idx="0"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const qa = document.getElementById('quick-add');
    if (qa) qa.focus();
  }, 0);
}

function reorderTask(fromIdx, toIdx) {
  if (fromIdx === toIdx) return;
  pushUndo();
  // Move task and id together
  const [movedTask] = state.tasks.splice(fromIdx, 1);
  const [movedId] = state.ids.splice(fromIdx, 1);
  // Adjust target index if moving downward
  const insertAt = fromIdx < toIdx ? toIdx - 1 : toIdx;
  state.tasks.splice(insertAt, 0, movedTask);
  state.ids.splice(insertAt, 0, movedId);
  // Clear any manual nav so getCurrent re-picks the first active task
  state.manualIdx = null;
  render();
}

// Play from any task — jump current to that task, un-complete it if needed,
// reset timer to fresh 5min, and start. Continues downward from there.
function playFromTask(idx) {
  if (idx < 0 || idx >= state.tasks.length) return;
  const id = state.ids[idx];
  // Un-complete if it was marked done
  if (state.completedIds.includes(id)) {
    pushUndo();
    state.completedIds = state.completedIds.filter(x => x !== id);
  }
  state.manualIdx = idx;
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  // Force re-speak even if same task id
  lastSpokenId = -1;
  state.hasStarted = true;
  state.isRunning = true;
  if (!state.muted) speak(buildSpeechIntro(state.tasks[idx]));
  lastSpokenId = id;
  startTimer();
  render();
}

function removeTask(idx) {
  pushUndo();
  const removedId = state.ids[idx];
  state.tasks.splice(idx, 1);
  state.ids.splice(idx, 1);
  state.completedIds = state.completedIds.filter(x => x !== removedId);
  render();
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

  [/\b(scarf)\b/i, "🧣"],
  [/\b(swim|bikini|trunk)\b/i, "🩱"],

  // Home / errands
  [/\b(key)\b/i, "🔑"],
  [/\b(lock|secure)\b/i, "🔒"],
  [/\b(door|leave|leaving|home|house)\b/i, "🚪"],
  [/\b(window)\b/i, "🪟"],
  [/\b(light|lamp|turn off)\b/i, "💡"],
  [/\b(trash|garbage|rubbish)\b/i, "🗑️"],
  [/\b(plant|water plant)\b/i, "🌿"],
  [/\b(mail|package|amazon|delivery|parcel)\b/i, "📦"],
  [/\b(return|send back)\b/i, "↩️"],
  [/\b(kitchen|cook)\b/i, "🍳"],

  // Baby / kids
  [/\b(diaper|baby|infant)\b/i, "👶"],

  [/\b(bottle ?feed|formula|breast)\b/i, "🍼"],
  [/\b(stroller|pram)\b/i, "🚼"],

  // Documents / money
  [/\b(money|cash|dollar)\b/i, "💵"],
  [/\b(credit|debit|bank ?card)\b/i, "💳"],
  [/\b(document|paper|receipt|form)\b/i, "📄"],
  [/\b(book|reading|read)\b/i, "📖"],
  [/\b(notebook|journal|pen)\b/i, "📓"],
];

const FALLBACK_EMOJIS = ["📌", "✨", "📦", "🎯", "📋", "🏷️", "🔖", "💼", "🧩", "📎"];
let fallbackEmojiIdx = 0;

function pickEmoji(name) {
  const n = (name || '').trim();
  if (!n) return FALLBACK_EMOJIS[(fallbackEmojiIdx++) % FALLBACK_EMOJIS.length];
  for (const [pattern, emoji] of EMOJI_MAP) {
    if (pattern.test(n)) return emoji;
  }
  // Cycle through fallback emojis so new untyped tasks get variety
  return FALLBACK_EMOJIS[(fallbackEmojiIdx++) % FALLBACK_EMOJIS.length];
}

// Detect & split a leading emoji from the start of a string.
// Returns { emoji: '...', rest: '...' }. If no leading emoji, emoji is ''.
// Uses the Unicode "Extended_Pictographic" property which covers nearly all emoji,
// plus following modifiers/joiners and one trailing space.
function splitLeadingEmoji(s) {
  const str = String(s || '');
  if (!str) return { emoji: '', rest: '' };
  // Try to match a leading emoji sequence: one base + optional VS16/modifiers/ZWJ-joined parts.
  // We use a permissive regex that catches the common cases.
  const re = /^(\p{Extended_Pictographic}(?:\uFE0F|\u200D\p{Extended_Pictographic}|\p{Emoji_Modifier}|[\u{E0020}-\u{E007F}])*)\s?/u;
  const m = str.match(re);
  if (m) {
    return { emoji: m[1], rest: str.slice(m[0].length) };
  }
  return { emoji: '', rest: str };
}

// Combine emoji + name as a single editable string.
function joinEmojiName(emoji, name) {
  const e = (emoji || '').trim();
  const n = (name || '').trim();
  if (e && n) return `${e} ${n}`;
  return e || n || '';
}

// ---- Tag extraction (#sleep, #urgent, etc.) ----
// Tags are written in the task name as `#word`. We extract them for display
// as colored pills, but keep them in the name text so the user edits them
// naturally just by typing.
function extractTags(name) {
  const tags = [];
  const re = /#([\p{L}\p{N}_-]+)/gu;
  let m;
  while ((m = re.exec(name || '')) !== null) {
    tags.push(m[1]);
  }
  return tags;
}

// A task is "pinned" (does not move) if it carries the #set tag or pinned flag.
// Pinned tasks can't be dragged and stay in place even after being completed.
function isPinned(task) {
  if (!task) return false;
  if (task.pinned === true) return true;
  return extractTags(task.name).map(t => t.toLowerCase()).includes('set');
}

// Strip tags from name for the *displayed* text portion (so "Wash face #morning"
// shows the name without the inline #morning, and #morning shows as a pill).
function stripTagsFromName(name) {
  return (name || '').replace(/\s*#[\p{L}\p{N}_-]+/gu, '').trim();
}

// Hash-based color assignment so the same tag always gets the same color.
// Uses a curated palette that contrasts with the dark background.
const TAG_COLORS = [
  { bg: 'rgba(120, 158, 220, 0.18)', border: 'rgba(120, 158, 220, 0.5)', fg: '#9fb8e0' }, // blue
  { bg: 'rgba(180, 130, 200, 0.18)', border: 'rgba(180, 130, 200, 0.5)', fg: '#c9a0d8' }, // purple
  { bg: 'rgba(130, 190, 150, 0.18)', border: 'rgba(130, 190, 150, 0.5)', fg: '#a8d4b3' }, // green
  { bg: 'rgba(220, 160, 110, 0.18)', border: 'rgba(220, 160, 110, 0.5)', fg: '#e0b585' }, // orange
  { bg: 'rgba(220, 122, 108, 0.18)', border: 'rgba(220, 122, 108, 0.5)', fg: '#e8978a' }, // red
  { bg: 'rgba(140, 200, 200, 0.18)', border: 'rgba(140, 200, 200, 0.5)', fg: '#a4d8d8' }, // teal
  { bg: 'rgba(220, 200, 110, 0.18)', border: 'rgba(220, 200, 110, 0.5)', fg: '#dcc878' }, // yellow
  { bg: 'rgba(200, 145, 180, 0.18)', border: 'rgba(200, 145, 180, 0.5)', fg: '#d4a5c0' }, // pink
];
function tagColor(tag) {
  // Special-case the status tags used by the action buttons
  if (tag === 'failed') return { bg: 'rgba(200,90,80,0.15)', border: 'rgba(200,90,80,0.55)', fg: '#e8a59e' };
  if (tag === 'tomorrow') return { bg: 'rgba(212,165,116,0.15)', border: 'rgba(212,165,116,0.55)', fg: '#e6c193' };
  // Simple string hash → palette index
  let h = 0;
  for (let i = 0; i < tag.length; i++) {
    h = ((h << 5) - h) + tag.charCodeAt(i);
    h |= 0;
  }
  return TAG_COLORS[Math.abs(h) % TAG_COLORS.length];
}

function renderTagPills(tags, idx) {
  if (!tags || !tags.length) return '';
  const dataAttr = (idx !== undefined && idx !== null) ? ` data-action="start-edit-name" data-idx="${idx}"` : '';
  return tags.map(t => {
    const c = tagColor(t.toLowerCase());
    return `<span class="task-tag" style="background:${c.bg};border-color:${c.border};color:${c.fg}"${dataAttr} title="Edit task to change tag">#${escapeHtml(t)}</span>`;
  }).join('');
}

// Format a minute-of-day (e.g. 540) as a clock label like "9 AM" or "1:30 PM".
// mm:ss, with a leading minus when the timer runs into overtime.
function fmtMMSS(sec) {
  const neg = sec < 0;
  const a = Math.abs(sec);
  const m = Math.floor(a / 60), s = a % 60;
  return (neg ? '-' : '') + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function hourLabelFromMin(min) {
  let h = Math.floor(min / 60) % 24;
  const m = min % 60;
  const ampm = h >= 12 ? 'PM' : 'AM';
  let h12 = h % 12; if (h12 === 0) h12 = 12;
  return m === 0 ? `${h12} ${ampm}` : `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
}

// The hour divider line (time on the left).
function hourBlockHtml(hourMin) {
  return `
    <div class="hour-line">
      <span class="hour-label">${hourLabelFromMin(hourMin)}</span>
      <span class="hour-rule"></span>
    </div>
  `;
}

// Current wall-clock time as a friendly string, e.g. "3:45 PM".
function nowCurrentTimeStr() {
  const d = new Date();
  let h = d.getHours(); const m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  let h12 = h % 12; if (h12 === 0) h12 = 12;
  return `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
}

// Red "NOW" marker line: red rule + flashing NOW tag + big current time.
function nowLineHtml() {
  return `
    <div class="now-line">
      <span class="now-rule"></span>
      <span class="now-badge">NOW</span>
      <span class="now-time" id="now-time">${nowCurrentTimeStr()}</span>
    </div>
  `;
}

function renderTaskRow(task, idx, isCurrent, isDone, overrideName, clockLabel) {
  const isEditingName = state.editingNameIdx === idx;
  const isEditingLoc = state.editingLocationIdx === idx;
  const isEditingTime = state.editingTimeIdx === idx;
  const isGroup = task.type === 'group';
  const pinned = isPinned(task);

  let html = `<div class="task-item ${isCurrent ? 'task-current' : isDone ? 'task-done' : 'task-pending'} ${pinned ? 'task-pinned' : ''}" data-idx="${idx}" ${pinned ? 'data-pinned="1"' : ''} draggable="false">`;
  html += `<div class="task-main-row">`;

  // Drag handle — the only spot that initiates a reorder (keeps text selectable).
  // Pinned (#set) tasks don't move, so their handle is an invisible spacer.
  html += pinned
    ? `<span class="drag-handle empty" aria-hidden="true">⠿</span>`
    : `<span class="drag-handle" title="Drag to reorder" aria-hidden="true">⠿</span>`;

  // Coin — click to "collect" the task (mark done). A coin animates up to the
  // running money total in the top-right corner.
  html += `<button class="coin-btn ${isDone ? 'collected' : ''} ${isCurrent ? 'current' : ''}" data-action="toggle-task" data-idx="${idx}" title="${isDone ? 'Click to un-collect' : 'Collect — mark done'}" aria-label="${isDone ? 'collected' : 'collect'}">`;
  html += `<span class="coin-glyph">$</span>`;
  if (isDone) html += `<span class="coin-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>`;
  html += `</button>`;

  // Play button — triangle, larger, rounded corners
  const isPlayingThis = isCurrent && state.isRunning;
  html += `<button class="task-play-btn ${isPlayingThis ? 'playing' : ''}" data-action="play-from" data-idx="${idx}" title="${isPlayingThis ? 'Currently playing' : 'Play from here'}">`;
  if (isPlayingThis) {
    html += `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>`;
  } else {
    // Rounded-corner triangle
    html += `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"><path d="M7 4.5 L19 12 L7 19.5 Z"/></svg>`;
  }
  html += `</button>`;

  html += `<div class="task-body">`;
  html += `<div class="task-row">`;

  // Task name + emoji rendered together as one editable unit.
  // Note: `task.emoji === ''` means user explicitly deleted the emoji — respect that.
  // Only fall back to auto-pick if `emoji` is undefined (never been set).
  const taskEmoji = task.emoji !== undefined ? task.emoji : '';
  if (isEditingName) {
    // Emoji is part of the input value so the user can edit/delete/replace it.
    // Tags (#word) stay in the editable text so the user can edit them naturally.
    const editValue = joinEmojiName(taskEmoji, task.name);
    html += `<input autofocus class="task-name-input ${isGroup ? 'group' : ''}" data-action="edit-name" data-idx="${idx}" value="${escapeHtml(editValue)}" />`;
  } else {
    const struck = isDone ? 'struck' : '';
    const empty = !task.name ? 'empty' : '';
    const visibleName = stripTagsFromName(overrideName || task.name);
    const nameDisplay = visibleName ? escapeHtml(visibleName) + (isGroup ? ':' : '') : (task.name ? '' : 'untitled');
    // Render emoji inline as part of the same clickable text element.
    // Skip the leading space if emoji is empty (user deleted it).
    const prefix = taskEmoji ? `${taskEmoji} ` : '';
    html += `<span class="task-name-text ${isGroup ? 'group' : ''} ${struck} ${empty}" data-action="start-edit-name" data-idx="${idx}" title="Click to edit">${prefix}${nameDisplay}</span>`;
  }

  html += `</div>`; // task-row
  html += `</div>`; // task-body

  // Right-side slot: tags + location, always pinned right, never wraps under the name.
  const tags = extractTags(task.name).filter(t => t.toLowerCase() !== 'set');
  html += `<div class="task-location-slot">`;
  // Pin marker for tasks that don't move (#set)
  if (pinned) {
    html += `<span class="pin-marker" title="Pinned (#set) — stays at the top of the hour">📌</span>`;
  }
  // Tag pills first (to the left of location, still on the right side of the row)
  if (!isEditingName && tags.length) {
    html += renderTagPills(tags, idx);
  }
  // Location
  if (isEditingLoc) {
    html += `<input autofocus class="location-input" data-action="edit-location" data-idx="${idx}" value="${escapeHtml(task.location || '')}" placeholder="location" />`;
  } else if (task.location) {
    html += `<span class="location-inline" data-action="toggle-location-edit" data-idx="${idx}" title="Click to edit location">📍 ${escapeHtml(task.location)}</span>`;
  } else if (!isEditingName) {
    html += `<span class="location-add" data-action="toggle-location-edit" data-idx="${idx}" title="Add location">+ location</span>`;
  }
  html += `</div>`; // task-location-slot

  // Duration bubble — far right, shows minutes per task (click to edit)
  const isEditingDur = state.editingDurationIdx === idx;
  const durMin = (task && Number(task.duration) > 0) ? Number(task.duration) : 5;
  if (isEditingDur) {
    html += `<input autofocus class="dur-input" type="number" min="1" max="180" step="1" data-action="edit-duration" data-idx="${idx}" value="${durMin}" />`;
  } else {
    html += `<span class="dur-bubble" data-action="toggle-duration-edit" data-idx="${idx}" title="Estimated minutes — click to edit">🕐 ${durMin} min</span>`;
  }

  html += `<button class="remove-btn" data-action="remove-task" data-idx="${idx}" title="Remove task"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;

  html += `</div>`; // main-row

  if (isGroup) {
    html += `<div class="sub-items-wrap">`;
    task.items.forEach((sub, j) => {
      const isEditingThis = state.editingSub.taskIdx === idx && state.editingSub.subIdx === j;
      const subEmoji = sub.emoji !== undefined ? sub.emoji : '';
      html += `<div class="sub-row">`;
      html += `<div class="check-small ${sub.done ? 'done' : ''}" data-action="toggle-sub" data-idx="${idx}" data-sub="${j}" title="${sub.done ? 'Click to uncheck' : 'Mark done'}">`;
      if (sub.done) html += `<svg viewBox="0 0 24 24" width="9" height="9" fill="none" stroke="#0a0d14" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
      html += `</div>`;
      if (isEditingThis) {
        const editValue = joinEmojiName(subEmoji, sub.name);
        html += `<input autofocus class="sub-item-input" data-action="edit-sub" data-idx="${idx}" data-sub="${j}" value="${escapeHtml(editValue)}" />`;
      } else {
        const struck = sub.done ? 'struck' : '';
        const prefix = subEmoji ? `${subEmoji} ` : '';
        const subTags = extractTags(sub.name);
        const visibleSubName = stripTagsFromName(sub.name);
        const nameOrUntitled = visibleSubName
          ? escapeHtml(visibleSubName)
          : (sub.name ? '' : '<span style="opacity:0.4;font-style:italic">untitled</span>');
        html += `<span class="sub-item-text ${struck}" data-action="start-edit-sub" data-idx="${idx}" data-sub="${j}" title="Click to edit">${prefix}${nameOrUntitled}</span>`;
        // Tag pills next to sub-item name
        if (subTags.length) {
          html += subTags.map(t => {
            const c = tagColor(t.toLowerCase());
            return `<span class="task-tag" style="background:${c.bg};border-color:${c.border};color:${c.fg}" data-action="start-edit-sub" data-idx="${idx}" data-sub="${j}" title="Edit to change tag">#${escapeHtml(t)}</span>`;
          }).join('');
        }
      }
      html += `<button class="remove-btn" data-action="remove-sub" data-idx="${idx}" data-sub="${j}" title="Remove"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
      html += `</div>`;
    });
    html += `<button class="sub-add" data-action="add-sub" data-idx="${idx}"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> ADD ITEM</button>`;
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

// Second checklist — items needed if the place were unfurnished.
function renderUnfurnished() {

  state.unfurnished.forEach((item, i) => {
    const isEditing = state.editingUnfurnished === i;
    const isDone = state.unfurnishedDone.includes(i);
    itemsHtml += `<div class="uf-row ${isDone ? 'uf-done' : ''}">`;
    // Checkbox
    itemsHtml += `<div class="uf-check ${isDone ? 'done' : ''}" data-action="toggle-unfurnished" data-uf="${i}" title="${isDone ? 'Click to uncheck' : 'Mark done'}">`;
    if (isDone) itemsHtml += `<svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="#0a0d14" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    itemsHtml += `</div>`;
    // Name (editable)
    if (isEditing) {
      itemsHtml += `<input autofocus class="uf-input" data-action="edit-unfurnished" data-uf="${i}" value="${escapeHtml(item)}" placeholder="item" />`;
    } else {
      const display = item ? escapeHtml(item) : '<em style="opacity:0.4">untitled</em>';

    // Remove
    itemsHtml += `<button class="uf-remove" data-action="remove-unfurnished" data-uf="${i}" title="Remove">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>`;

  });

  return `
    <div class="unfurnished-gap"></div>
    <div class="unfurnished-section">
      <div class="unfurnished-header">
        <div class="unfurnished-title">UNFURNISHED LIST</div>

          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          ADD
        </button>
      </div>
      <div class="unfurnished-subtitle">Additional things I need if the place was unfurnished</div>
      <div class="quick-add-wrap">
        <div class="quick-add-plus">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <input type="text" class="quick-add-input" id="unfurnished-quick-add"
          placeholder="Type an item and press Enter…"
          autocomplete="off"
        />
      </div>
      <div class="unfurnished-body">
        ${itemsHtml || '<div class="uf-empty">Nothing here yet — add items above.</div>'}
      </div>
    </div>
  `;
}

// Update only the timer display (time text + ring progress) without rebuilding
// the rest of the DOM. Used during text editing so inputs aren't disturbed.
function updateLiveTimerDisplay() {
  const timeStr = fmtMMSS(state.timeLeft);
  const timeEl = document.querySelector('.center-time');
  if (timeEl) {
    timeEl.textContent = timeStr;
    if (state.timeLeft < 30) timeEl.classList.add('warn');
    else timeEl.classList.remove('warn');
    if (state.timeLeft < 0) timeEl.classList.add('overtime');
    else timeEl.classList.remove('overtime');
  }
  // Update ring progress
  const radius = 92;
  const circumference = 2 * Math.PI * radius;
  const cur = getCurrent();
  const isAllDone = !cur;
  const progress = isAllDone ? 1 : Math.min(1, 1 - state.timeLeft / curDurationSec());
  const ring = document.querySelector('.ring circle:last-of-type');
  if (ring) {
    ring.setAttribute('stroke-dashoffset', String(circumference * progress));
  }
}

function render() {
  // Persist current state so changes survive reloads / future code updates.
  savePersistedState();

  // If the user is actively typing in a task/sub/location/suitcase input,
  // skip the full re-render so their in-progress text is NEVER overwritten.
  // We still update the live timer display so the countdown stays visible.
  const ae = document.activeElement;
  if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA') && ae.dataset && ae.dataset.action) {
    const protectedActions = [
      'edit-name', 'edit-sub', 'edit-location', 'edit-time', 'edit-duration',
      'edit-sc-row-name', 'edit-sc-item', 'edit-unfurnished', 'edit-tab-notes', 'edit-life-goal', 'edit-life-outcome', 'edit-meal', 'edit-expense',
    ];
    if (protectedActions.includes(ae.dataset.action)) {
      updateLiveTimerDisplay(); // update time only, leave inputs alone
      return;
    }
  }

  // Preserve quick-add input value & focus across re-renders
  const qaPrev = document.getElementById('quick-add');
  const qaValue = qaPrev ? qaPrev.value : '';
  const qaHadFocus = qaPrev && document.activeElement === qaPrev;
  const qaSelStart = qaHadFocus ? qaPrev.selectionStart : null;
  const qaSelEnd = qaHadFocus ? qaPrev.selectionEnd : null;

  // Quick-add location field
  const qlPrev = document.getElementById('quick-add-location');

  // Same for the unfurnished quick-add input

  const { active, done } = getOrder();
  const cur = getCurrent();
  const isAllDone = !cur;
  const totalCount = state.ids.length;

  const canPrev = cur && cur.idx > 0;

  const radius = 92;

  const progress = isAllDone ? 1 : Math.min(1, 1 - state.timeLeft / curDurationSec());
  const dashOffset = circumference * progress;

  const timeStr = fmtMMSS(state.timeLeft);

  const isGroup = cur && cur.task.type === 'group';
  const hasItems = isGroup && cur.task.items && cur.task.items.length > 0;

  let centerHtml;
  if (isAllDone) {

  } else {

          const itTags = extractTags(it.name);

          return `

              <div class="check-small ${it.done ? 'done' : ''}" style="width:11px;height:11px">
                ${it.done ? '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#0a0d14" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
              </div>
              ${e ? `<span class="center-sub-emoji">${e}</span>` : ''}

    }
    const centerEmoji = cur.task.emoji !== undefined ? cur.task.emoji : '';
    const centerTags = extractTags(cur.task.name);

  }

  let controlsHtml = '';
  if (!isAllDone) {

  }
  // Export — dump every task you've added/typed so you can copy & keep them.
  controlsHtml += `<button class="btn btn-export" data-action="export-tasks" title="Copy out all your tasks so they're never lost">⬇ Export my tasks</button>`;

  // ---- The action buttons from the screenshot ----
  // Each one acts on the CURRENT task (the one shown in the circle).
  let actionsHtml = '';
  if (!isAllDone) {
    actionsHtml = `
      <div class="actions-grid">
        <div class="actions-row actions-3col">

  }

  // Volume control — rendered inline at the end of the tabs row (next to Life goals).
  const effectiveVol = state.muted ? 0 : state.volume;
  const volPct = Math.round(effectiveVol * 100);
  const volumeHtml = `
    <div class="volume-control" title="Volume: ${volPct}%">
      <button class="volume-icon-btn" data-action="mute" title="${state.muted ? 'Unmute' : 'Mute'}">

      </button>
      <input type="range" class="volume-slider" id="volume-slider"
        min="0" max="100" step="1" value="${volPct}"
        aria-label="Volume" />
      <span class="volume-pct">${volPct}</span>
      <button class="mute-toggle-btn ${state.muted ? 'is-muted' : ''}" data-action="mute" title="${state.muted ? 'Turn the voice back on' : 'Silence the voice'}">
        ${state.muted ? '🔇 Unmute' : '🔊 Mute'}
      </button>
    </div>
  `;

  let listHtml = `
    <div class="list-section">
      <div class="code-tasks-note">code tasks instead</div>
      ${nowLineHtml()}
  `;
  // Sort key for checked-off tasks based on location:
  // Shelf 1 → 6 first, then other named locations alphabetically, then no-location last.
  function doneSortKey(task) {
    const loc = (task.location || '').trim();
    if (!loc) return [2, '', ''];
    const shelfMatch = loc.match(/shelf\s*(\d+)/i);
    if (shelfMatch) {
      return [0, parseInt(shelfMatch[1], 10), loc.toLowerCase()];
    }
    return [1, 0, loc.toLowerCase()];
  }
  function cmpKey(a, b) {
    for (let i = 0; i < a.length; i++) {
      if (a[i] < b[i]) return -1;
      if (a[i] > b[i]) return 1;
    }
    return 0;
  }

  // Separate active (unchecked) from done. Done tasks — including pinned ones —
  // drop to the bottom, greyed out. Pinning only locks a task's position while
  // it's still active (it can't be dragged or displaced).
  const activeEntries = [];
  const doneEntries = [];
  state.tasks.forEach((task, i) => {
    const id = state.ids[i];
    const isDone = state.completedIds.includes(id);
    if (isDone) {
      doneEntries.push({ task, idx: i, id, key: doneSortKey(task) });
    } else {
      activeEntries.push({ task, idx: i, id, done: false });
    }
  });
  // Sort done tasks by location grouping
  doneEntries.sort((a, b) => cmpKey(a.key, b.key));

  // Render active tasks. The pinned "hour-start" tasks (urinate / water floss)
  // are locked to real clock hours: the first lands on the current hour, the
  // next an hour later, and so on. The burn task shows 10 minutes before the
  // hour ends (e.g. 1:50). Hour lines are drawn from these anchors — NOT from
  // accumulated durations — so the pinned tasks never drift off the clock.
  const MIDNIGHT = 24 * 60;
  const startHour = Math.floor(dayStartMin() / 60);
  const isHourStart = (t) => isPinned(t) && !t.hydration && !t.burn;
  let blockHour = startHour;
  let seenHourStart = false;
  let lastDrawn = -1;
  let renderedAny = false;
  activeEntries.forEach(({ task, idx }) => {
    const hs = isHourStart(task);
    if (hs) { if (seenHourStart) blockHour++; seenHourStart = true; }
    // Draw the hour divider once when we move into a new clock hour.
    if (blockHour !== lastDrawn) {
      if (blockHour * 60 <= MIDNIGHT) listHtml += hourBlockHtml(blockHour * 60);
      lastDrawn = blockHour;
    }
    const isCurrent = cur && cur.idx === idx;
    let overrideName = null;
    if (task.hydration) overrideName = `water ${125 * Math.max(1, blockHour - 7)} ml`;
    else if (task.burn) overrideName = `burn ${50 + 25 * Math.max(0, blockHour - 8)}/400 cal`;
    listHtml += renderTaskRow(task, idx, isCurrent, false, overrideName);
    renderedAny = true;
  });
  // Fill the rest of today with empty hour lines, up to and including 12 AM.
  for (let h = (renderedAny ? blockHour + 1 : startHour); h * 60 <= MIDNIGHT; h++) {
    listHtml += hourBlockHtml(h * 60);
  }
  // Done tasks, greyed, at the bottom.
  doneEntries.forEach(({ task, idx }) => {
    listHtml += renderTaskRow(task, idx, false, true);
  });
  // Earlier-in-the-day planning grid: hour slots from 7 AM up to the current
  // hour. They're in the past for today, but shown here so you can still see
  // and plan those hours (e.g. for tomorrow).
  if (startHour > 7) {
    listHtml += `<div class="hour-line plan-head"><span class="hour-label">EARLIER · plan ahead</span><span class="hour-rule"></span></div>`;
    for (let h = 7; h < startHour; h++) listHtml += hourBlockHtml(h * 60);

  // Tab bar (table of contents) — volume control sits at the end, next to Life goals.
  const tabsHtml = `<div class="tabs">` + TABS.map(t =>
    `<button class="tab ${state.activeTab === t.id ? 'active' : ''}" data-action="switch-tab" data-tab="${t.id}">${escapeHtml(t.label)}</button>`

  document.getElementById('app').innerHTML = tabsHtml + bodyHtml;

  // Tell the desktop sticky timer how far down to pin (just below the frozen tabs)
  const tabsEl = document.querySelector('.tabs');
  if (tabsEl) document.documentElement.style.setProperty('--tabs-h', tabsEl.offsetHeight + 'px');

  // Focus inputs that just appeared
  if (state.editingNameIdx !== null) {
    const el = document.querySelector(`input.task-name-input[data-idx="${state.editingNameIdx}"]`);
    if (el) { el.focus(); el.select(); }
  }
  if (state.editingLocationIdx !== null) {
    const el = document.querySelector(`input.location-input[data-idx="${state.editingLocationIdx}"]`);
    if (el) { el.focus(); el.select(); }
  }
  if (state.editingTimeIdx !== null) {
    const el = document.querySelector(`input.time-input[data-idx="${state.editingTimeIdx}"]`);
    if (el) { el.focus(); el.select(); }
  }
  if (state.editingDurationIdx !== null) {
    const el = document.querySelector(`input.dur-input[data-idx="${state.editingDurationIdx}"]`);
    if (el) { el.focus(); el.select(); }
  }
  if (state.editingSub.taskIdx !== null) {
    const el = document.querySelector(`input.sub-item-input[data-idx="${state.editingSub.taskIdx}"][data-sub="${state.editingSub.subIdx}"]`);
    if (el) { el.focus(); el.select(); }
  }
  if (state.editingSuitcaseRow) {
    const { rowIdx, itemIdx } = state.editingSuitcaseRow;
    let el;
    if (itemIdx === -1) {
      el = document.querySelector(`input.sc-row-name-input[data-row="${rowIdx}"]`);
    } else {
      el = document.querySelector(`input.sc-item-input[data-row="${rowIdx}"][data-item="${itemIdx}"]`);
    }
    if (el) { el.focus(); el.select(); }
  }

  // Restore quick-add input state
  const qa = document.getElementById('quick-add');
  if (qa) {
    qa.value = qaValue;
    if (qaHadFocus) {
      qa.focus();
      try { qa.setSelectionRange(qaSelStart, qaSelEnd); } catch {}
    }
  }

  const ql = document.getElementById('quick-add-location');
  if (ql) {
    ql.value = qlValue;
    if (qlHadFocus) ql.focus();
  }

  const uf = document.getElementById('unfurnished-quick-add');
  if (uf) {
    uf.value = ufValue;
    if (ufHadFocus) uf.focus();
  }

  // Initialize volume slider visual fill
  updateVolumeUI();

  // Grow each expenses pad to fit all its content (no inner scrollbar).
  autoSizeExpenseAreas();
  // Load the embedded Meal-timer app if its tab is showing.
  mountMealTimer();
  // Load the embedded Packing Assistant if its tab is showing.
  mountPackApp();
  // Load the embedded Clean list if its tab is showing.
  mountCleanApp();
}

// Only one timer should make sound at a time. When you open a tab, silence and
// pause every OTHER timer (the main Time timer + the embedded Meal/Pack/Clean
// apps), so their voices don't overlap with the one you're now using.
function stopOtherTimers(activeTab) {
  // Main Time timer: cut its speech unless the Time tab is showing.
  if (activeTab !== 'time') {
    try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch (e) {}
  }
  const frames = [
    { id: 'meal-timer-frame', tab: 'meal' },
    { id: 'pack-app-frame', tab: 'pack' },
    { id: 'clean-app-frame', tab: 'clean' },
  ];
  frames.forEach(({ id, tab }) => {
    if (tab === activeTab) return; // leave the one you're looking at alone
    const f = document.getElementById(id);
    if (!f) return;
    try { f.contentWindow && f.contentWindow.speechSynthesis && f.contentWindow.speechSynthesis.cancel(); } catch (e) {}
    try {
      const doc = f.contentDocument;
      // A visible "pause" control only exists while that timer is running —
      // clicking it pauses it (and stops its audio loop).
      const pauseBtn = doc && doc.querySelector('[data-action="pause"]');
      if (pauseBtn) pauseBtn.click();
    } catch (e) {}
  });
}

// ---- Event delegation ----
document.addEventListener('click', (e) => {
  // Find closest element with data-action
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;
  const idx = target.dataset.idx !== undefined ? parseInt(target.dataset.idx, 10) : null;
  const sub = target.dataset.sub !== undefined ? parseInt(target.dataset.sub, 10) : null;

  switch (action) {
    case 'start': handleStart(); maybeLaunchClean(getCurrent()); break;
    case 'pause': handlePause(); break;
    case 'mark-done': handleMarkDone(); break;
    case 'did-it': handleMarkDone(); break;
    case 'did-repeat': handleDidRepeat(); break;
    case 'did-delete': handleDidDelete(); break;
    case 'later-today': handleLaterByHour(); break;
    case 'later-tomorrow': handleLaterTomorrow(); break;
    case 'skip-today': handleSkipToday(); break;
    case 'delete-forever': handleDeleteForever(); break;
    case 'failed': handleFailed(); break;
    case 'reset': handleReset(); break;
    case 'uncheck-all': uncheckAll(); break;
    case 'repeat': handleRepeat(); break;
    case 'mute': toggleMute(); break;
    case 'enable-alerts': enableAlerts(); break;
    case 'notalone-now': showNotAloneReminder(true); break;
    case 'dismiss-reminder': dismissReminder(); break;
    case 'toggle-task': toggleTaskDone(state.ids[idx], target); break;
    case 'toggle-sub': toggleSub(idx, sub); break;
    case 'start-edit-name':
      pushUndo();
      state.editingNameIdx = idx;
      state.editingLocationIdx = null;
      state.editingTimeIdx = null;
      state.editingSub = { taskIdx: null, subIdx: null };
      render();
      break;
    case 'toggle-location-edit':
      if (state.editingLocationIdx !== idx) pushUndo();
      state.editingLocationIdx = state.editingLocationIdx === idx ? null : idx;
      state.editingNameIdx = null;
      state.editingTimeIdx = null;
      state.editingSub = { taskIdx: null, subIdx: null };
      render();
      break;
    case 'toggle-time-edit':
      if (state.editingTimeIdx !== idx) pushUndo();
      state.editingTimeIdx = state.editingTimeIdx === idx ? null : idx;
      state.editingNameIdx = null;
      state.editingLocationIdx = null;
      state.editingSub = { taskIdx: null, subIdx: null };
      render();
      break;
    case 'toggle-duration-edit':
      if (state.editingDurationIdx !== idx) pushUndo();
      state.editingDurationIdx = state.editingDurationIdx === idx ? null : idx;
      state.editingNameIdx = null;
      state.editingLocationIdx = null;
      state.editingTimeIdx = null;
      state.editingSub = { taskIdx: null, subIdx: null };
      render();
      break;
    case 'switch-tab':
      state.activeTab = target.dataset.tab || 'time';
      state.editingNameIdx = null;
      state.editingLocationIdx = null;
      state.editingTimeIdx = null;
      state.editingDurationIdx = null;
      render();
      stopOtherTimers(state.activeTab);
      break;
    case 'start-edit-sub':
      pushUndo();
      state.editingSub = { taskIdx: idx, subIdx: sub };
      state.editingNameIdx = null;
      state.editingLocationIdx = null;
      state.editingTimeIdx = null;
      render();
      break;
    case 'add-task': addTask(); break;
    case 'remove-task': removeTask(idx); break;
    case 'add-sub': addSubItem(idx); break;
    case 'remove-sub': removeSubItem(idx, sub); break;
    case 'prev-task':
      if (target.getAttribute('aria-disabled') !== 'true') goToPrevTask();
      break;
    case 'next-task':
      if (target.getAttribute('aria-disabled') !== 'true') goToNextTask();
      break;
    case 'play-from':
      playFromTask(idx);
      maybeLaunchClean(getCurrent());
      break;
    case 'uncheck-all':
      if (state.completedIds.length) {
        pushUndo();
        state.completedIds = [];
        state.manualIdx = null;
        render();
      }
      break;
    case 'reset-all':
      if (confirm('Wipe ALL saved tasks, locations, and unfurnished items? This will restore the default starter list. This cannot be undone with ⌘Z.')) {
        try { localStorage.removeItem(STORAGE_KEY); } catch {}
        location.reload();
      }
      break;
    case 'export-tasks': exportTasks(); break;
    case 'import-tasks': importTasks(); break;
    case 'add-sc-row': addSuitcaseRow(); break;
    case 'remove-sc-row':
      e.stopPropagation();
      removeSuitcaseRow(parseInt(target.dataset.row, 10));
      break;
    case 'add-sc-item': addSuitcaseItem(parseInt(target.dataset.row, 10)); break;
    case 'remove-sc-item':
      e.stopPropagation();
      removeSuitcaseItem(parseInt(target.dataset.row, 10), parseInt(target.dataset.item, 10));
      break;
    case 'start-edit-sc-row-name':
      pushUndo();
      state.editingSuitcaseRow = { rowIdx: parseInt(target.dataset.row, 10), itemIdx: -1 };
      render();
      break;
    case 'start-edit-sc-item':
      pushUndo();
      state.editingSuitcaseRow = {
        rowIdx: parseInt(target.dataset.row, 10),
        itemIdx: parseInt(target.dataset.item, 10),
      };
      render();
      break;
    // ---- Unfurnished list ----
    case 'add-unfurnished':
      pushUndo();
      state.unfurnished.push('');
      state.editingUnfurnished = state.unfurnished.length - 1;
      render();
      break;
    case 'remove-unfurnished': {
      e.stopPropagation();
      pushUndo();
      const ui = parseInt(target.dataset.uf, 10);
      state.unfurnished.splice(ui, 1);
      // Re-index completion set: drop removed, shift higher ones down
      state.unfurnishedDone = state.unfurnishedDone
        .filter(x => x !== ui)
        .map(x => (x > ui ? x - 1 : x));
      state.editingUnfurnished = null;
      render();
      break;
    }
    case 'toggle-unfurnished': {
      pushUndo();
      const ui = parseInt(target.dataset.uf, 10);
      if (state.unfurnishedDone.includes(ui)) {
        state.unfurnishedDone = state.unfurnishedDone.filter(x => x !== ui);
      } else {
        state.unfurnishedDone.push(ui);
        playCashSound();
      }
      render();
      break;
    }
    case 'start-edit-unfurnished':
      pushUndo();
      state.editingUnfurnished = parseInt(target.dataset.uf, 10);
      render();
      break;
  }
});

// Input handlers (using `input` for live updates, `blur`/`keydown` to commit)
// Volume slider — live updates
document.addEventListener('input', (e) => {
  if (e.target && e.target.id === 'volume-slider') {
    const v = parseInt(e.target.value, 10) / 100;
    state.volume = v;
    // Auto-unmute if user moves slider above 0
    if (v > 0 && state.muted) state.muted = false;
    // If currently speaking, restart utterance at new volume so change is heard live
    if ('speechSynthesis' in window && window.speechSynthesis.speaking && currentSpeechText) {
      // cancel current and replay last text at new volume
      const txt = currentSpeechText;
      window.speechSynthesis.cancel();
      if (state.volume > 0 && !state.muted) {
        const u = new SpeechSynthesisUtterance(txt);
        u.rate = 0.95; u.pitch = 1.0; u.volume = state.volume;
        window.speechSynthesis.speak(u);
      }
    }
    // Update slider fill visually + label without full re-render (preserves focus)
    updateVolumeUI();
    return;
  }
});

function updateVolumeUI() {
  const slider = document.getElementById('volume-slider');
  if (!slider) return;
  const v = state.muted ? 0 : state.volume;
  const pct = Math.round(v * 100);
  // Update fill via background gradient
  slider.style.background =
    `linear-gradient(to right, var(--accent) 0%, var(--accent) ${pct}%, rgba(232,228,216,0.18) ${pct}%, rgba(232,228,216,0.18) 100%)`;
  // Update label
  const label = slider.parentElement && slider.parentElement.querySelector('.volume-pct');
  if (label) label.textContent = String(pct);
  // Update speaker icon
  const btn = slider.parentElement && slider.parentElement.querySelector('.volume-icon-btn');
  if (btn) {
    btn.title = state.muted ? 'Unmute' : 'Mute';
    const isOff = state.muted || state.volume === 0;
    btn.innerHTML = `<svg class="icon" style="width:16px;height:16px" aria-hidden="true"><use href="#i-${isOff ? 'volume-mute' : 'volume'}"/></svg>`;
  }
}

document.addEventListener('input', (e) => {
  const target = e.target;
  if (!target.dataset.action) return;
  const idx = parseInt(target.dataset.idx, 10);
  const sub = target.dataset.sub !== undefined ? parseInt(target.dataset.sub, 10) : null;
  const val = target.value;

  if (target.dataset.action === 'edit-name') {
    // Split leading emoji (if any) from the typed text.
    // If the user removed the emoji entirely, clear it — don't preserve the old one.
    const split = splitLeadingEmoji(val);
    state.tasks[idx].emoji = split.emoji; // may be '' — that's allowed
    state.tasks[idx].name = split.emoji ? split.rest : val;
  } else if (target.dataset.action === 'edit-location') {
    state.tasks[idx].location = val;
  } else if (target.dataset.action === 'edit-time') {
    state.tasks[idx].time = val;
  } else if (target.dataset.action === 'edit-duration') {
    const n = parseInt(val, 10);
    state.tasks[idx].duration = (Number.isFinite(n) && n > 0) ? n : 5;
  } else if (target.dataset.action === 'edit-tab-notes') {
    if (!state.tabNotes) state.tabNotes = {};
    state.tabNotes[state.activeTab] = val;
  } else if (target.dataset.action === 'edit-meal') {
    if (!state.mealGrid) state.mealGrid = {};
    state.mealGrid[`${target.dataset.day}-${target.dataset.meal}`] = val;
    savePersistedState();
  } else if (target.dataset.action === 'edit-expense') {
    if (!state.expenses) state.expenses = { fixed: '', variable: '' };
    state.expenses[target.dataset.col] = val;
    target.style.height = 'auto';
    target.style.height = (target.scrollHeight + 2) + 'px';
    savePersistedState();
  } else if (target.dataset.action === 'edit-life-goal') {
    if (!state.lifeGoals) state.lifeGoals = {};
    state.lifeGoals[target.dataset.area] = val;
    savePersistedState();
  } else if (target.dataset.action === 'edit-life-outcome') {
    if (!state.lifeOutcomes) state.lifeOutcomes = {};
    state.lifeOutcomes[target.dataset.area] = val;
    savePersistedState();
  } else if (target.dataset.action === 'edit-sub') {
    const split = splitLeadingEmoji(val);
    state.tasks[idx].items[sub].emoji = split.emoji;
    state.tasks[idx].items[sub].name = split.emoji ? split.rest : val;
  } else if (target.dataset.action === 'edit-sc-row-name') {
    const ri = parseInt(target.dataset.row, 10);
    state.suitcaseRows[ri].name = val;
  } else if (target.dataset.action === 'edit-sc-item') {
    const ri = parseInt(target.dataset.row, 10);
    const ii = parseInt(target.dataset.item, 10);
    state.suitcaseRows[ri].items[ii] = val;
  } else if (target.dataset.action === 'edit-unfurnished') {
    const ui = parseInt(target.dataset.uf, 10);
    state.unfurnished[ui] = val;
  }
  // Don't re-render on every keystroke — preserves focus/cursor.
  // But DO save so the typed text isn't lost on reload.
  savePersistedState();
});

document.addEventListener('blur', (e) => {
  const target = e.target;
  if (!target.dataset || !target.dataset.action) return;
  if (target.dataset.action === 'edit-name') {
    // If the user tagged this task #unfurnished, move it into the unfurnished list.
    const idx = parseInt(target.dataset.idx, 10);
    // If focus has already moved to a DIFFERENT task's name editor (e.g. pressing
    // Enter just created a new row below), don't clobber that editor.
    if (state.editingNameIdx !== null && state.editingNameIdx !== idx) return;
    state.editingNameIdx = null;
    moveUnfurnishedTaggedToList();
    render();
  } else if (target.dataset.action === 'edit-location') {
    state.editingLocationIdx = null;
    render();
  } else if (target.dataset.action === 'edit-time') {
    state.editingTimeIdx = null;
    render();
  } else if (target.dataset.action === 'edit-duration') {
    const idx = parseInt(target.dataset.idx, 10);
    const n = parseInt(target.value, 10);
    state.tasks[idx].duration = (Number.isFinite(n) && n > 0) ? n : 5;
    state.editingDurationIdx = null;
    // If this is the current task, refresh the live countdown to the new length.
    const cur = getCurrent();
    if (cur && cur.idx === idx && !state.isRunning) {
      state.timeLeft = curDurationSec();
      lastReminderTime = curDurationSec();
    }
    render();
  } else if (target.dataset.action === 'edit-sub') {
    // No auto-pick on blur for sub-items either.
    state.editingSub = { taskIdx: null, subIdx: null };
    render();
  } else if (target.dataset.action === 'edit-sc-row-name' || target.dataset.action === 'edit-sc-item') {
    state.editingSuitcaseRow = null;
    render();
  } else if (target.dataset.action === 'edit-unfurnished') {
    state.editingUnfurnished = null;
    render();
  }
}, true);

document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter' && e.key !== 'Escape') return;
  const target = e.target;
  if (!target.dataset || !target.dataset.action) return;
  const action = target.dataset.action;

  // Enter while editing a task NAME: commit it and drop a new empty task right
  // below, ready to type (Shift+Enter still just commits/blurs).
  if (action === 'edit-name' && e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const idx = parseInt(target.dataset.idx, 10);
    // The live `input` handler has already written the typed text into state.
    // If the user tagged the task #unfurnished, fall back to the old behavior
    // (commit + move it to the unfurnished list) instead of adding a row.
    const curName = (state.tasks[idx] && state.tasks[idx].name) || '';
    if (extractTags(curName).map(t => t.toLowerCase()).includes('unfurnished')) {
      target.blur();
      return;
    }
    addTaskAfter(idx);
    return;
  }

  if (['edit-name','edit-location','edit-time','edit-duration','edit-sub','edit-sc-row-name','edit-sc-item'].includes(action)) {
    target.blur();
  }
});

// Global undo — Cmd/Ctrl+Z works everywhere, even inside inputs
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && (e.key === 'z' || e.key === 'Z') && !e.shiftKey) {
    // Don't fight the browser inside the quick-add input if it has unsaved typing
    // (browser native undo for the textfield itself is also acceptable, but we override).
    e.preventDefault();
    undo();
  }
});

// Global keyboard shortcuts — ignored while editing
document.addEventListener('keydown', (e) => {
  // If user is typing in an input, ignore all shortcuts
  const t = e.target;
  const tag = t && t.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || (t && t.isContentEditable)) return;

  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    goToPrevTask();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    goToNextTask();
  } else if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    if (getCurrent()) {
      if (state.isRunning) handlePause();
      else handleStart();
    }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    handleMarkDone();
  } else if (e.key === 'm' || e.key === 'M') {
    e.preventDefault();
    toggleMute();
  } else if (e.key === 'r' || e.key === 'R') {
    e.preventDefault();
    handleRepeat();
  }
});

// Quick-add input — submit on Enter
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  if (e.target && (e.target.id === 'quick-add' || e.target.id === 'quick-add-location')) {
    e.preventDefault();
    const nameEl = document.getElementById('quick-add');
    const locEl = document.getElementById('quick-add-location');
    const val = nameEl ? nameEl.value : '';
    const loc = locEl ? locEl.value : '';
    if (nameEl) nameEl.value = '';
    if (locEl) locEl.value = '';
    quickAddTask(val, loc);
  } else if (e.target && e.target.id === 'unfurnished-quick-add') {
    e.preventDefault();
    const val = (e.target.value || '').trim();
    e.target.value = '';
    if (val) {
      pushUndo();
      state.unfurnished.push(val);
      render();
      setTimeout(() => {
        const el = document.getElementById('unfurnished-quick-add');
        if (el) el.focus();
      }, 0);
    }
  }
});

// ---- Drag and drop ----
let dragSrcIdx = null;

// Whole task row is draggable. But don't initiate drag from inputs.
document.addEventListener('mousedown', (e) => {
  const item = e.target.closest && e.target.closest('.task-item');
  if (!item) return;
  // Reordering starts ONLY from the grip handle, so the rest of the row text
  // can be selected and copied normally. Pinned (#set) tasks never move.
  if (e.target.closest('.drag-handle') && item.dataset.pinned !== '1') {
    item.setAttribute('draggable', 'true');
  } else {
    item.setAttribute('draggable', 'false');
  }
});

document.addEventListener('dragstart', (e) => {
  const item = e.target.closest && e.target.closest('.task-item');
  if (!item) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
    e.preventDefault();
    return;
  }
  if (item.getAttribute('draggable') !== 'true') { e.preventDefault(); return; }
  dragSrcIdx = parseInt(item.dataset.idx, 10);
  item.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', String(dragSrcIdx)); } catch {}
});

document.addEventListener('dragend', (e) => {
  document.querySelectorAll('.task-item').forEach(el => {
    el.classList.remove('dragging', 'drag-over-top', 'drag-over-bottom');
    el.setAttribute('draggable', 'false');
  });
  dragSrcIdx = null;
});

document.addEventListener('dragover', (e) => {
  const item = e.target.closest && e.target.closest('.task-item');
  if (!item) return;
  if (dragSrcIdx === null) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  // Visual indicator on hover position (top or bottom half)
  document.querySelectorAll('.task-item').forEach(el => {
    el.classList.remove('drag-over-top', 'drag-over-bottom');
  });
  const rect = item.getBoundingClientRect();
  const after = (e.clientY - rect.top) > rect.height / 2;
  item.classList.add(after ? 'drag-over-bottom' : 'drag-over-top');
});

document.addEventListener('drop', (e) => {
  const item = e.target.closest && e.target.closest('.task-item');
  if (!item || dragSrcIdx === null) return;
  e.preventDefault();
  const targetIdx = parseInt(item.dataset.idx, 10);
  const rect = item.getBoundingClientRect();
  let after = (e.clientY - rect.top) > rect.height / 2;
  // Never let a task land above a pinned (#set) task — it stays put.
  if (item.dataset.pinned === '1') after = true;
  // Calculate insertion target: after = insert at targetIdx + 1
  let toIdx = after ? targetIdx + 1 : targetIdx;
  // Never wedge a task between the clock-locked pinned tasks — land after the run.
  while (toIdx < state.tasks.length && isPinned(state.tasks[toIdx])) toIdx++;
  reorderTask(dragSrcIdx, toIdx);
  dragSrcIdx = null;
});

// ---- Reminders / alerts ----------------------------------------------------
let reminderShowing = false;
let momBdayShownSession = false;

function stripHtml(s) { return (s || '').replace(/<[^>]+>/g, ''); }

function showReminder(emoji, msg, speakText) {
  // Only one popup at a time — if one is open, wait until it's dismissed.
  if (reminderShowing) return false;
  reminderShowing = true;
  try {
    if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
      new Notification('TuneTask', { body: stripHtml(msg) });
    }
  } catch (e) {}
  speak(speakText || stripHtml(msg));
  const overlay = document.createElement('div');
  overlay.className = 'reminder-modal';
  overlay.id = 'reminder-modal';
  overlay.innerHTML = `<div class="reminder-box">
      <div class="r-emoji">${emoji}</div>
      <div class="r-msg">${msg}</div>
      <button class="btn btn-primary" data-action="dismiss-reminder">Got it</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) dismissReminder(); });
  return true;
}

function dismissReminder() {
  const m = document.getElementById('reminder-modal');
  if (m) m.remove();
  reminderShowing = false;
}

function showNotAloneReminder() {
  const shown = showReminder(
    '🤝',
    "Reach out and find someone to spend time with on <b>Sunday, May 31</b>. You're not alone. 💛",
    "Reminder. Reach out and find someone to spend time with for Sunday, May thirty first. You are not alone."
  );
  if (shown) { state.lastNotAlone = Date.now(); savePersistedState(); }
}

function enableAlerts() {
  try {
    if (typeof Notification === 'undefined') {
      alert('This browser does not support pop-up notifications.');
      return;
    }
    if (Notification.permission === 'granted') { render(); return; }
    Notification.requestPermission().then(() => render());
  } catch (e) { render(); }
}

const HOUR_MS = 60 * 60 * 1000;
function checkReminders() {
  if (reminderShowing) return; // don't stack popups
  const now = new Date();
  // 1) Mom's birthday — once per session on June 14, 2026
  if (now.getFullYear() === 2026 && now.getMonth() === 5 && now.getDate() === 14 && !momBdayShownSession) {
    if (showReminder('🎂', "Today is <b>Mom's birthday</b> (June 14)! 🎉 Give her a call.", "Today is your mom's birthday, June fourteenth. Give her a call.")) {
      momBdayShownSession = true;
    }
    return;
  }
}
// Check every minute while the page is open; first check a few seconds after load.
setInterval(checkReminders, 60 * 1000);
setTimeout(checkReminders, 6000);
// Keep the NOW clock ticking even when the timer isn't running.
setInterval(() => {
  const el = document.getElementById('now-time');
  if (el) el.textContent = nowCurrentTimeStr();
}, 15 * 1000);

// Start the countdown at the first task's own duration.
state.timeLeft = curDurationSec();
// initial render
render();
// Persist immediately under the current key. This "claims" any data that was
// adopted from a legacy key or normalized on load, so it survives future updates.
savePersistedState();

// ---- Top-right running money total -----------------------------------------
(function mountMoneyCounter() {
  if (document.getElementById('money-counter')) return;
  const mc = document.createElement('div');
  mc.id = 'money-counter';
  mc.title = 'Money earned — one coin per task you collect';
  mc.innerHTML = `<span class="mc-coin">🪙</span><span id="money-amt">$0.00</span>`;
  document.body.appendChild(mc);
  updateMoneyUI(false);
})();

// ---- Auto-start on every visit (a Pause button is available) ----------------
(function autoStart() {
  const cur = getCurrent();
  if (!cur) return; // nothing to run (all done) — leave it
  state.hasStarted = true;
  state.isRunning = true;
  state.timeLeft = curDurationSec();
  lastReminderTime = curDurationSec();
  startTimer();
  render();
  window.__loadTime = Date.now();
  // Try to speak the first task right away (works on desktop).
  try { if (!state.muted) { lastSpokenId = cur.id; speak(buildSpeechIntro(cur.task)); } } catch (e) {}
})();
// Browsers block audio until the first interaction. On the first tap/key, unlock
// speech and read the current task so the voice reliably kicks in on mobile too.
let __audioUnlocked = false;
function __unlockAudio() {
  if (__audioUnlocked) return;
  __audioUnlocked = true;
  try { if (window.speechSynthesis) window.speechSynthesis.resume(); } catch (e) {}
  // If the on-load speech just played (desktop), don't repeat it.
  if (Date.now() - (window.__loadTime || 0) < 3000) return;
  const cur = getCurrent();
  if (cur && state.isRunning && !state.muted) {
    lastReminderTime = state.timeLeft;
    speak(buildSpeechIntro(cur.task));
  }
}
['pointerdown', 'touchstart', 'keydown', 'click'].forEach(ev =>
  document.addEventListener(ev, __unlockAudio, { once: true }));

</script>
