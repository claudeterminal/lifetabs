  // Audio chime
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
    }
    if (audioCtx.state === 'suspended') { try { audioCtx.resume(); } catch (e) {} }
    return audioCtx;
  }
  function playChime() {
    const ctx = ensureAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    [880, 1318.5].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const start = now + i * 0.18;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.22, start + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 1.4);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(start); osc.stop(start + 1.5);
    });
  }

  // Soft, dull single tone — used for the every-60s gentle pulse.
  function playSoftChime() {
    const ctx = ensureAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 294;             // D4 — low, soft
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.05, now + 0.05);   // very quiet
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.1);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 1.2);
  }

  // Bright ka-ching for coin collection — ascending triangle-wave ping
  function playCashSound() {
    const ctx = ensureAudio(); if (!ctx) return;
    const now = ctx.currentTime;
    [
      { f: 1320, t: 0.00, d: 0.20, g: 0.16 },
      { f: 1760, t: 0.05, d: 0.28, g: 0.14 },
      { f: 2640, t: 0.10, d: 0.18, g: 0.10 },
    ].forEach(({ f, t, d, g }) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = f;
      const start = now + t;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(g, start + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.001, start + d);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(start); osc.stop(start + d + 0.05);
    });
  }

  // Sum done+labeled tasks ($0.01 each) into the cash pile
  function updateCashTotal() {
    let n = 0;
    for (const k in state.tasks) {
      const t = state.tasks[k];
      if (t && t.done && t.label && t.label.trim()) n++;
    }
    const el = document.getElementById('cash-total-num');
    if (el) el.textContent = (n * 0.01).toFixed(2);
  }

  // Animate a coin flying from `srcEl` → cash pile, with a "+$1" popper
  function flyCoinToPile(srcEl) {
    const pile = document.getElementById('cash-pile');
    if (!pile || !srcEl) return;
    const s = srcEl.getBoundingClientRect();
    const p = pile.getBoundingClientRect();
    const sx = s.left + s.width / 2;
    const sy = s.top + s.height / 2;
    const px = p.left + p.width / 2;
    const py = p.top + p.height / 2;

    const fly = document.createElement('div');
    fly.className = 'flying-coin';
    fly.style.left = (sx - 11) + 'px';
    fly.style.top  = (sy - 11) + 'px';
    document.body.appendChild(fly);

    const pop = document.createElement('div');
    pop.className = 'cash-pop';
    pop.textContent = '+$0.01';
    pop.style.left = (sx + 14) + 'px';
    pop.style.top  = (sy - 8) + 'px';
    pop.style.opacity = '1';
    document.body.appendChild(pop);

    void fly.offsetHeight; void pop.offsetHeight;

    fly.style.transform =
      `translate(${px - sx}px, ${py - sy}px) scale(0.45) rotate(720deg)`;
    fly.style.opacity = '0.2';

    pop.style.transform = 'translateY(-28px)';
    pop.style.opacity = '0';

    setTimeout(() => fly.remove(), 760);
    setTimeout(() => pop.remove(), 960);

    setTimeout(() => {
      pile.classList.remove('bumped');
      void pile.offsetHeight;
      pile.classList.add('bumped');
      playCashSound();
    }, 600);
  }

  // Every 60s, give a soft audio nudge of the current task — only if there's
  // an active task and we didn't just fire a full reminder.
  let lastReminderAt = 0;
  function pulseCurrentTask() {
    const k = currentSlotKey();
    if (!k) return;
    const t = state.tasks[k];
    if (!t || !t.label || !t.label.trim() || t.done) return;
    // Skip if the main reminder fired within the last ~30s
    if (lastReminderAt && Date.now() - lastReminderAt < 30 * 1000) return;
    playSoftChime();
  }

  // Eye-break popup — pops from the coach every 10 minutes during waking hours
  const eyeBreakPopup = document.getElementById('eye-break-popup');
  const eyeBreakCloseBtn = document.getElementById('eye-break-close');
  function showEyeBreak() {
    if (!eyeBreakPopup) return;
    const h = new Date().getHours();
    if (h < 7 || h > 22) return;  // skip overnight
    eyeBreakPopup.hidden = false;
    playSoftChime();
    clearTimeout(eyeBreakPopup._timer);
    eyeBreakPopup._timer = setTimeout(hideEyeBreak, 30 * 1000);
  }
  function hideEyeBreak() {
    if (!eyeBreakPopup) return;
    eyeBreakPopup.hidden = true;
    clearTimeout(eyeBreakPopup._timer);
  }
  if (eyeBreakCloseBtn) eyeBreakCloseBtn.addEventListener('click', hideEyeBreak);
  if (eyeBreakPopup)    eyeBreakPopup.addEventListener('click', e => {
    if (e.target === eyeBreakPopup) hideEyeBreak();
  });

  // Toast
  function showToast(label, body, timeText) {
    const stack = document.getElementById('toast-stack');
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = `
      <div class="toast-label">${escapeHtml(label)}</div>
      <div class="toast-body">${escapeHtml(body)}</div>
      ${timeText ? `<div class="toast-time">${escapeHtml(timeText)}</div>` : ''}
    `;
    stack.appendChild(t);
    setTimeout(() => {
      t.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      t.style.opacity = '0'; t.style.transform = 'translateX(20px)';
      setTimeout(() => t.remove(), 320);
    }, 6500);
    t.addEventListener('click', () => t.remove());
  }

  function fireReminder(k, t) {
    const hh = parseInt(k.slice(0,2), 10);
    const mm = parseInt(k.slice(2), 10);
    const timeText = format12(hh, mm);
    t.lastFired = todayStr();
    lastReminderAt = Date.now();
    scheduleSave();
    if ('Notification' in window && Notification.permission === 'granted') {
      try {
        const n = new Notification(`Reminder · ${timeText}`, {
          body: t.label,
          tag: `reminder-${k}-${todayStr()}`,
          requireInteraction: false
        });
        n.onclick = () => { try { window.focus(); } catch(e){} n.close(); };
        setTimeout(() => { try { n.close(); } catch(e){} }, 22000);
      } catch (e) {}
    }
    showToast('Reminder', t.label, timeText);
    playChime();
    speakReminder(t.label, timeText);
    const row = hourGrid.querySelector(`.slot[data-time="${k}"]`);
    if (row) {
      row.classList.add('fired');
      row.animate(
        [{ backgroundColor: 'rgba(168,52,28,0.4)' }, { backgroundColor: 'rgba(168,52,28,0)' }],
        { duration: 2200, easing: 'ease-out' }
      );
    }
  }
  function checkReminders() {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes();
    if (h < 7 || h > 22) return;
    const slotM = Math.floor(m / 5) * 5;
    if (m - slotM > 1) return;
    const k = hmKey(h, slotM);
    const t = state.tasks[k];
    if (!t || !t.label || !t.label.trim() || t.done) return;
    const today = todayStr();
    if (t.repeat) {
      if (t.lastFired !== today) fireReminder(k, t);
    } else {
      if (!t.lastFired) fireReminder(k, t);
    }
  }

  // ════════════════════════════════════════════════════════════════════
  //  COACH AVATAR
  // ════════════════════════════════════════════════════════════════════
  const coachToggle = document.getElementById('coach-toggle');
  const coachPanel = document.getElementById('coach-panel');
  const coachAvatar = document.getElementById('coach-avatar');
  const coachMute = document.getElementById('coach-mute');
  const coachClose = document.getElementById('coach-close');
  const coachBubble = document.getElementById('coach-bubble-text');
  let coachOpen = false;
  let lastNudgeAt = 0;
  let coachInterval = null;

  function openCoach() {
    coachOpen = true;
    coachToggle.style.display = 'none';
    coachPanel.classList.remove('hidden');
    if (!coachInterval) {
      coachInterval = setInterval(coachTick, COACH_NUDGE_MS);
      setTimeout(coachTick, 800);
    }
  }
  function closeCoach() {
    coachOpen = false;
    coachToggle.style.display = '';
    coachPanel.classList.add('hidden');
    if (coachInterval) { clearInterval(coachInterval); coachInterval = null; }
    try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch (e) {}
    coachAvatar.classList.remove('speaking');
  }
  function pickPrompt(task) {
    const t = task && task.trim();
    const onTask = t ? [
      `Hey, are you actually working on ${t} right now?`,
      `Quick check. Still on ${t}?`,
      `${t}. Locked in, or did you drift?`,
      `You said you'd do ${t}. Are you?`,
      `What's the status on ${t}?`,
    ] : [
      'Nothing scheduled. What are you working on?',
      'Free slot. What is the move right now?',
      'Tell me what you are doing right now.',
    ];
    return onTask[Math.floor(Math.random() * onTask.length)];
  }

  // Strip emojis + symbols so speech engines pronounce the label cleanly.
  function cleanForSpeech(s) {
    if (!s) return '';
    return String(s)
      // remove emoji + pictographs
      .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{1F000}-\u{1F0FF}\u{FE0F}\u{200D}]/gu, '')
      .replace(/[⏳⌚▶🔊🔇✓✕↻]/g, '')
      // collapse repeated spaces and trim
      .replace(/\s+/g, ' ')
      .trim();
  }

  // Low-level speaker. Used by both coach (with speaking animation) and reminders.
  function speak(text, opts) {
    opts = opts || {};
    if (!('speechSynthesis' in window)) { console.warn('No speechSynthesis'); return; }
    if (!voiceUnlocked) { console.warn('Voice not unlocked yet'); return; }
    if (!text) return;
    try {
      // Defeat Chrome's auto-pause and any stuck-queued state
      window.speechSynthesis.cancel();
      window.speechSynthesis.resume();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = opts.rate != null ? opts.rate : 1.0;
      u.pitch = opts.pitch != null ? opts.pitch : 1.0;
      u.volume = opts.volume != null ? opts.volume : 1;
      const voices = window.speechSynthesis.getVoices();
      const preferred = voices.find(v => /Samantha|Google US English|Jenny|Aria|Natural/i.test(v.name))
                     || voices.find(v => v.lang && v.lang.startsWith('en'));
      if (preferred) u.voice = preferred;
      u.onstart = () => coachAvatar && coachAvatar.classList.add('speaking');
      u.onend   = () => coachAvatar && coachAvatar.classList.remove('speaking');
      u.onerror = (e) => {
        console.warn('TTS error:', e.error);
        coachAvatar && coachAvatar.classList.remove('speaking');
      };
      window.speechSynthesis.speak(u);
      // In Chrome, sometimes speak() is queued but doesn't start.
      // A tiny delayed resume() shoves it through.
      setTimeout(() => {
        try { window.speechSynthesis.resume(); } catch (e) {}
      }, 80);
    } catch (e) { console.warn('speak() threw:', e); }
  }

  // Speech path the coach uses (respects coachMuted)
  function speakCoach(text) {
    if (coachMuted) return;
    speak(text);
  }

  // Speech path the reminder system uses (respects reminderVoiceMuted)
  function speakReminder(label, timeText) {
    if (reminderVoiceMuted) return;
    const clean = cleanForSpeech(label) || 'Reminder';
    speak(clean, { rate: 0.98, pitch: 1.05 });
  }
  function currentTaskLabel() {
    const k = currentSlotKey();
    if (!k) return null;
    const t = state.tasks[k];
    return (t && t.label && t.label.trim()) ? t.label.trim() : null;
  }
  function updateCoachBubble() {
    const lbl = currentTaskLabel();
    coachBubble.textContent = lbl || 'No task right now';
  }
  function coachTick() {
    updateCoachBubble();
    if (Date.now() - lastNudgeAt < COACH_NUDGE_MS - 1000) return;
    lastNudgeAt = Date.now();
    if (!coachMuted && voiceUnlocked) {
      speakCoach(pickPrompt(currentTaskLabel()));
    }
  }

  coachToggle.addEventListener('click', openCoach);
  coachClose.addEventListener('click', closeCoach);
  coachAvatar.addEventListener('click', () => {
    voiceUnlocked = true;
    ensureAudio();
    speakCoach('Hi. I will check in on you while you work.');
  });
  coachMute.addEventListener('click', () => {
    coachMuted = !coachMuted;
    coachMute.classList.toggle('muted', coachMuted);
    coachMute.textContent = coachMuted ? '🔇' : '🔊';
    if (coachMuted) { try { window.speechSynthesis.cancel(); } catch (e) {} }
  });

  // ════════════════════════════════════════════════════════════════════
  //  RENDER ALL + INIT
  // ════════════════════════════════════════════════════════════════════
  function renderAll() {
    renderHourGrid();
    renderMealPlan();
    renderPads();
    renderFinances();
    updateCounters();
    updateNowMarker();
    updatePastUndone();
    updateNowTaskDisplay();
    updateOverdueDisplay();
    updateCashTotal();
  }

  // Click either bar to scroll to its slot
  document.getElementById('now-task').addEventListener('click', () => scrollToNow());
  document.getElementById('overdue-task').addEventListener('click', () => {
    // Find latest overdue and scroll to it
    const nowK = currentSlotKey();
    const cutoff = nowK ? parseInt(nowK, 10) : 2255;
    let bestKey = null, bestNum = -1;
    for (const k in state.tasks) {
      const t = state.tasks[k];
      if (!t || !t.label || !t.label.trim() || t.done) continue;
      const n = parseInt(k, 10);
      if (n >= cutoff) continue;
      if (n > bestNum) { bestNum = n; bestKey = k; }
    }
    if (!bestKey) return;
    const row = hourGrid.querySelector(`.slot[data-time="${bestKey}"]`);
    if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });

  function scrollToNow() {
    const k = currentSlotKey();
    if (!k) return;
    const row = hourGrid.querySelector(`.slot[data-time="${k}"]`);
    if (!row) return;
    // Only auto-scroll if the row isn't already comfortably in view
    const rect = row.getBoundingClientRect();
    const vh = window.innerHeight || document.documentElement.clientHeight;
    if (rect.top < 80 || rect.bottom > vh - 80) {
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  async function init() {
    await loadState();
    renderAll();
    updateClock();
    updatePermBtn();
    // Tickers
    setInterval(updateClock, 1000);
    setInterval(updateProgressBar, 1000);
    updateProgressBar();
    setInterval(() => { updateNowMarker(); updatePastUndone(); }, 30 * 1000);
    // Check every 5 seconds so 5-min slot transitions never get missed
    setInterval(checkReminders, 5 * 1000);
    // Soft 60-second pulse — low dull tone for the current active task
    setInterval(pulseCurrentTask, 60 * 1000);
    // Eye break every 10 minutes during waking hours
    setInterval(showEyeBreak, 10 * 60 * 1000);
    setTimeout(checkReminders, 1500);
    // Scroll the current slot into view after first render
    setTimeout(scrollToNow, 350);
    // Visibility refresh
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        updateClock();
        updateNowMarker();
        updatePastUndone();
        checkReminders();
      }
    });
  }
  init();
})();
</script>
</body>
